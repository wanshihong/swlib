ableEventTrait;\n\n    // 数据库和表信息\n    const string DATABASES = \"wenyuehui\";\n    const string TABLE_NAME = \"user\";\n    const string DTO_CLASS = UserTableDto::class;\n\n    // 主键\n    const string PRI_KEY = \"t0f0\";\n\n    // 字段常量\n    const string ID = \"t0f0\";\n    const string USERNAME = \"t0f1\";\n    const string EMAIL = \"t0f2\";\n    const string STATUS = \"t0f3\";\n    const string CREATED_AT = \"t0f4\";\n\n    // 所有字段\n    const array ALL_FIELD = [\n        self::ID,\n        self::USERNAME,\n        self::EMAIL,\n        self::STATUS,\n        self::CREATED_AT,\n    ];\n\n    // ORM 生命周期事件\n    const string SelectBefore = \"table.wenyuehui.user.select.before\";\n    const string SelectAfter  = \"table.wenyuehui.user.select.after\";\n    const string InsertBefore = \"table.wenyuehui.user.insert.before\";\n    const string InsertAfter  = \"table.wenyuehui.user.insert.after\";\n    const string UpdateBefore = \"table.wenyuehui.user.update.before\";\n    const string UpdateAfter  = \"table.wenyuehui.user.update.after\";\n    const string DeleteBefore = \"table.wenyuehui.user.delete.before\";\n    const string DeleteAfter  = \"table.wenyuehui.user.delete.after\";\n}\n```\n\n#### TableDto 类 (runtime/Generate/TablesDto/)\n\nDTO 类是数据传输对象，提供类型安全的属性访问。\n\n```php\n// 自动生成的 DTO 类示例\nnamespace Generate\\TablesDto\\Wenyuehui;\n\nclass UserTableDto\n{\n    public int $id;\n    public string $username;\n    public string $email;\n    public int $status;\n    public int $createdAt;\n\n    // 列表数据\n    public ?array $__rows = null;\n    public int $__total = 0;\n\n    // 保存方法\n    public function __save(): int { ... }\n\n    // 数组转换\n    public function __toArray(): array { ... }\n}\n```\n\n#### Model 类 (runtime/Generate/Models/)\n\nModel 类是业务模型，封装了数据转换和业务逻辑。\n\n```php\n// 自动生成的 Model 类示例\nnamespace Generate\\Models\\Wenyuehui;\n\nuse Generate\\TablesDto\\Wenyuehui\\UserTableDto;\nuse Protobuf\\Wenyuehui\\User\\UserProto;\n\nclass UserModel\n{\n    // 枚举映射\n    private static array $statusMap = [\n        1 => '正常',\n        0 => '禁用',\n    ];\n\n    // 从 Protobuf 请求创建 DTO\n    public static function request(UserProto $request): UserTableDto { ... }\n\n    // 格式化单条数据\n    public static function formatItem(UserTableDto $dto): array { ... }\n\n    // 格式化列表数据\n    public static function formatList(array $list): array { ... }\n}\n```\n\n#### CRUD 控制器 (runtime/codes/crud/)\n\nCRUD 控制器提供基础的数据操作接口。\n\n```php\n// 自动生成的 CRUD 控制器示例\nnamespace App\\Controller\\User;\n\nuse Swlib\\Controller\\Abstract\\AbstractController;\nuse Swlib\\Router\\Router;\n\n#[Router(method: 'POST')]\nclass Save extends AbstractController\n{\n    #[Router(errorTitle: '保存用户失败')]\n    public function run(UserProto $request): Success\n    {\n        $dto = UserModel::request($request);\n        // ... 保存逻辑\n    }\n}\n\n#[Router(method: 'POST')]\nclass Lists extends AbstractController\n{\n    #[Router(errorTitle: '获取用户列表失败')]\n    public function run(UserProto $request): UserListsProto\n    {\n        // ... 列表查询逻辑\n    }\n}\n\n#[Router(method: 'POST')]\nclass Detail extends AbstractController\n{\n    #[Router(errorTitle: '获取用户详情失败')]\n    public function run(UserProto $request): UserProto\n    {\n        // ... 详情查询逻辑\n    }\n}\n\n#[Router(method: 'POST')]\nclass Remove extends AbstractController\n{\n    #[Router(errorTitle: '删除用户失败')]\n    public function run(UserProto $request): Success\n    {\n        // ... 删除逻辑\n    }\n}\n```\n\n#### 后台管理 (runtime/codes/admin/)\n\n后台管理控制器生成完整的 CRUD 管理界面。\n\n---\n\n### 15.3 字段冲突检测\n\n框架在解析过程中会自动检测字段名冲突，避免生成有问题的代码。\n\n#### 冲突类型\n\n| 冲突类型 | 说明 | 示例 |\n|---------|------|------|\n| Table 类冲突 | 字段名与 PHP 保留字冲突 | `class`, `function`, `namespace` |\n| DTO 类冲突 | 字段名转换后重复 | `user_name` 和 `userName` 转换后相同 |\n\n#### 检测机制\n\n```php\n// 框架会自动检测以下冲突：\n$conflicts = FieldConflictDetector::detect($fields);\n\nif (!empty($conflicts['table'])) {\n    // Table 类冲突\n}\n\nif (!empty($conflicts['dto'])) {\n    // DTO 类冲突\n}\n```\n\n#### 冲突报告示例\n\n```\n========================================\n严重错误：检测到字段名冲突！\n========================================\n\n数据库: wenyuehui\n表名: user\n\n【Table 类冲突】\n  字段: class\n    - 与 PHP 保留字冲突\n\n【DTO 类冲突】\n  字段: user_name\n    - 与 userName 冲突\n\n========================================\n请修改数据库字段名后重新运行解析！\n========================================\n```\n\n#### 保留字段处理\n\n框架会自动重命名某些保留字段：\n\n```php\n// 保留字段会被自动添加前缀\n'class'       → 'field_class'\n'DATABASES'   → 'field_DATABASES'\n'TABLE_NAME'  → 'field_TABLE_NAME'\n'PRI_KEY'     → 'field_PRI_KEY'\n```\n\n---\n\n### 15.4 生成的目录结构\n\n```\nproject/\n├── runtime/\n│   ├── Generate/\n│   │   ├── Tables/                    # Table 类\n│   │   │   └── Wenyuehui/\n│   │   │       ├── UserTable.php\n│   │   │       ├── OrderTable.php\n│   │   │       └── ...\n│   │   ├── TablesDto/                 # DTO 类\n│   │   │   └── Wenyuehui/\n│   │   │       ├── UserTableDto.php\n│   │   │       └── ...\n│   │   └── Models/                    # Model 类\n│   │       └── Wenyuehui/\n│   │           ├── UserModel.php\n│   │           └── ...\n│   └── codes/\n│       ├── crud/                      # CRUD 控制器\n│       │   └── wenyuehui/\n│       │       └── User/\n│       │           ├── Save.php\n│       │           ├── Lists.php\n│       │           ├── Detail.php\n│       │           └── Remove.php\n│       └── admin/                     # 后台管理\n│           └── wenyuehui/\n│               └── User/\n│                   └── UserAdmin.php\n├── protos/                            # Protobuf 文件\n│   └── Wenyuehui/\n│       ├── User.proto\n│       ├── Order.proto\n│       └── field_maps/               # 字段映射缓存\n│           └── Wenyuehui/\n│               └── User.json\n└── ...\n```\n\n---\n\n### 15.5 配置数据库连接\n\n数据库连接配置决定了代码生成的来源和命名空间。\n\n```php\n// .env 配置\nDB_HOST=127.0.0.1\nDB_PORT=3306\nDB_NAME=mydb\nDB_USER=root\nDB_PASS=password\nDB_CHARSET=utf8mb4\n\n// 多数据库配置（在项目中配置）\n'databases' => [\n    'default' => [\n        'host' => '127.0.0.1',\n        'port' => 3306,\n        'database' => 'mydb',\n        'user' => 'root',\n        'pass' => 'password',\n        'charset' => 'utf8mb4',\n        'namespace' => 'Wenyuehui',  // 命名空间\n    ],\n    'slave' => [\n        'host' => '127.0.0.1',\n        'database' => 'slave_db',\n        'namespace' => 'Slave',\n    ],\n],\n```\n\n#### 命名空间映射\n\n| 数据库名 | 命名空间 | 生成的类 |\n|---------|---------|---------|\n| `wenyuehui` | `Wenyuehui` | `Generate\\Tables\\Wenyuehui\\UserTable` |\n| `product_db` | `ProductDb` | `Generate\\Tables\\ProductDb\\ProductTable` |\n\n---\n\n### 15.6 字段元数据注解\n\n生成的 Table 类包含字段元数据注解，用于后台管理等场景。\n\n```php\nuse Swlib\\Table\\Attributes\\FieldMetadata;\n\nclass UserTable\n{\n    #[FieldMetadata(\n        name: 'username',\n        type: 'varchar',\n        comment: '用户名',\n        length: 50,\n        nullable: false\n    )]\n    const string USERNAME = \"t0f1\";\n}\n```\n\n#### 元数据属性\n\n| 属性 | 说明 | 示例 |\n|------|------|------|\n| `name` | 字段名 | `username` |\n| `type` | 数据类型 | `varchar`, `int`, `text` |\n| `comment` | 字段注释 | `用户名` |\n| `length` | 字段长度 | `50` |\n| `nullable` | 是否可空 | `true`, `false` |\n| `default` | 默认值 | `0`, `''` |\n| `enum` | 枚举值 | `['active', 'inactive']` |\n\n---\n\n### 15.7 ORM 生命周期事件\n\n每个生成的 Table 类都包含 ORM 生命周期事件常量。\n\n#### 可用事件\n\n| 事件 | 触发时机 |\n|------|---------|\n| `SelectBefore` | 查询前 |\n| `SelectAfter` | 查询后 |\n| `InsertBefore` | 插入前 |\n| `InsertAfter` | 插入后 |\n| `UpdateBefore` | 更新前 |\n| `UpdateAfter` | 更新后 |\n| `DeleteBefore` | 删除前 |\n| `DeleteAfter` | 删除后 |\n\n#### 使用事件\n\n```php\nuse Generate\\Tables\\UserTable;\nuse Swlib\\Event\\EventEnum;\n\n// 监听用户表的查询后事件\nEventEnum::addListener(UserTable::SelectAfter, function ($data) {\n    $result = $data['result'];\n    Log::info('用户查询完成', ['count' => count($result)]);\n});\n\n// 监听用户表的插入前事件\nEventEnum::addListener(UserTable::InsertBefore, function ($data) {\n    $dto = $data['dto'];\n    // 可以修改 DTO 数据\n    $dto->createdAt = time();\n});\n```\n\n---\n\n### 15.8 API 代码生成\n\n框架支持生成前端 API 调用代码。\n\n#### 支持的前端类型\n\n| 类型 | 目录 | 说明 |\n|------|------|------|\n| TypeScript | `Swlib/Parse/Router/GenApi/` | 用于 Web 前端 |\n| Flutter/Dart | `Swlib/Parse/Router/GenApi/` | 用于移动端 |\n\n#### 生成配置\n\n```php\n// API 生成配置\n'api_gen' => [\n    'enabled' => true,\n    'output_dir' => ROOT_DIR . 'frontend/src/api/',\n    'types' => ['typescript', 'dart'],\n],\n```\n\n---\n\n### 15.9 重新生成代码\n\n#### 方法一：删除 runtime 目录\n\n```bash\nrm -rf runtime/\n# 重启服务，代码会自动重新生成\n```\n\n#### 方法二：删除锁文件\n\n```bash\nrm runtime/lock/create_tables.lock\n# 重启服务\n```\n\n#### 方法三：仅重新生成特定模块\n\n```bash\n# 只删除 Table 类\nrm -rf runtime/Generate/Tables/\n\n# 只删除 Protobuf 文件\nrm -rf protos/Wenyuehui/\n```\n\n---\n\n### 15.10 最佳实践\n\n#### 命名规范\n\n```sql\n-- 推荐：清晰的字段名\nCREATE TABLE users (\n    id INT PRIMARY KEY AUTO_INCREMENT,\n    username VARCHAR(50) COMMENT '用户名',\n    email VARCHAR(100) COMMENT '邮箱',\n    created_at INT COMMENT '创建时间'\n);\n\n-- 不推荐：可能导致冲突的命名\nCREATE TABLE bad_names (\n    class VARCHAR(50),      -- PHP 保留字\n    user_name VARCHAR(50),  -- 与 userName 混淆\n    userName VARCHAR(50)    -- 与 user_name 混淆\n);\n```\n\n#### 字段注释\n\n```sql\n-- 好的注释会生成更好的文档\nCREATE TABLE orders (\n    id INT PRIMARY KEY AUTO_INCREMENT,\n    status TINYINT COMMENT '订单状态：0待支付 1已支付 2已发货 3已完成 4已取消',\n    -- Protobuf 扩展字段\n    id INT COMMENT 'protobuf:ext:json:[\"item:isPaid:bool\", \"item:payTime:int64\"]'\n);\n```\n\n#### 生成后不要手动修改\n\n```\n⚠️ 重要：runtime/ 目录下的文件由框架自动生成\n手动修改的内容会在下次代码生成时被覆盖\n```\n\n#### 版本控制\n\n```gitignore\n# .gitignore 建议配置\n/runtime/\n/protos/\n```\n\n---\n\n### 15.11 故障排查\n\n#### 代码未生成\n\n**可能原因**：\n1. 数据库连接失败\n2. 数据库中没有表\n3. 权限问题\n\n**解决方法**：\n```bash\n# 检查数据库连接\nphp -r \"new mysqli('127.0.0.1', 'root', 'password', 'mydb');\"\n\n# 检查目录权限\nchmod -R 777 runtime/\n```\n\n#### 字段冲突\n\n**症状**：解析器停止并输出冲突信息\n\n**解决方法**：根据提示修改数据库字段名\n\n#### Proto 编译失败\n\n**症状**：`protoc: command not found`\n\n**解决方法**：\n```bash\n# 安装 protoc\nbrew install protobuf  # macOS\napt-get install protobuf-compiler  # Ubuntu\n```\n"}, {"group": "协议与工程化", "file": "6-AOP和代理系统.md", "title": "6. AOP 和代理系统", "markdown": "## 6. AOP 和代理系统\n\nSWLib 提供了强大的 AOP（面向切面编程）支持，通过代理调度系统实现了日志记录、性能监控、缓存、事务管理等横切关注点。\n\n### 快速入口\n\n- 先理解切面执行时机：看 `6.1`\n- 先理解代理调度链路：看 `6.2`\n- 使用事务注解：看 `6.3`\n\n### 常见误用\n\n- 在切面里写重业务逻辑导致链路不可控\n- 未区分 `around` 与 `after` 的副作用边界\n\n### 关联源码\n\n- `Swlib/Aop/*`\n- `Swlib/Proxy/ProxyDispatcher.php`\n- `Swlib/Table/Attributes/Transaction.php`\n\n### 排障索引\n\n- 注解不生效：检查代理编译是否执行（`AstCompiler`）\n- 重复执行：检查切面注册范围与优先级\n\n### 6.1 AOP 切面编程\n\n#### 切面类型\n\n框架提供了四种通知类型：\n\n| 通知类型 | 执行时机 | 用途 |\n|---------|---------|------|\n| `before()` | 目标方法执行前 | 参数验证、权限检查、日志记录 |\n| `after()` | 目标方法成功执行后 | 结果缓存、性能统计、发送通知 |\n| `around()` | 环绕目标方法执行 | 缓存、短路、方法替代 |\n| `afterThrowing()` | 目标方法抛出异常时 | 异常日志、告警、资源清理 |\n\n#### 创建切面\n\n```php\nuse Swlib\\Aop\\Abstract\\AbstractAspect;\nuse Swlib\\Aop\\JoinPoint;\n\nclass LoggingAspect extends AbstractAspect\n{\n    public function before(JoinPoint $joinPoint): void\n    {\n        $args = $joinPoint->getArguments();\n        Log::info(\"方法调用开始: \" . $joinPoint->getMethodName(), [\n            'args' => $args\n        ]);\n    }\n\n    public function after(JoinPoint $joinPoint, mixed $result): void\n    {\n        Log::info(\"方法调用结束: \" . $joinPoint->getMethodName(), [\n            'result' => $result\n        ]);\n    }\n\n    public function afterThrowing(JoinPoint $joinPoint, Throwable $exception): void\n    {\n        Log::error(\"方法调用异常: \" . $joinPoint->getMethodName(), [\n            'error' => $exception->getMessage()\n        ]);\n    }\n}\n```\n\n#### 应用切面\n\n```php\nuse Swlib\\Aop\\Aspects\\LoggingAspect;\nuse Swlib\\Aop\\Aspects\\PerformanceAspect;\n\nclass UserService\n{\n    #[LoggingAspect]\n    #[PerformanceAspect(threshold: 1000)]\n    public function getUserInfo(int $userId): UserTableDto\n    {\n        return new UserTable()->where([\n            UserTable::ID => $userId\n        ])->selectOne();\n    }\n}\n```\n\n#### 内置切面\n\n框架提供了以下内置切面：\n\n| 切面类 | 功能 | 参数 |\n|--------|------|------|\n| `LoggingAspect` | 方法调用日志 | - |\n| `PerformanceAspect` | 性能监控 | `threshold`: 超时阈值(毫秒) |\n| `CachingAspect` | 结果缓存 | `ttl`: 缓存时间, `keyPrefix`: 键前缀 |\n| `ValidationAspect` | 参数验证 | `rules`: 验证规则 |\n| `QueryCleanAspect` | 查询清理 | 清理查询构建器状态 |\n\n### 6.2 代理调度系统\n\n#### 执行流程\n\n代理调度系统按以下阶段执行：\n\n```\n┌─────────────────────────────────────────────────────────────┐\n│ Phase 1: 执行所有 AOP 的 before()                            │\n│ [按 priority 降序]                                           │\n└─────────────────────────────────────────────────────────────┘\n                            ↓\n┌─────────────────────────────────────────────────────────────┐\n│ Phase 2: 构建并执行 handle() pipeline                        │\n│ [按 priority 降序，形成责任链]                               │\n│   Stage1::handle() → Stage2::handle() → ... → 原方法        │\n└─────────────────────────────────────────────────────────────┘\n                            ↓\n┌─────────────────────────────────────────────────────────────┐\n│ Phase 3: 执行所有 AOP 的 after()                             │\n│ [按 priority 降序]                                           │\n└─────────────────────────────────────────────────────────────┘\n                            ↓ (异常时)\n┌─────────────────────────────────────────────────────────────┐\n│ Exception: 执行所有 AOP 的 afterThrowing()                   │\n│ [按 priority 降序]                                           │\n└─────────────────────────────────────────────────────────────┘\n```\n\n#### 链路信息\n\n```php\nuse Swlib\\Proxy\\ProxyContext;\n\n// 获取最近一次调度的链路信息\n$result = ProxyContext::pop();\n\n// 获取调度结果\n$originalResult = $result->getResult();        // 原方法返回值\n$proxyResults = $result->getProxyResults();   // 各注解执行结果\n$isShortCircuited = $result->isShortCircuited(); // 是否短路\n```\n\n### 6.3 事务管理\n\n`#[Transaction]` 注解是 AOP 在事务管理中的应用实例。\n\n#### 基本用法\n\n```php\nuse Swlib\\Table\\Attributes\\Transaction;\n\n#[Transaction(\n    dbName: 'default',\n    isolationLevel: Db::ISOLATION_READ_COMMITTED,\n    timeout: 30,\n    logTransaction: true\n)]\npublic function createOrder(int $userId, array $items): int\n{\n    // 方法内的所有数据库操作都会在同一事务中执行\n    // 任何异常都会自动回滚\n}\n```\n\n#### 工作原理\n\n`#[Transaction]` 注解实现了 `ProxyAttributeInterface` 接口：\n\n```php\npublic function handle(array $ctx, callable $next): mixed\n{\n    return Db::transaction(\n        call: static fn() => $next($ctx),\n        dbName: $this->dbName,\n        isolationLevel: $this->isolationLevel,\n        timeout: $this->timeout,\n        enableLog: $this->logTransaction\n    );\n}\n```\n\n**详细的事务管理内容**（隔离级别、嵌套事务、跨库限制、事件监控等）请参阅 [3.6 事务管理](docs/3-数据库操作-ORM.md#36-事务管理)。\n"}, {"group": "协议与工程化", "file": "18-工具类.md", "title": "18. 工具类", "markdown": "## 18. 工具类\n\nSWLib 框架提供了一套丰富的工具类，位于 `Swlib\\Utils` 命名空间下，涵盖日志、文件操作、字符串转换、HTTP 请求、加密等常用功能。\n\n### 快速入口\n\n- 查日志与异常落盘：看 `18.2`\n- 查文件与缓存工具：看 `18.3` 与 `18.13`\n- 查签名与加密：看 `18.9`\n\n### 常见误用\n\n- 在高频链路里滥用同步 HTTP 工具导致阻塞\n- 日志未分级导致排障噪音过大\n\n### 关联源码\n\n- `Swlib/Utils/Log.php`\n- `Swlib/Utils/Http.php`\n- `Swlib/Utils/Crypto.php`\n\n### 排障索引\n\n- 签名不一致：检查参与签名字段顺序与字符编码\n- 文件缓存命中异常：检查 key 与过期时间策略\n\n### 18.1 工具类概览\n\n| 类 | 功能 | 核心方法 |\n|----|------|---------|\n| `Log` | 日志记录 | `info()`, `error()`, `debug()`, `warning()`, `saveException()` |\n| `File` | 文件和目录操作 | `save()`, `eachDir()`, `copyDirectory()`, `delDirectory()` |\n| `StringConverter` | 字符串命名转换 | `underscoreToCamelCase()`, `camelCaseToUnderscore()` |\n| `DataConverter` | 数据格式转换 | `convertToArray()`, `exportShort()` |\n| `Url` | URL 生成和处理 | `generateUrl()`, `appendQueryParams()`, `isAdmin()` |\n| `Http` | HTTP 请求 | `get()`, `post()`, `responseArray()`, `responseOriginal()` |\n| `Ip` | IP 地址处理 | `get()`, `isLocal()` |\n| `Crypto` | 加密签名 | `hmacSha256()`, `sign()` |\n| `Cookie` | Cookie 操作 | `set()`, `get()`, `delete()`, `has()` |\n| `Twig` | 模板引擎 | `getInstance()` |\n| `TypeHelper` | 类型助手 | `getDefaultValueForProperty()`, `isPropertyNullable()` |\n| `FileCache` | 文件缓存 | `get()`, `set()`, `delete()`, `clearExpire()` |\n| `DevSslCert` | 开发环境 SSL 证书 | `ensureCertificate()`, `generateAndGetConfig()` |\n\n---\n\n### 18.2 Log 日志工具\n\n`Log` 类提供多级别的日志记录功能，日志按日期存储在 `runtime/log/{日期}/` 目录下。\n\n#### 日志级别\n\n```php\nuse Swlib\\Utils\\Log;\n\n// 调试级别 - 仅在开发环境记录\nLog::debug('调试信息', ['user_id' => 123], 'user');\n\n// 信息级别 - 记录一般信息\nLog::info('用户登录', ['user_id' => 123, 'ip' => '192.168.1.1'], 'auth');\n\n// 警告级别 - 记录警告信息\nLog::warning('库存不足', ['product_id' => 456, 'stock' => 5], 'inventory');\n\n// 错误级别 - 记录错误信息\nLog::error('支付失败', ['order_id' => 789, 'error' => 'timeout'], 'payment');\n```\n\n#### 基本日志记录\n\n```php\nuse Swlib\\Utils\\Log;\n\n// 简单日志\nLog::save('这是一条日志消息', 'custom');\n\n// 支持数组和字符串\nLog::write(['key' => 'value', 'data' => [1, 2, 3]], 'module_name');\n\n// 仅在非生产环境记录\nLog::debugOnly('调试信息，生产环境不会记录', ['context' => 'data']);\n```\n\n#### 异常日志\n\n```php\nuse Swlib\\Utils\\Log;\n\ntry {\n    // 业务代码\n    throw new Exception('测试异常');\n} catch (Exception $e) {\n    // 记录异常完整堆栈\n    Log::saveException($e, 'error');\n\n    // 或获取格式化的异常信息\n    $traceMsg = Log::getTraceMsg($e);\n    Log::save($traceMsg, 'exception');\n}\n```\n\n#### 批量日志\n\n```php\nuse Swlib\\Utils\\Log;\n\nLog::batch([\n    ['message' => '日志1', 'context' => [], 'module' => 'module1', 'level' => 'info'],\n    ['message' => '日志2', 'context' => ['key' => 'value'], 'module' => 'module2', 'level' => 'error'],\n    ['message' => '日志3', 'module' => 'module3'], // 默认 info 级别\n]);\n```\n\n#### 日志文件位置\n\n```\nruntime/\n└── log/\n    └── 20240115/\n        ├── info.log        # Log::info() 产生\n        ├── error.log       # Log::error() 产生\n        ├── debug.log       # Log::debug() 产生\n        ├── warning.log     # Log::warning() 产生\n        └── custom.log      # Log::save($msg, 'custom') 产生\n```\n\n日志格式示例：\n```\n[14:30:25] [request_id_123] [/api/user/info] [INFO] 用户登录 {\"user_id\":123}\n```\n\n---\n\n### 18.3 File 文件操作工具\n\n`File` 类提供文件和目录的常用操作方法。\n\n#### 保存文件\n\n```php\nuse Swlib\\Utils\\File;\n\n// 保存内容到文件（自动创建目录）\nFile::save('/path/to/file.txt', '文件内容');\n\n// 追加内容\nFile::save('/path/to/file.txt', \"\\n追加内容\", true);\n\n// 保存数组为 JSON\nFile::save('/path/to/data.json', json_encode(['key' => 'value']));\n```\n\n#### 目录遍历\n\n```php\nuse Swlib\\Utils\\File;\n\n// 遍历目录下所有文件\n$files = File::eachDir('/path/to/directory');\n\n// 带过滤条件（只获取 .php 文件）\n$phpFiles = File::eachDir('/path/to/directory', function ($filePath) {\n    return str_ends_with($filePath, '.php');\n});\n\n// 带过滤条件（排除特定目录）\n$files = File::eachDir('/path/to/directory', function ($filePath) {\n    return !str_contains($filePath, '/vendor/');\n});\n```\n\n#### 目录复制\n\n```php\nuse Swlib\\Utils\\File;\n\n// 递归复制整个目录\nFile::copyDirectory('/source/dir', '/target/dir');\n```\n\n#### 目录删除\n\n```php\nuse Swlib\\Utils\\File;\n\n// 递归删除目录及其内容\nFile::delDirectory('/path/to/directory');\n\n// 确保目录存在\nFile::ensureDirectoryExists('/path/to/new/directory');\n```\n\n---\n\n### 18.4 StringConverter 字符串转换工具\n\n`StringConverter` 类提供驼峰命名和下划线命名之间的转换功能。\n\n#### 下划线转驼峰\n\n```php\nuse Swlib\\Utils\\StringConverter;\n\n// 小驼峰（默认）\n$camelCase = StringConverter::underscoreToCamelCase('user_id', '_', false);\n// 结果：'userId'\n\n// 大驼峰\n$pascalCase = StringConverter::underscoreToCamelCase('user_name', '_', true);\n// 结果：'UserName'\n\n// 处理中划线\n$camelCase = StringConverter::underscoreToCamelCase('user-profile', '-', false);\n// 结果：'userProfile'\n```\n\n#### 驼峰转下划线\n\n```php\nuse Swlib\\Utils\\StringConverter;\n\n$underscore = StringConverter::camelCaseToUnderscore('userId');\n// 结果：'user_id'\n\n$underscore = StringConverter::camelCaseToUnderscore('XMLHttpRequest');\n// 结果：'xml_http_request'\n\n// 使用中划线\n$dash = StringConverter::camelCaseToUnderscore('userName', '-');\n// 结果：'user-name'\n```\n\n#### 数组键名批量转换\n\n```php\nuse Swlib\\Utils\\StringConverter;\n\n// 数据库返回的下划线键名转换为驼峰\n$dbData = [\n    'user_id' => 1,\n    'user_name' => 'John',\n    'created_at' => '2024-01-01',\n];\n\n$camelCaseData = StringConverter::convertArrayKeysToCamelCase($dbData);\n// 结果：\n// [\n//     'userId' => 1,\n//     'userName' => 'John',\n//     'createdAt' => '2024-01-01',\n// ]\n\n// 递归转换多维数组\n$nested = [\n    'user_info' => [\n        'first_name' => 'John',\n        'last_name' => 'Doe',\n    ],\n];\n$result = StringConverter::convertArrayKeysToCamelCase($nested, true);\n```\n\n#### 获取前缀\n\n```php\nuse Swlib\\Utils\\StringConverter;\n\n$prefix = StringConverter::getPrefixBeforeUnderscore('user_id');\n// 结果：'user'\n\n$prefix = StringConverter::getPrefixBeforeUnderscore('simple');\n// 结果：'simple'\n```\n\n---\n\n### 18.5 DataConverter 数据转换工具\n\n`DataConverter` 类提供数据格式转换功能。\n\n#### 转换为数组\n\n```php\nuse Swlib\\Utils\\DataConverter;\n\n// JSON 字符串转数组\n$arr = DataConverter::convertToArray('[1,2,3]');\n// 结果：[1, 2, 3]\n\n// 逗号分隔字符串转数组\n$arr = DataConverter::convertToArray('1,2,3');\n// 结果：['1', '2', '3']\n\n// 已是数组直接返回\n$arr = DataConverter::convertToArray([1, 2, 3]);\n// 结果：[1, 2, 3]\n\n// 数字转为单元素数组\n$arr = DataConverter::convertToArray(123);\n// 结果：[123]\n\n// null 或空字符串返回空数组\n$arr = DataConverter::convertToArray(null);\n// 结果：[]\n```\n\n#### PHP 值导出（短语法）\n\n```php\nuse Swlib\\Utils\\DataConverter;\n\n// 基本类型\necho DataConverter::exportShort(null);      // 'null'\necho DataConverter::exportShort(true);      // 'true'\necho DataConverter::exportShort(false);     // 'false'\necho DataConverter::exportShort(123);       // '123'\necho DataConverter::exportShort('hello');   // \"'hello'\"\n\n// 数组（使用 [] 语法）\necho DataConverter::exportShort([1, 2, 3]);\n// 结果：\n// [\n//     0,\n//     1,\n//     2,\n// ]\n\n// 关联数组\necho DataConverter::exportShort(['name' => 'John', 'age' => 25]);\n// 结果：\n// [\n//     'name' => 'John',\n//     'age' => 25,\n// ]\n```\n\n---\n\n### 18.6 Url URL 生成工具\n\n`Url` 类用于生成和处理 URL，支持传统的 Query 模式和 PathInfo 模式。\n\n#### 生成 URL\n\n```php\nuse Swlib\\Utils\\Url;\n\n// 生成基于当前控制器的 URL（默认 PathInfo 模式）\n$url = Url::generateUrl('user-detail', ['id' => 123]);\n// 结果：'/module/user-detail/id/123'\n\n// Query 模式\n$url = Url::generateUrl('user-list', ['page' => 1], [], true, 'query');\n// 结果：'/module/user-list?page=1'\n\n// 绝对路径直接返回\n$url = Url::generateUrl('/absolute/path', ['id' => 1]);\n// 结果：'/absolute/path/id/1'\n\n// 外部 URL 只追加 query 参数\n$url = Url::generateUrl('https://example.com/api', ['key' => 'value']);\n// 结果：'https://example.com/api?key=value'\n```\n\n#### 参数合并和删除\n\n```php\nuse Swlib\\Utils\\Url;\n\n// 合并当前请求参数\n$url = Url::generateUrl('action', ['new_param' => 'value']);\n\n// 不合并当前请求参数\n$url = Url::generateUrl('action', ['id' => 1], [], false);\n\n// 删除指定参数\n$url = Url::generateUrl('action', ['page' => 2], ['sort', 'order']);\n```\n\n#### 追加 Query 参数\n\n```php\nuse Swlib\\Utils\\Url;\n\n$url = Url::appendQueryParams('/api/users', ['page' => 1, 'size' => 10]);\n// 结果：'/api/users?page=1&size=10'\n\n// URL 已有参数时使用 & 连接\n$url = Url::appendQueryParams('/api/users?status=1', ['page' => 1]);\n// 结果：'/api/users?status=1&page=1'\n```\n\n#### 检查后台路由\n\n```php\nuse Swlib\\Utils\\Url;\n\nif (Url::isAdmin($uri)) {\n    // 这是后台管理路由\n}\n```\n\n---\n\n### 18.7 Http HTTP 请求工具\n\n`Http` 类封装了 cURL，提供简洁的 HTTP 请求接口。\n\n#### GET 请求\n\n```php\nuse Swlib\\Utils\\Http;\n\n// GET 请求\n$http = new Http();\n$http->setTimeout(30);\n\n$response = $http->get('https://api.example.com/users', [\n    'page' => 1,\n    'size' => 10\n])->responseArray();\n\n// 获取原始响应\n$raw = $http->get('https://api.example.com/data')->responseOriginal();\n```\n\n#### POST 请求\n\n```php\nuse Swlib\\Utils\\Http;\n\n$http = new Http();\n\n// POST 表单数据\n$response = $http->post('https://api.example.com/users', [\n    'name' => 'John',\n    'email' => 'john@example.com'\n])->responseArray();\n\n// POST JSON 数据\n$http->setCustomHeaders(['Content-Type:application/json']);\n$response = $http->post('https://api.example.com/users', json_encode([\n    'name' => 'John',\n    'email' => 'john@example.com'\n]))->responseArray();\n```\n\n#### 自定义请求头\n\n```php\nuse Swlib\\Utils\\Http;\n\n$http = new Http();\n\n// 设置自定义头部（注意格式）\n$http->setCustomHeaders([\n    'Content-Type:application/json',\n    'Authorization:Bearer token123',\n    'X-API-Key:abc123'\n]);\n\n$response = $http->get('https://api.example.com/protected')->responseArray();\n```\n\n#### 设置超时\n\n```php\nuse Swlib\\Utils\\Http;\n\n$http = new Http();\n$http->setTimeout(60); // 60秒超时\n\n$response = $http->get('https://api.example.com/slow')->responseArray();\n```\n\n---\n\n### 18.8 IP 地址工具\n\n`Ip` 类用于获取客户端 IP 和判断 IP 类型。\n\n#### 获取客户端 IP\n\n```php\nuse Swlib\\Utils\\Ip;\n\n$ip = Ip::get();\n// 返回客户端真实 IP，支持代理场景\n// 优先级：X-Real-IP > X-Forwarded-For > Remote-Addr\n```\n\n#### 判断本地 IP\n\n```php\nuse Swlib\\Utils\\Ip;\n\n// 检查是否为本地/私有 IP\nif (Ip::isLocal('192.168.1.1')) {\n    // 是本地 IP\n}\n\nif (Ip::isLocal('127.0.0.1')) {\n    // 是回环地址\n}\n\nif (Ip::isLocal('10.0.0.1')) {\n    // 是私有地址\n}\n\nif (Ip::isLocal('::1')) {\n    // 是 IPv6 回环地址\n}\n```\n\n---\n\n### 18.9 Crypto 加密工具\n\n`Crypto` 类提供 HMAC-SHA256 签名功能，用于 API 签名验证。\n\n#### HMAC-SHA256 签名\n\n```php\nuse Swlib\\Utils\\Crypto;\n\n// 计算 HMAC-SHA256\n$signature = Crypto::hmacSha256('message', 'secret_key');\n// 返回十六进制格式的签名\n```\n\n#### API 签名生成\n\n```php\nuse Swlib\\Utils\\Crypto;\n\n// 生成 API 签名\n$url = '/api/v1/users';\n$random = bin2hex(random_bytes(16));\n$timestamp = (string)time();\n$appSecret = 'your_app_secret';\n\n$signature = Crypto::sign($url, $random, $timestamp, $appSecret);\n\n// 发送请求时携带签名\n// Headers:\n//   X-Signature: $signature\n//   X-Nonce: $random\n//   X-Timestamp: $timestamp\n```\n\n#### 签名验证示例\n\n```php\n// 服务端验证签名\n$receivedSignature = $request->header['x-signature'];\n$nonce = $request->header['x-nonce'];\n$timestamp = $request->header['x-timestamp'];\n\n$expectedSignature = Crypto::sign($uri, $nonce, $timestamp, $appSecret);\n\nif (!hash_equals($expectedSignature, $receivedSignature)) {\n    throw new AppException('签名验证失败');\n}\n```\n\n---\n\n### 18.10 Cookie 操作工具\n\n`Cookie` 类封装了 Cookie 的读写操作，支持 Swoole 环境。\n\n#### 设置 Cookie\n\n```php\nuse Swlib\\Utils\\Cookie;\n\n// 基本设置\nCookie::set('session_id', 'abc123', 3600); // 1小时过期\n\n// 完整参数\nCookie::set(\n    key: 'user_token',\n    value: 'xyz789',\n    expire: 86400,      // 过期时间（秒）\n    path: '/',          // 路径\n    domain: '.example.com', // 域名\n    secure: true,       // 仅 HTTPS\n    httpOnly: true,     // 仅 HTTP 访问\n    sameSite: 'Strict'  // SameSite 属性\n);\n```\n\n#### 获取 Cookie\n\n```php\nuse Swlib\\Utils\\Cookie;\n\n// 获取 Cookie 值\n$sessionId = Cookie::get('session_id');\n\n// 带默认值\n$theme = Cookie::get('theme', 'light');\n\n// 检查 Cookie 是否存在\nif (Cookie::has('user_token')) {\n    // Cookie 存在\n}\n```\n\n#### 删除 Cookie\n\n```php\nuse Swlib\\Utils\\Cookie;\n\n// 删除 Cookie\nCookie::delete('session_id');\n\n// 删除指定路径和域名的 Cookie\nCookie::delete('user_token', '/', '.example.com');\n```\n\n#### 项目隔离\n\n```php\nuse Swlib\\Utils\\Cookie;\n\n// Cookie 名称会自动添加项目唯一标识前缀\n$actualKey = Cookie::getKey('session');\n// 结果：'session:project_unique_id'\n\n// 这样不同项目可以使用相同的 Cookie 名称而不会冲突\n```\n\n---\n\n### 18.11 Twig 模板引擎\n\n`Twig` 类是对 Twig 模板引擎的封装，用于后台管理系统的视图渲染。\n\n#### 获取实例\n\n```php\nuse Swlib\\Utils\\Twig;\n\n$twig = Twig::getInstance();\n$twigEnv = $twig->twig; // 获取 Twig\\Environment 实例\n```\n\n#### 渲染模板\n\n```php\nuse Swlib\\Utils\\Twig;\n\n$twig = Twig::getInstance();\n$html = $twig->twig->render('user/list.html', [\n    'users' => $users,\n    'page' => $page,\n]);\n```\n\n#### 模板目录\n\n模板目录优先级：\n1. `ROOT_DIR/templates/` - 项目自定义模板\n2. `SWLIB_DIR/Admin/Templates/` - 框架默认模板\n3. `SWLIB_DIR/DevTool/Templates/` - 开发工具模板（仅非生产环境）\n\n#### 内置函数\n\nTwig 模板中可使用以下内置函数：\n\n```twig\n{# 生成 URL #}\n<a href=\"{{ url('user-detail', {'id': user.id}) }}\">查看详情</a>\n\n{# 获取翻译 #}\n<span>{{ lang('user.login') }}</span>\n\n{# 获取字段别名 #}\n<option value=\"{{ field }}\">{{ getFieldAsByName(tableName, field) }}</option>\n\n{# 获取当前操作名称 #}\n{% if getCurrentAction() == 'edit' %}\n    {# 编辑页面 #}\n{% endif %}\n\n{# 获取后台布局管理器 #}\n{% set layout = adminLayout() %}\n\n{# 获取当前登录管理员 #}\n{% set adminUser = adminUser() %}\n```\n\n---\n\n### 18.12 TypeHelper 类型助手\n\n`TypeHelper` 类提供与 PHP 类型相关的实用方法。\n\n#### 获取属性默认值\n\n```php\nuse Swlib\\Utils\\TypeHelper;\n\nclass User {\n    public string $name;\n    public ?int $age;\n    public array $tags = [];\n    public bool $active;\n}\n\n$user = new User();\n\n// 根据属性类型获取默认值\n$defaultName = TypeHelper::getDefaultValueForProperty($user, 'name');   // ''\n$defaultAge = TypeHelper::getDefaultValueForProperty($user, 'age');     // null\n$defaultTags = TypeHelper::getDefaultValueForProperty($user, 'tags');   // []\n$defaultActive = TypeHelper::getDefaultValueForProperty($user, 'active'); // false\n```\n\n#### 检查属性是否可为空\n\n```php\nuse Swlib\\Utils\\TypeHelper;\n\nclass Example {\n    public string $required;      // 不可为空\n    public ?string $optional;     // 可为空\n    public string|null $union;    // 联合类型，可为空\n}\n\n$obj = new Example();\n\nTypeHelper::isPropertyNullable($obj, 'required');  // false\nTypeHelper::isPropertyNullable($obj, 'optional');  // true\nTypeHelper::isPropertyNullable($obj, 'union');     // true\n```\n\n#### 获取属性类型名称\n\n```php\nuse Swlib\\Utils\\TypeHelper;\n\nclass User {\n    public string $name;\n    public ?int $age;\n}\n\n$user = new User();\n\nTypeHelper::getPropertyTypeName($user, 'name'); // 'string'\nTypeHelper::getPropertyTypeName($user, 'age');  // 'int' (返回第一个非 null 类型)\n```\n\n#### 安全设置属性值\n\n```php\nuse Swlib\\Utils\\TypeHelper;\n\nclass User {\n    public string $name;\n    public int $age;\n}\n\n$user = new User();\n\n// 如果值为 null 且属性不允许为空，自动设置默认值\nTypeHelper::safeSetProperty($user, 'name', null);  // $user->name = ''\nTypeHelper::safeSetProperty($user, 'age', null);   // $user->age = 0\n\n// 正常设置值\nTypeHelper::safeSetProperty($user, 'name', 'John'); // $user->name = 'John'\n```\n\n#### 类型默认值映射\n\n```php\nuse Swlib\\Utils\\TypeHelper;\n\nTypeHelper::getDefaultValueByTypeName('string');   // ''\nTypeHelper::getDefaultValueByTypeName('int');      // 0\nTypeHelper::getDefaultValueByTypeName('float');    // 0.0\nTypeHelper::getDefaultValueByTypeName('bool');     // false\nTypeHelper::getDefaultValueByTypeName('array');    // []\nTypeHelper::getDefaultValueByTypeName('object');   // null\n```\n\n---\n\n### 18.13 FileCache 文件缓存\n\n`FileCache` 类提供基于文件的缓存功能，支持多级目录存储。\n\n#### 基本操作\n\n```php\nuse Swlib\\Utils\\FileCache;\n\n// 设置缓存（默认 24 小时过期）\nFileCache::set('cache_key', ['data' => 'value']);\n\n// 设置缓存并指定过期时间（秒）\nFileCache::set('user_profile_123', $profile, 3600); // 1小时\n\n// 获取缓存\n$data = FileCache::get('cache_key');\nif ($data !== null) {\n    // 缓存命中\n} else {\n    // 缓存不存在或已过期\n}\n\n// 删除缓存\nFileCache::delete('cache_key');\n```\n\n#### 缓存穿透保护\n\n```php\nuse Swlib\\Utils\\FileCache;\n\n// 使用缓存穿透保护模式\n$user = FileCache::get(\"user_{$id}\");\nif ($user === null) {\n    $user = new UserTable()->where([UserTable::ID => $id])->selectOne();\n    if ($user !== null) {\n        FileCache::set(\"user_{$id}\", $user, 300);\n    }\n}\n```\n\n#### 清理过期缓存\n\n```php\nuse Swlib\\Utils\\FileCache;\n\n// 清理所有过期缓存\nFileCache::clearExpire();\n\n// 清理指定时间之前修改的文件\nFileCache::clearExpire(strtotime('-7 days'));\n```\n\n#### 缓存存储结构\n\n缓存文件存储在 `runtime/cache/distributed_file_cache/` 目录下，使用多级目录结构：\n\n```\nruntime/cache/distributed_file_cache/\n├── ab/\n│   └── cd/\n│       └── ef/\n│           └── gh/\n│               └── ij/\n│                   └── kl/\n│                       └── mn/\n│                           └── op/\n│                               └── qr/\n│                                   └── stuvwxyz123456.cache\n```\n\n---\n\n### 18.14 DevSslCert 开发环境 SSL 证书\n\n`DevSslCert` 类用于管理开发环境的自签名 SSL 证书。\n\n#### 获取证书配置\n\n```php\nuse Swlib\\Utils\\DevSslCert;\n\n// 生成或获取现有证书，返回 Swoole SSL 配置\n$config = DevSslCert::generateAndGetConfig($swooleConfig);\n```\n\n#### 证书文件位置\n\n证书存放在用户目录下，多个项目共用：\n\n```php\nuse Swlib\\Utils\\DevSslCert;\n\n$sslDir = DevSslCert::getSslDir();    // ~/.swlib-ssl/\n$certFile = DevSslCert::getCertFile(); // ~/.swlib-ssl/cert.pem\n$keyFile = DevSslCert::getKeyFile();   // ~/.swlib-ssl/key.pem\n$iosCert = DevSslCert::getIosCertFile(); // ~/.swlib-ssl/cert_ios.cer\n```\n\n#### 自动证书管理\n\n```php\nuse Swlib\\Utils\\DevSslCert;\n\n// 确保证书存在且有效\n// 如果证书不存在或 IP 变化，会自动重新生成\nDevSslCert::ensureCertificate();\n```\n\n#### iOS 证书\n\n生成的 iOS 证书（DER 格式）可以安装在 iOS 设备上，用于 HTTPS 调试：\n\n1. 访问 `https://your-server-ip/cert_ios.cer`\n2. 下载并安装证书\n3. 在 设置 > 通用 > 关于本机 > 证书信任设置 中启用信任\n\n---\n\n### 18.15 使用建议\n\n#### 日志规范\n\n```php\n// 推荐：使用语义化的日志级别和模块名\nLog::info('订单创建成功', [\n    'order_id' => $orderId,\n    'user_id' => $userId,\n    'amount' => $amount\n], 'order');\n\n// 推荐：异常日志使用 saveException\ntry {\n    // ...\n} catch (Exception $e) {\n    Log::saveException($e, 'payment');\n    throw $e;\n}\n\n// 不推荐：硬编码消息\nLog::save(\"用户 $userId 登录失败\"); // 难以搜索和分析\n```\n\n#### HTTP 请求规范\n\n```php\n// 推荐：设置合理的超时时间\n$http = new Http();\n$http->setTimeout(10);\n\n// 推荐：处理异常\ntry {\n    $response = $http->get($url)->responseArray();\n} catch (AppException $e) {\n    Log::error('API请求失败', ['url' => $url, 'error' => $e->getMessage()]);\n    throw new AppException('服务暂时不可用');\n}\n```\n\n#### 缓存使用规范\n\n```php\n// 推荐：使用有意义的缓存键名\nFileCache::set(\"user:profile:{$userId}\", $profile, 3600);\n\n// 推荐：处理缓存穿透\n$data = FileCache::get($key) ?? $this->fetchFromDatabase($id);\n\n// 不推荐：缓存过大的数据\nFileCache::set('large_list', $hugeArray); // 可能导致内存问题\n```\n"}, {"group": "协议与工程化", "file": "20-最佳实践.md", "title": "20. 最佳实践", "markdown": "## 20. 最佳实践\n\n本章节提供使用 SWLib 框架开发应用时的最佳实践建议。\n\n### 快速入口\n\n- 项目结构与命名：看 `20.1`\n- ORM 与异常规范：看 `20.2` 与 `20.3`\n- 性能与安全：看 `20.4` 与 `20.5`\n\n### 常见误用\n\n- 先写实现后补规范，导致返工成本高\n- 把生成目录当手写目录维护\n\n### 关联源码\n\n- `Swlib/Table/*`\n- `Swlib/Exception/*`\n- `Swlib/Parse/*`\n\n### 排障索引\n\n- 线上性能抖动：先检查 SQL、连接池和异步任务边界\n- 安全漏洞风险：优先排查输入校验与 SQL 条件构建\n\n### 20.1 代码组织\n\n#### 目录结构建议\n\n```\nApp/\n├── Controller/          # 控制器\n│   ├── Api/            # API 控制器\n│   └── Admin/          # 后台控制器\n├── Service/            # 服务层\n├── Model/              # 模型层\n├── Event/              # 事件\n│   ├── Events/         # 事件定义\n│   └── Listeners/      # 事件监听器\n├── Process/            # 自定义进程\n├── Middleware/         # 中间件\n└── Utils/              # 工具类\n```\n\n#### 命名规范\n\n| 类型 | 规范 | 示例 |\n|------|------|------|\n| 类名 | PascalCase | `UserController` |\n| 方法名 | camelCase | `getUserInfo` |\n| 常量 | UPPER_SNAKE_CASE | `MAX_RETRY_COUNT` |\n| 变量 | camelCase | `$userId` |\n\n### 20.2 ORM 使用规范\n\n#### 优先使用 DTO 对象\n\n```php\n// ✅ 推荐：使用 DTO 对象\n$user = new UserTable()->where([UserTable::ID => $id])->selectOne();\necho $user->username;\n\n// ❌ 避免：使用数组\n$user = new UserTable()->where([UserTable::ID => $id])->selectOne()->toArray();\necho $user['username'];\n```\n\n#### 只查询需要的字段\n\n```php\n// ✅ 推荐：只查询需要的字段\n$user = new UserTable()\n    ->field([UserTable::ID, UserTable::USERNAME, UserTable::EMAIL])\n    ->where([UserTable::ID => $id])\n    ->selectOne();\n\n// ❌ 避免：查询所有字段\n$user = new UserTable()->where([UserTable::ID => $id])->selectOne();\n```\n\n#### 使用 DTO 转换 Protobuf\n\n```php\n// ✅ 推荐：使用格式化方法\n$user = new UserTable()->where([UserTable::ID => $id])->selectOne();\nreturn UserModel::formatItem($user);\n\n// ❌ 避免：手动转换\n$proto = new UserProto();\n$proto->setId($user->id);\n$proto->setUsername($user->username);\n// ...\n```\n\n### 20.3 异常处理规范\n\n#### 始终使用 AppErr 常量\n\n```php\n// ✅ 推荐：使用 AppErr 常量\nthrow new AppException(AppErr::PARAM_ERROR);\n\n// ❌ 避免：硬编码消息\nthrow new AppException('参数错误');\n```\n\n#### 选择正确的异常类型\n\n| 场景 | 异常类型 |\n|------|----------|\n| 一般错误 | `AppException` |\n| 用户未登录 | `UnauthorizedException` |\n| Token 过期 | `TokenExpiredException` |\n| 需要重定向 | `RedirectException` |\n\n### 20.4 性能优化\n\n#### 数据库查询优化\n\n```php\n// 使用缓存\n$users = new UserTable()\n    ->where([UserTable::STATUS => 1])\n    ->cache(300)  // 缓存 5 分钟\n    ->selectAll();\n\n// 使用分页\n$users = new UserTable()\n    ->page(1, 20)\n    ->selectAll();\n```\n\n#### 连接池使用\n\n```php\n// ✅ 推荐：使用连接池\nPoolRedis::call(function (Redis $redis) {\n    return $redis->get('key');\n});\n\n// 缓存辅助\nPoolRedis::getSet(\n    key: 'cache_key',\n    call: fn() => new UserTable()->selectAll(),\n    expire: 3600\n);\n```\n\n### 20.5 安全建议\n\n#### 输入验证\n\n```php\nclass UserController extends AbstractController\n{\n    public function update(): Success\n    {\n        // 验证输入\n        $id = $this->get('id', '用户ID不能为空');\n        $username = $this->post('username', '用户名不能为空');\n\n        // 验证权限\n        if (!$this->canEditUser($id)) {\n            throw new AppException(AppErr::ADMIN_PERMISSION_DENIED);\n        }\n\n        // 更新数据\n        new UserTable()->where([UserTable::ID => $id])->update([\n            UserTable::USERNAME => $username\n        ]);\n\n        return new Success();\n    }\n}\n```\n\n#### SQL 注入防护\n\n```php\n// ✅ 推荐：使用参数化查询\n$users = new UserTable()->where([\n    [UserTable::NAME, 'like', \"%{$keyword}%\"]\n])->selectAll();\n\n// ❌ 避免：字符串拼接\n$sql = \"SELECT * FROM users WHERE name LIKE '%{$keyword}%'\";\n```\n\n### 20.6 代码风格\n\n#### 避免不必要的括号\n\n```php\n// ✅ 推荐：简洁风格\necho \"welcome $name\";\n\n// ❌ 避免：不必要的括号\necho \"welcome {$name}\";\n\n// ✅ 推荐：省略 new 调用周围的圆括号\n$user = new UserTable();\n\n// ❌ 避免：多余的括号\n$user = (new UserTable());\n```\n\n#### 常量使用\n\n```php\n// ✅ 推荐：使用字段常量\nnew UserTable()->field([UserTable::ID, UserTable::USERNAME]);\n\n// ❌ 避免：使用字符串\nnew UserTable()->field(['id', 'username']);\n```\n\n### 20.7 项目规范参考\n\n- **API 设计**: 每个 API 独立一个类，私有方法放在 run 下方\n- **服务层**: 除非特别通用，多个地方用到的服务才设计服务层 Service\n- **异常处理**: backed/App 里的文件使用 backed/App/Exception/AppErr.php；backed/Swlib 里面的文件使用 backed/Swlib/Exception/AppErr.php\n- **文案管理**: 前端的所有文案也要使用统一的文案管理类\n- **禁止修改**: 不要修改 backed/runtime 和 backed/protos 里面的文件（框架自动生成）\n\n---\n\n## 总结\n\nSWLib 是一个功能完整、性能优异的现代 PHP 框架，提供了：\n\n- **高性能**: 基于 Swoole 协程，支持高并发\n- **完整的 ORM**: 自动生成、类型安全、功能丰富\n- **现代化设计**: PHP 8.4+ 注解、AOP、事件驱动\n- **开箱即用**: 后台管理、权限控制、队列系统\n- **企业级特性**: 连接池、缓存、监控、日志\n\n通过本文档，您可以快速上手并充分利用 SWLib 框架的各项功能来构建高质量的 Web 应用。\n\n---\n\n**文档版本**: 3.0\n**最后更新**: 2026-01-29\n**框架版本**: SWLib 3.x\n**PHP 版本要求**: >= 8.4\n**Swoole 版本要求**: >= 6.0.0\n"}], "warnings": []}

  <script>
    const payload = JSON.parse(document.getElementById("payload").textContent);
    const nav = document.getElementById("nav");
    const content = document.getElementById("content");
    const searchInput = document.getElementById("searchInput");
    const meta = document.getElementById("meta");

    meta.textContent = `生成时间: ${payload.generated_at}  文档数: ${payload.docs.length}`;

    function escHtml(s) {
      return s
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function inline(text, refs = new Map()) {
      const refCode = (m, prefix, num) => {
        const id = refs.get(num);
        if (!id) return m;
        return `${prefix}<a href="#${id}"><code>${num}</code></a>`;
      };

      return text
        .replace(/(看\s+)`(\d+(?:\.\d+)+)`/g, refCode)
        .replace(/(见\s+)`(\d+(?:\.\d+)+)`/g, refCode)
        .replace(/(参考\s+)`(\d+(?:\.\d+)+)`/g, refCode)
        .replace(/`(\d+(?:\.\d+)+)`/g, (m, num) => {
          const id = refs.get(num);
          if (!id) return `<code>${num}</code>`;
          return `<a href="#${id}"><code>${num}</code></a>`;
        })
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    }

    function slugify(text) {
      return text
        .toLowerCase()
        .replace(/<[^>]*>/g, "")
        .replace(/[^\u4e00-\u9fa5a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .replace(/-+/g, "-");
    }

    function renderTable(lines, i) {
      if (i + 1 >= lines.length) return null;
      const head = lines[i];
      const sep = lines[i + 1];
      if (!/\|/.test(head) || !/^\s*\|?[\s:-]+\|[\s|:-]*$/.test(sep)) return null;
      let j = i + 2;
      const rows = [];
      while (j < lines.length && /\|/.test(lines[j])) {
        rows.push(lines[j]);
        j += 1;
      }
      const cells = line => line.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map(x => x.trim());
      const th = cells(head).map(x => `<th>${inline(escHtml(x))}</th>`).join("");
      const tb = rows.map(r => `<tr>${cells(r).map(x => `<td>${inline(escHtml(x))}</td>`).join("")}</tr>`).join("");
      return { html: `<table><thead><tr>${th}</tr></thead><tbody>${tb}</tbody></table>`, next: j };
    }

    function collectHeadingMeta(lines, sectionId) {
      const idByLine = new Map();
      const refToId = new Map();
      const usedIds = new Map();

      function nextId(base) {
        const n = (usedIds.get(base) || 0) + 1;
        usedIds.set(base, n);
        return n === 1 ? base : `${base}-${n}`;
      }

      for (let i = 0; i < lines.length; i++) {
        const hm = lines[i].match(/^(#{1,6})\s+(.*)$/);
        if (!hm) continue;
        const raw = hm[2].trim();
        const id = nextId(`${sectionId}-${slugify(raw) || "section"}`);
        idByLine.set(i, id);

        const match = raw.match(/^(\d+(?:\.\d+)+)\b/);
        if (match && !refToId.has(match[1])) {
          refToId.set(match[1], id);
        }
      }

      return { idByLine, refToId };
    }

    function renderMarkdown(md, sectionId) {
      const lines = md.replace(/\r\n/g, "\n").split("\n");
      const meta = collectHeadingMeta(lines, sectionId);
      const out = [];
      let i = 0;
      let inCode = false;
      let listType = null;
      function closeList() {
        if (listType === "ul") out.push("</ul>");
        if (listType === "ol") out.push("</ol>");
        listType = null;
      }

      while (i < lines.length) {
        const line = lines[i];

        if (line.startsWith("```")) {
          closeList();
          if (!inCode) {
            inCode = true;
            out.push("<pre><code>");
          } else {
            inCode = false;
            out.push("</code></pre>");
          }
          i += 1;
          continue;
        }

        if (inCode) {
          out.push(escHtml(line) + "\n");
          i += 1;
          continue;
        }

        const table = renderTable(lines, i);
        if (table) {
          closeList();
          out.push(table.html);
          i = table.next;
          continue;
        }

        const hm = line.match(/^(#{1,6})\s+(.*)$/);
        if (hm) {
          closeList();
          const level = hm[1].length;
          const text = inline(escHtml(hm[2].trim()), meta.refToId);
          const id = meta.idByLine.get(i) || `${sectionId}-section-${i}`;
          out.push(`<h${level} id="${id}">${text}</h${level}>`);
          i += 1;
          continue;
        }

        if (/^\s*[-*]\s+/.test(line)) {
          const item = line.replace(/^\s*[-*]\s+/, "");
          if (listType !== "ul") {
            closeList();
            listType = "ul";
            out.push("<ul>");
          }
          out.push(`<li>${inline(escHtml(item), meta.refToId)}</li>`);
          i += 1;
          continue;
        }

        if (/^\s*\d+\.\s+/.test(line)) {
          const item = line.replace(/^\s*\d+\.\s+/, "");
          if (listType !== "ol") {
            closeList();
            listType = "ol";
            out.push("<ol>");
          }
          out.push(`<li>${inline(escHtml(item), meta.refToId)}</li>`);
          i += 1;
          continue;
        }

        if (line.startsWith("> ")) {
          closeList();
          out.push(`<blockquote>${inline(escHtml(line.slice(2)), meta.refToId)}</blockquote>`);
          i += 1;
          continue;
        }

        if (/^\s*---+\s*$/.test(line)) {
          closeList();
          out.push("<hr>");
          i += 1;
          continue;
        }

        if (line.trim() === "") {
          closeList();
          i += 1;
          continue;
        }

        closeList();
        out.push(`<p>${inline(escHtml(line), meta.refToId)}</p>`);
        i += 1;
      }
      closeList();
      return out.join("\n");
    }

    function build() {
      const navLinks = [];
      let currentGroup = "";
      let body = "";
      for (const doc of payload.docs) {
        if (doc.group !== currentGroup) {
          currentGroup = doc.group;
          navLinks.push(`<div class="nav-group">${doc.group}</div>`);
        }
        const sid = `doc-${slugify(doc.file.replace(/\.md$/, ""))}`;
        navLinks.push(`<a class="nav-link" data-title="${doc.title}" href="#${sid}">${doc.title}</a>`);
        body += `<section class="doc-card" id="${sid}">${renderMarkdown(doc.markdown, sid)}</section>`;
      }
      nav.innerHTML = navLinks.join("\n");
      content.innerHTML = body;
    }

    function bindSearch() {
      const links = Array.from(document.querySelectorAll(".nav-link"));
      searchInput.addEventListener("input", () => {
        const q = searchInput.value.trim().toLowerCase();
        for (const link of links) {
          const txt = (link.dataset.title || "").toLowerCase();
          link.style.display = q === "" || txt.includes(q) ? "block" : "none";
        }
      });
    }

    function bindActive() {
      const links = Array.from(document.querySelectorAll(".nav-link"));
      window.addEventListener("scroll", () => {
        let current = null;
        for (const link of links) {
          const id = link.getAttribute("href").slice(1);
          const el = document.getElementById(id);
          if (!el) continue;
          const top = el.getBoundingClientRect().top;
          if (top <= 140) current = link;
        }
        for (const l of links) l.classList.remove("active");
        if (current) current.classList.add("active");
      }, { passive: true });
    }

    document.getElementById("topBtn").addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    build();
    bindSearch();
    bindActive();
  </script>
</body>
</html>
