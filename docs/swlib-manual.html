\n├── Controller/            # 控制器基类和内置控制器\n│   ├── Abstract/          # 抽象控制器\n│   ├── Config/            # 配置控制器\n│   ├── File/              # 文件上传控制器\n│   └── Language/          # 语言控制器\n├── Coroutine/             # 协程支持\n├── Crontab/               # 定时任务调度\n├── DataManager/           # 数据管理（上下文、反射等）\n├── DevTool/               # 开发工具\n├── Enum/                  # 枚举定义\n├── Event/                 # 事件系统\n├── Exception/             # 异常类\n├── Lock/                  # 锁机制（Worker锁、Redis锁）\n├── Parse/                 # 代码解析生成\n│   ├── Config/            # 配置解析\n│   ├── Router/            # 路由解析和API生成\n│   ├── Table/             # 表结构解析和代码生成\n│   ├── ast/               # AST 编译\n│   └── Helper/            # 辅助类\n├── Process/               # 自定义进程\n├── Proxy/                 # 代理系统\n├── Queue/                 # 消息队列\n├── Request/               # 请求处理\n├── Response/              # 响应类型\n├── Router/                # 路由系统\n├── ServerEvents/          # Swoole 服务器事件\n├── Table/                 # ORM 核心实现\n├── TaskProcess/           # Task 进程调度\n└── Utils/                 # 工具类库\n```\n\n### 1.4 启动流程\n\n框架启动时执行以下步骤：\n\n```php\n// 1. 配置解析阶段\nnew ParseConfig();           // 解析 .env 配置\nnew ParseDatabaseConfig();   // 解析数据库配置\nConfigValidator::validate(); // 验证配置有效性\n\n// 2. 代码生成阶段（在独立进程中执行）\nnew ParseAdminScaffold();    // 解析后台配置\nnew ParseTable();            // 解析表结构，生成 Table/DTO/Model\nnew ParseRouter();           // 解析路由，生成 API 代码\nnew ParseCrontab();          // 解析定时任务\nnew ParseEvent();            // 解析事件监听器\nnew ParseProcess();          // 解析自定义进程\nnew AstCompiler();           // 编译 AOP 代理类\n\n// 3. 服务器启动阶段\n$server->set($config);       // 配置 Swoole 服务器\nServerEventManager::bindEvents($server);  // 绑定服务器事件\nProcess::run($server);       // 添加自定义进程\nCrontabScheduler::run($server); // 添加定时任务调度\n$server->start();            // 启动服务器\n```\n\n**解析步骤详解**：\n\n| 步骤 | 说明 | 生成内容 |\n|------|------|----------|\n| 删除模板缓存 | 清理 Twig 缓存 | - |\n| 删除编译文件 | 清理旧的代理类 | - |\n| 解析后台配置 | 扫描 AdminConfig 类 | 菜单、路由配置 |\n| 解析表格字段 | 扫描数据库表结构 | Table、DTO、Model 类 |\n| 解析开发工具路由 | 注册调试工具 | 路由映射 |\n| 解析项目路由 | 扫描控制器注解 | 路由映射、API 代码 |\n| 复制 Proto 文件 | 复制到 protos 目录 | .proto 文件 |\n| 解析自定义进程 | 扫描 Process 注解 | 进程配置 |\n| 解析定时任务 | 扫描 Crontab 注解 | 任务配置 |\n| 解析事件管理器 | 扫描 Event 注解 | 事件监听器 |\n| 编译 AOP 代理类 | AST 编译代理类 | Proxy 类 |\n| 备份数据库 | 执行 create_tab.sql | 系统表 |\n| 翻译入库 | I18n 翻译数据 | 翻译记录 |\n| 移动静态文件 | 复制后台静态资源 | 前端资源 |\n"}, {"group": "入门与基础", "file": "2-快速开始.md", "title": "2. 快速开始", "markdown": "## 2. 快速开始\n\n### 快速入口\n\n- 只想先启动服务：直接看 `2.4 创建启动文件` 与 `2.5 启动应用`\n- 先查环境依赖：看 `2.1 环境要求`\n- 启动后继续开发：看 `4-路由系统.md` 与 `3-数据库操作-ORM.md`\n\n### 关联源码\n\n- `Swlib/App.php`\n- `Swlib/Parse/Config/ParseEnvConfig.php`\n- `Swlib/Parse/ConfigValidator.php`\n\n### 排障索引\n\n- 启动时配置校验失败：检查 `.env` 与数据库连接配置\n- 首次启动卡在解析阶段：查看 `runtime/log` 与终端解析步骤日志\n\n### 2.1 环境要求\n\n- **PHP**: >= 8.4\n- **Swoole**: >= 6.0.0\n- **扩展**: mysqli, redis, bcmath, curl, openssl, mbstring, gd, gmagick\n- **数据库**: MySQL 5.7+ / MariaDB 10.3+\n- **缓存**: Redis 5.0+\n\n### 2.2 安装\n\n#### 使用 Composer 安装\n\n```bash\ncomposer require wansh/swlib\n```\n\n#### 配置自动加载\n\n```json\n{\n  \"autoload\": {\n    \"psr-4\": {\n      \"App\\\\\": [\n        \"runtime/Proxy/App/\",\n        \"App/\"\n      ],\n      \"Generate\\\\\": \"runtime/Generate\",\n      \"GPBMetadata\\\\\": \"runtime/Protobuf/GPBMetadata/\",\n      \"Protobuf\\\\\": \"runtime/Protobuf/Protobuf/\",\n      \"Swlib\\\\\": [\n        \"runtime/Proxy/Swlib/\",\n        \"Swlib/\"\n      ]\n    }\n  }\n}\n```\n\n### 2.3 环境配置\n\n创建 `.env` 文件：\n\n```env\n# 应用配置\nAPP_PROD=false\nAPP_NAME=all\nWORKER_NUM=2\nTASK_WORKER_NUM=2\nPORT=9501\n\n# 数据库配置\nDB_HOST=127.0.0.1\nDB_PORT=3306\nDB_DATABASE=your_database\nDB_ROOT=root\nDB_PWD=your_password\nDB_CHARSET=utf8mb4\nDB_SLOW_TIME=300\nDB_SAVE_SQL=true\nDB_POOL_NUM=10\nDB_HEART=10\n\n# Redis 配置\nREDIS_HOST=127.0.0.1\nREDIS_PORT=6379\nREDIS_AUTH=\nREDIS_POOL_NUM=10\n\n# 后台管理配置\nADMIN_CONFIG_PATH=App\\AdminConfig\n```\n\n### 2.4 创建启动文件\n\n```php\n<?php\n// bin/start.php\ndeclare(strict_types=1);\nrequire_once \"./vendor/autoload.php\";\n\nuse Generate\\ConfigEnum;\nuse Swlib\\App;\n\ndefine('ROOT_DIR', dirname(__DIR__) . DIRECTORY_SEPARATOR);\nconst APP_DIR = ROOT_DIR . 'App' . DIRECTORY_SEPARATOR;\nconst PUBLIC_DIR = ROOT_DIR . 'public' . DIRECTORY_SEPARATOR;\nconst RUNTIME_DIR = ROOT_DIR . 'runtime' . DIRECTORY_SEPARATOR;\n\n$app = new App();\n\ntry {\n    $config = [\n        'hook_flags' => SWOOLE_HOOK_ALL,\n        'daemonize' => ConfigEnum::APP_PROD,\n        'worker_num' => ConfigEnum::WORKER_NUM,\n        'task_worker_num' => ConfigEnum::TASK_WORKER_NUM,\n        'task_enable_coroutine' => true,\n        'enable_coroutine' => true,\n        'reload_async' => true,\n        'log_file' => RUNTIME_DIR . '/log/server_error.log'\n    ];\n\n    if (!ConfigEnum::APP_PROD) {\n        $config['document_root'] = PUBLIC_DIR;\n        $config['enable_static_handler'] = true;\n    }\n\n    $app->startSwooleServer($config);\n} catch (Throwable $e) {\n    echo \"启动失败: \" . $e->getMessage() . PHP_EOL;\n    echo $e->getTraceAsString() . PHP_EOL;\n}\n```\n\n### 2.5 启动应用\n\n```bash\n# 启动服务器\nphp bin/start.php\n\n# 后台运行\nnohup php bin/start.php > /dev/null 2>&1 &\n```\n\n访问 `http://127.0.0.1:9501` 即可看到欢迎页面。\n\n### 2.6 目录结构\n\n```\nproject/\n├── App/                    # 应用代码\n│   ├── Controller/         # 控制器\n│   ├── Service/           # 服务层\n│   ├── Model/             # 模型层\n│   └── AdminConfig.php    # 后台配置\n├── Swlib/                 # 框架核心\n├── bin/                   # 启动脚本\n│   └── start.php\n├── public/                # 静态资源\n├── runtime/               # 运行时文件\n│   ├── Generate/          # 自动生成的代码\n│   ├── Protobuf/          # Protobuf 文件\n│   ├── Proxy/             # AOP 代理类\n│   └── log/               # 日志文件\n├── .env                   # 环境配置\n└── composer.json\n```\n\n"}, {"group": "Web 请求链路", "file": "4-路由系统.md", "title": "4. 路由系统", "markdown": "## 4. 路由系统\n\nSWLib 使用基于注解的路由系统，支持 RESTful API、中间件、参数验证等特性。\n\n### 快速入口\n\n- 定义一个新 API：看 `4.1` 与 `4.2`\n- 处理 Protobuf 请求：看 `4.4` 与 `17-Protobuf集成.md`\n- 路由拦截与权限：看 `4.6` 与 `16-中间件系统.md`\n\n### 常见误用\n\n- 控制器和方法同时加注解但误判覆盖顺序\n- 把 PathInfo 与 query 放同名 key，触发冲突\n\n### 关联源码\n\n- `Swlib/Router/Router.php`\n- `Swlib/ServerEvents/OnRequestEvent.php`\n- `Swlib/Router/RouterMiddleware.php`\n\n### 排障索引\n\n- 404：检查最终 URL 是否命中 `RouterPath::PATHS`\n- 405：检查 `#[Router(method: ...)]` 是否包含当前请求方法\n- 422 PathInfo 错误：检查 URL 段偶数结构与参数冲突\n\n### 4.1 路由注解规则\n\n框架的路由注解支持两种定义方式，按以下优先级解析：\n\n| 场景 | 行为 |\n|------|------|\n| 控制器有注解 | 所有**公开方法**都会生成路由 |\n| 控制器无注解 | 只为带注解的**单个方法**生成路由 |\n| 控制器和方法都有注解 | **方法注解覆盖控制器注解** |\n\n#### 方式一：控制器级别注解\n\n在控制器上定义 `#[Router]` 注解，所有公开方法都会自动生成路由：\n\n```php\nuse Swlib\\Controller\\Abstract\\AbstractController;\nuse Swlib\\Router\\Router;\n\n#[Router(method: 'POST')]\nclass UserController extends AbstractController\n{\n    // 方法会继承控制器的 method: 'POST'\n    public function info(): UserProto\n    {\n        // 生成路由: POST /user/info\n    }\n\n    public function list(): UserListsProto\n    {\n        // 生成路由: POST /user/list\n    }\n\n    // 私有方法不会生成路由\n    private function helper(): void\n    {\n    }\n}\n```\n\n#### 方式二：方法级别注解\n\n只在方法上定义 `#[Router]` 注解，控制器无需注解：\n\n```php\nuse Swlib\\Controller\\Abstract\\AbstractController;\nuse Swlib\\Router\\Router;\n\nclass UserController extends AbstractController\n{\n    #[Router(method: 'GET', url: '/user/info')]\n    public function info(): UserProto\n    {\n        // 生成路由: GET /user/info\n    }\n\n    #[Router(method: 'POST', url: '/user/create')]\n    public function create(): UserProto\n    {\n        // 生成路由: POST /user/create\n    }\n\n    // 没有注解的方法不会生成路由\n    public function helper(): void\n    {\n    }\n}\n```\n\n#### 方式三：混合定义（方法覆盖控制器）\n\n控制器和方法都有注解时，方法注解会覆盖控制器注解：\n\n```php\nuse Swlib\\Controller\\Abstract\\AbstractController;\nuse Swlib\\Router\\Router;\n\n#[Router(method: 'POST')]\nclass UserController extends AbstractController\n{\n    // 没有注解，继承控制器的 method: 'POST'\n    public function list(): UserListsProto\n    {\n        // 生成路由: POST /user/list\n    }\n\n    // 有注解，覆盖控制器的 method\n    #[Router(method: 'GET')]\n    public function info(): UserProto\n    {\n        // 生成路由: GET /user/info (覆盖了 POST)\n    }\n\n    // 有注解，覆盖控制器的 method 和 url\n    #[Router(method: 'DELETE', url: '/api/user/delete')]\n    public function delete(): Success\n    {\n        // 生成路由: DELETE /api/user/delete\n    }\n}\n```\n\n### 4.2 Router 注解参数\n\n```php\n#[Router(\n    method: 'POST',              // HTTP 方法，支持字符串或数组\n    url: '/api/user/info',       // 自定义 URL（可选，默认根据类名和方法名生成）\n    cache: 300,                  // 客户端缓存时间（秒）\n    errorTitle: '操作失败',       // 错误提示标题\n    middleware: [                // 中间件列表\n        AuthMiddleware::class,\n        LogMiddleware::class\n    ]\n)]\n```\n\n| 参数 | 类型 | 说明 | 示例 |\n|------|------|------|------|\n| `method` | string\\|array | HTTP 请求方法 | `'POST'` 或 `['GET', 'POST']` |\n| `url` | string | 自定义 URL 路径 | `'/api/user/info'` |\n| `cache` | int | 客户端缓存时间（秒） | `300` |\n| `errorTitle` | string | 错误提示标题 | `'操作失败'` |\n| `middleware` | array | 中间件类列表 | `[AuthMiddleware::class]` |\n\n### 4.3 URL 生成规则\n\n当不指定 `url` 参数时，框架会根据类名和方法名自动生成 URL：\n\n```php\n// 控制器: UserController\n// 方法: info\n// 生成 URL: /user/info\n\n// 控制器: OrderItemList\n// 方法: getLists\n// 生成 URL: /order-item/get-lists\n```\n\n### 4.4 请求处理\n\n#### 获取请求参数\n\n```php\nclass UserController extends AbstractController\n{\n    public function update(): Success\n    {\n        // GET 参数\n        $id = $this->get('id', '参数错误');\n        $page = $this->get('page', '', 1);  // 带默认值\n\n        // POST 参数\n        $name = $this->post('name', '姓名不能为空');\n        $email = $this->post('email', '', 'default@example.com');\n\n        // Header 参数\n        $token = $this->getHeader('authorization');\n\n        return new Success();\n    }\n}\n```\n\n#### Protobuf 请求\n\n```php\n#[Router(method: 'POST')]\nclass UserController extends AbstractController\n{\n    public function create(UserProto $request): UserProto\n    {\n        // 自动解析 Protobuf 请求体\n        $username = $request->getUsername();\n        $email = $request->getEmail();\n\n        // 业务逻辑处理\n        $id = new UserTable()->insert([\n            UserTable::USERNAME => $username,\n            UserTable::EMAIL => $email\n        ]);\n\n        // 返回 Protobuf 响应\n        return UserModel::formatItem(\n            new UserTable()->where([UserTable::ID => $id])->selectOne()\n        );\n    }\n}\n```\n\n### 4.5 响应类型\n\n```php\nuse Swlib\\Response\\JsonResponse;\nuse Swlib\\Response\\TwigResponse;\nuse Swlib\\Response\\RedirectResponse;\n\nclass IndexController extends AbstractController\n{\n    // JSON 响应\n    public function api(): JsonResponse\n    {\n        return JsonResponse::success(['message' => 'Hello World']);\n    }\n\n    // 模板响应\n    #[Router(method: 'GET', url: '/')]\n    public function index(): TwigResponse\n    {\n        return TwigResponse::render('index.twig', [\n            'title' => '欢迎页面'\n        ]);\n    }\n\n    // 重定向响应\n    public function redirect(): RedirectResponse\n    {\n        return RedirectResponse::url('/dashboard');\n    }\n}\n```\n\n### 4.6 中间件\n\n```php\nuse Swlib\\Router\\RouterMiddleware;\n\nclass AuthMiddleware implements RouterMiddleware\n{\n    public function handle(): mixed\n    {\n        $token = $this->getHeader('authorization');\n\n        if (empty($token)) {\n            return JsonResponse::error('未授权访问', 401);\n        }\n\n        // 验证 token 并存储到上下文\n        $user = $this->validateToken($token);\n        CtxEnum::CurrentUser->set($user);\n\n        return true; // 继续执行\n    }\n}\n\n// 应用中间件\n#[Router(\n    method: 'POST',\n    middleware: [AuthMiddleware::class]\n)]\nclass ApiController extends AbstractController\n{\n    // 所有方法都需要认证\n}\n```\n"}, {"group": "Web 请求链路", "file": "16-中间件系统.md", "title": "16. 中间件系统", "markdown": "## 16. 中间件系统\n\nSWLib 提供了灵活的中间件系统，允许在路由执行前后插入自定义逻辑。中间件可用于认证、授权、日志记录、数据预处理等场景。\n\n### 快速入口\n\n- 编写中间件类：看 `16.2`\n- 路由上挂载中间件：看 `16.3`\n- 执行顺序与链路：看 `16.5`\n\n### 常见误用\n\n- 在中间件里重复读取/解析大体积请求体\n- 顺序配置错误导致权限逻辑失效\n\n### 关联源码\n\n- `Swlib/Router/RouterMiddleware.php`\n- `Swlib/Admin/Middleware/AdminInitMiddleware.php`\n- `Swlib/Admin/Middleware/PermissionsMiddleware.php`\n\n### 排障索引\n\n- 中间件不执行：检查注解挂载位置与类命名空间\n- 提前返回导致后续逻辑不走：检查 `handle()` 返回值\n\n### 16.1 概述\n\n#### 中间件执行流程\n\n```\nHTTP 请求\n    │\n    ▼\n┌─────────────────────────────────────────────────┐\n│              路由解析                            │\n└─────────────────┬───────────────────────────────┘\n                  │\n                  ▼\n┌─────────────────────────────────────────────────┐\n│           中间件 1 (Middleware 1)               │\n│  handle() → true / ResponseInterface / throw   │\n└─────────────────┬───────────────────────────────┘\n                  │ 返回 true\n                  ▼\n┌─────────────────────────────────────────────────┐\n│           中间件 2 (Middleware 2)               │\n│  handle() → true / ResponseInterface / throw   │\n└─────────────────┬───────────────────────────────┘\n                  │ 返回 true\n                  ▼\n┌─────────────────────────────────────────────────┐\n│           中间件 N (Middleware N)               │\n│  handle() → true / ResponseInterface / throw   │\n└─────────────────┬───────────────────────────────┘\n                  │ 返回 true\n                  ▼\n┌─────────────────────────────────────────────────┐\n│              控制器方法执行                      │\n└─────────────────┬───────────────────────────────┘\n                  │\n                  ▼\n            HTTP 响应\n```\n\n#### 中间件返回值\n\n| 返回值 | 说明 | 行为 |\n|--------|------|------|\n| `true` | 继续执行 | 执行下一个中间件或控制器 |\n| `ResponseInterface` | 终止请求 | 直接返回响应，不执行后续逻辑 |\n| 抛出异常 | 终止请求 | 捕获异常，返回错误响应 |\n\n---\n\n### 16.2 创建中间件\n\n#### 基本结构\n\n所有中间件必须继承 `Swlib\\Router\\RouterMiddleware` 抽象类：\n\n```php\nuse Swlib\\Router\\RouterMiddleware;\nuse Swlib\\Response\\ResponseInterface;\n\nclass MyMiddleware extends RouterMiddleware\n{\n    public function handle(): ResponseInterface|true\n    {\n        // 中间件逻辑\n\n        // 返回 true 继续执行\n        return true;\n\n        // 或返回 ResponseInterface 终止请求\n        // return JsonResponse::error('错误信息', 401);\n    }\n}\n```\n\n#### 认证中间件示例\n\n```php\nuse Swlib\\Router\\RouterMiddleware;\nuse Swlib\\Response\\JsonResponse;\nuse Swlib\\Response\\ResponseInterface;\nuse Swlib\\Enum\\CtxEnum;\nuse Swlib\\Exception\\UnauthorizedException;\n\nclass AuthMiddleware extends RouterMiddleware\n{\n    public function handle(): ResponseInterface|true\n    {\n        // 获取 Authorization 头\n        $request = CtxEnum::Request->get();\n        $token = $request->header['authorization'] ?? '';\n\n        if (empty($token)) {\n            // 方式 1：返回错误响应\n            return JsonResponse::error('未授权访问', 401);\n        }\n\n        // 验证 token\n        $user = $this->validateToken($token);\n        if (!$user) {\n            // 方式 2：抛出异常\n            throw new UnauthorizedException('令牌无效');\n        }\n\n        // 存储用户信息到上下文\n        CtxEnum::Data->setData('currentUser', $user);\n\n        // 继续执行后续逻辑\n        return true;\n    }\n\n    private function validateToken(string $token): ?object\n    {\n        // 验证逻辑...\n        return $user ?? null;\n    }\n}\n```\n\n#### 日志中间件示例\n\n```php\nuse Swlib\\Router\\RouterMiddleware;\nuse Swlib\\Response\\ResponseInterface;\nuse Swlib\\Utils\\Log;\nuse Swlib\\Utils\\Ip;\nuse Swlib\\Enum\\CtxEnum;\n\nclass LogMiddleware extends RouterMiddleware\n{\n    public function handle(): ResponseInterface|true\n    {\n        $request = CtxEnum::Request->get();\n        $uri = CtxEnum::URI->get();\n        $ip = Ip::get();\n\n        // 记录请求日志\n        Log::info('API 请求', [\n            'uri' => $uri,\n            'ip' => $ip,\n            'method' => $request->server['request_method'],\n            'user_agent' => $request->header['user-agent'] ?? '',\n        ], 'api_request');\n\n        return true;\n    }\n}\n```\n\n#### 参数验证中间件示例\n\n```php\nuse Swlib\\Router\\RouterMiddleware;\nuse Swlib\\Response\\JsonResponse;\nuse Swlib\\Response\\ResponseInterface;\nuse Swlib\\Enum\\CtxEnum;\n\nclass ParamsMiddleware extends RouterMiddleware\n{\n    public function handle(): ResponseInterface|true\n    {\n        $request = CtxEnum::Request->get();\n        $params = $request->get ?? [];\n\n        // 必填参数检查\n        $required = ['user_id', 'action'];\n        foreach ($required as $field) {\n            if (empty($params[$field])) {\n                return JsonResponse::error(\"参数 {$field} 不能为空\", 400);\n            }\n        }\n\n        // 参数类型检查\n        if (!is_numeric($params['user_id'])) {\n            return JsonResponse::error('user_id 必须是数字', 400);\n        }\n\n        // 参数格式化\n        $params['user_id'] = (int)$params['user_id'];\n        $request->get = $params;\n\n        return true;\n    }\n}\n```\n\n---\n\n### 16.3 应用中间件\n\n#### 控制器级别\n\n在控制器类上应用中间件，该控制器的所有方法都会经过中间件：\n\n```php\nuse Swlib\\Controller\\Abstract\\AbstractController;\nuse Swlib\\Router\\Router;\n\n// 单个中间件\n#[Router(middleware: AuthMiddleware::class)]\nclass UserController extends AbstractController\n{\n    public function profile(): UserProto\n    {\n        // 需要认证\n    }\n\n    public function settings(): UserProto\n    {\n        // 需要认证\n    }\n}\n\n// 多个中间件（按顺序执行）\n#[Router(middleware: [LogMiddleware::class, AuthMiddleware::class])]\nclass OrderController extends AbstractController\n{\n    // 先执行日志中间件，再执行认证中间件\n}\n```\n\n#### 方法级别\n\n在单个方法上应用中间件：\n\n```php\nuse Swlib\\Controller\\Abstract\\AbstractController;\nuse Swlib\\Router\\Router;\n\nclass UserController extends AbstractController\n{\n    // 这个方法需要认证\n    #[Router(method: 'POST', middleware: AuthMiddleware::class)]\n    public function updateProfile(): Success\n    {\n        // ...\n    }\n\n    // 这个方法不需要认证\n    #[Router(method: 'POST')]\n    public function login(): LoginProto\n    {\n        // ...\n    }\n\n    // 多个中间件\n    #[Router(\n        method: 'POST',\n        middleware: [LogMiddleware::class, AuthMiddleware::class, AdminMiddleware::class]\n    )]\n    public function deleteUser(): Success\n    {\n        // 只有管理员可以删除用户\n    }\n}\n```\n\n---\n\n### 16.4 内置中间件\n\n框架提供了两个内置的中间件用于后台管理系统。\n\n#### AdminInitMiddleware\n\n初始化后台管理环境：\n\n```php\nuse Swlib\\Admin\\Middleware\\AdminInitMiddleware;\n\n#[Router(middleware: AdminInitMiddleware::class)]\nclass DashboardController extends AbstractController\n{\n    // 后台控制器\n}\n```\n\n该中间件会：\n- 初始化 `AdminManager` 实例\n- 加载后台配置\n- 准备模板渲染环境\n\n#### PermissionsMiddleware\n\n检查用户是否有访问后台的权限：\n\n```php\nuse Swlib\\Admin\\Middleware\\PermissionsMiddleware;\nuse Swlib\\Admin\\Middleware\\AdminInitMiddleware;\n\n#[Router(middleware: [AdminInitMiddleware::class, PermissionsMiddleware::class])]\nclass SystemConfigController extends AbstractAdmin\n{\n    // 需要后台权限\n}\n```\n\n该中间件会：\n- 检查用户是否已登录后台\n- 检查用户是否有查看后台的基础权限\n- 返回 `true` 或 `JsonResponse` 错误响应\n\n---\n\n### 16.5 中间件执行顺序\n\n中间件按数组顺序依次执行：\n\n```php\n#[Router(middleware: [A::class, B::class, C::class])]\npublic function action()\n{\n    // 执行顺序：\n    // 1. A::handle()\n    // 2. B::handle() (如果 A 返回 true)\n    // 3. C::handle() (如果 B 返回 true)\n    // 4. action() (如果 C 返回 true)\n}\n```\n\n#### 执行链示例\n\n```php\n// 定义中间件\nclass FirstMiddleware extends RouterMiddleware\n{\n    public function handle(): ResponseInterface|true\n    {\n        Log::info('第一个中间件');\n        return true;  // 继续执行\n    }\n}\n\nclass SecondMiddleware extends RouterMiddleware\n{\n    public function handle(): ResponseInterface|true\n    {\n        Log::info('第二个中间件');\n        return JsonResponse::error('被拦截', 403);  // 终止请求\n    }\n}\n\nclass ThirdMiddleware extends RouterMiddleware\n{\n    public function handle(): ResponseInterface|true\n    {\n        Log::info('第三个中间件');  // 不会执行\n        return true;\n    }\n}\n\n// 应用中间件\n#[Router(middleware: [FirstMiddleware::class, SecondMiddleware::class, ThirdMiddleware::class])]\npublic function action()\n{\n    // 不会执行\n}\n\n// 日志输出：\n// \"第一个中间件\"\n// \"第二个中间件\"\n// 然后返回 403 错误响应\n```\n\n---\n\n### 16.6 中间件与上下文\n\n中间件可以通过协程上下文传递数据给控制器：\n\n```php\nuse Swlib\\Router\\RouterMiddleware;\nuse Swlib\\Response\\ResponseInterface;\nuse Swlib\\Enum\\CtxEnum;\n\nclass AuthMiddleware extends RouterMiddleware\n{\n    public function handle(): ResponseInterface|true\n    {\n        $token = $this->getToken();\n        $user = $this->validateToken($token);\n\n        if (!$user) {\n            return JsonResponse::error('未授权', 401);\n        }\n\n        // 存储用户信息到上下文\n        CtxEnum::Data->setData('currentUser', $user);\n        CtxEnum::Data->setData('userId', $user->id);\n\n        return true;\n    }\n}\n\n// 在控制器中获取\nclass UserController extends AbstractController\n{\n    #[Router(middleware: AuthMiddleware::class)]\n    public function profile(): UserProto\n    {\n        // 从上下文获取用户信息\n        $userId = CtxEnum::Data->getData('userId');\n        $user = CtxEnum::Data->getData('currentUser');\n\n        // ...\n    }\n}\n```\n\n---\n\n### 16.7 高级用法\n\n#### 条件中间件\n\n根据条件动态决定是否执行某些逻辑：\n\n```php\nclass ConditionalMiddleware extends RouterMiddleware\n{\n    public function handle(): ResponseInterface|true\n    {\n        $request = CtxEnum::Request->get();\n        $uri = CtxEnum::URI->get();\n\n        // 只对特定路由进行检查\n        if (str_starts_with($uri, 'admin/')) {\n            return $this->checkAdminAuth();\n        }\n\n        // 其他路由跳过检查\n        return true;\n    }\n\n    private function checkAdminAuth(): ResponseInterface|true\n    {\n        // 管理员认证逻辑\n        // ...\n    }\n}\n```\n\n#### 请求计时中间件\n\n```php\nclass TimingMiddleware extends RouterMiddleware\n{\n    private float $startTime;\n\n    public function handle(): ResponseInterface|true\n    {\n        $this->startTime = microtime(true);\n        return true;\n    }\n\n    public function __destruct()\n    {\n        $duration = (microtime(true) - $this->startTime) * 1000;\n        $uri = CtxEnum::URI->get();\n\n        Log::info('请求耗时', [\n            'uri' => $uri,\n            'duration' => round($duration, 2) . 'ms'\n        ], 'timing');\n    }\n}\n```\n\n#### 限流中间件\n\n```php\nuse Swlib\\Connect\\PoolRedis;\nuse Swlib\\Exception\\AppException;\n\nclass RateLimitMiddleware extends RouterMiddleware\n{\n    private const int MAX_REQUESTS = 100;\n    private const int WINDOW_SECONDS = 60;\n\n    public function handle(): ResponseInterface|true\n    {\n        $ip = Ip::get();\n        $key = \"rate_limit:{$ip}\";\n\n        $count = PoolRedis::call(function (Redis $redis) use ($key) {\n            $count = $redis->incr($key);\n            if ($count === 1) {\n                $redis->expire($key, self::WINDOW_SECONDS);\n            }\n            return $count;\n        });\n\n        if ($count > self::MAX_REQUESTS) {\n            throw new AppException('请求过于频繁，请稍后再试', 429);\n        }\n\n        return true;\n    }\n}\n```\n\n---\n\n### 16.8 最佳实践\n\n#### 单一职责\n\n```php\n// 推荐：每个中间件只做一件事\nclass AuthMiddleware extends RouterMiddleware { /* 认证 */ }\nclass LogMiddleware extends RouterMiddleware { /* 日志 */ }\nclass RateLimitMiddleware extends RouterMiddleware { /* 限流 */ }\n\n// 不推荐：一个中间件做太多事情\nclass EverythingMiddleware extends RouterMiddleware\n{\n    public function handle(): ResponseInterface|true\n    {\n        $this->checkAuth();\n        $this->logRequest();\n        $this->rateLimit();\n        $this->validateParams();\n        // ...\n    }\n}\n```\n\n#### 中间件顺序\n\n```php\n// 推荐顺序：日志 -> 限流 -> 认证 -> 权限 -> 业务\n#[Router(middleware: [\n    LogMiddleware::class,        // 1. 记录请求\n    RateLimitMiddleware::class,  // 2. 限流保护\n    AuthMiddleware::class,       // 3. 用户认证\n    PermissionMiddleware::class, // 4. 权限检查\n])]\n```\n\n#### 异常处理\n\n```php\n// 使用框架异常类\nuse Swlib\\Exception\\UnauthorizedException;\nuse Swlib\\Exception\\TokenExpiredException;\nuse Swlib\\Exception\\RedirectException;\n\nclass AuthMiddleware extends RouterMiddleware\n{\n    public function handle(): ResponseInterface|true\n    {\n        $token = $this->getToken();\n\n        if (empty($token)) {\n            throw new UnauthorizedException();  // 401\n        }\n\n        if ($this->isExpired($token)) {\n            throw new TokenExpiredException();  // Token 过期\n        }\n\n        if (!$this->validate($token)) {\n            return JsonResponse::error('无效的 Token', 401);\n        }\n\n        return true;\n    }\n}\n```\n\n#### 避免重复检查\n\n```php\nclass SmartAuthMiddleware extends RouterMiddleware\n{\n    public function handle(): ResponseInterface|true\n    {\n        // 检查是否已经认证过\n        if (CtxEnum::Data->hasData('currentUser')) {\n            return true;  // 已认证，跳过\n        }\n\n        // 执行认证逻辑\n        // ...\n    }\n}\n```\n\n---\n\n### 16.9 API 参考\n\n#### RouterMiddleware 抽象类\n\n```php\nnamespace Swlib\\Router;\n\nabstract class RouterMiddleware\n{\n    /**\n     * 处理中间件逻辑\n     *\n     * @return ResponseInterface|true\n     *   - true: 继续执行下一个中间件或控制器\n     *   - ResponseInterface: 终止请求，返回响应\n     * @throws \\Throwable 抛出异常终止请求\n     */\n    abstract public function handle(): ResponseInterface|true;\n}\n```\n\n#### Router 注解参数\n\n```php\n#[Router(\n    method: 'POST',                        // HTTP 方法\n    url: '/api/user/profile',              // 自定义 URL\n    cache: 300,                            // 缓存时间（秒）\n    errorTitle: '操作失败',                 // 错误标题\n    middleware: [AuthMiddleware::class],   // 中间件数组\n    broadcastMessage: null                  // WebSocket 广播\n)]\n```\n\n| 参数 | 类型 | 说明 |\n|------|------|------|\n| `method` | string\\|array | HTTP 方法，默认 `[\"GET\", \"POST\"]` |\n| `url` | string | 自定义 URL，默认自动生成 |\n| `cache` | int | 缓存时间（秒），默认 0 |\n| `errorTitle` | string | 错误标题，用于前端 API 生成 |\n| `middleware` | string\\|array | 中间件类名或数组 |\n| `broadcastMessage` | mixed | WebSocket 广播消息 |\n"}, {"group": "Web 请求链路", "file": "14-服务器事件.md", "title": "14. 服务器事件", "markdown": "## 14. 服务器事件\n\nSWLib 基于 Swoole 服务器事件，提供了完整的事件管理机制。框架通过事件驱动模式处理 HTTP 请求、WebSocket 连接、任务执行等核心功能。\n\n### 快速入口\n\n- HTTP 请求事件链：看 `14.3`\n- Worker 启动阶段行为：看 `14.4`\n- 监控慢事件：看 `14.8`\n\n### 常见误用\n\n- 在 request 事件里写阻塞逻辑导致整体吞吐下降\n- 未统一异常处理导致事件链中断\n\n### 关联源码\n\n- `Swlib/ServerEvents/ServerEventManager.php`\n- `Swlib/ServerEvents/OnRequestEvent.php`\n- `Swlib/ServerEvents/EventPerformanceMonitor.php`\n\n### 排障索引\n\n- 请求被提前终止：检查中间件返回与异常分支\n- CORS 问题：检查 `OnRequestEvent` 的 header 设置\n\n### 14.1 概述\n\n#### 事件驱动架构\n\nSwoole 是一个事件驱动的异步服务器框架，SWLib 在此基础上构建了统一的事件管理系统：\n\n```\n┌────────────────────────────────────────────────────────────────┐\n│                    Swoole Server                               │\n├────────────────────────────────────────────────────────────────┤\n│  事件类型                                                       │\n│  ┌──────────┐ ┌──────────┐ ┌──────────┐ ┌──────────┐          │\n│  │  Start   │ │ Request  │ │  Task    │ │ Shutdown │   ...    │\n│  └────┬─────┘ └────┬─────┘ └────┬─────┘ └────┬─────┘          │\n└───────┼────────────┼────────────┼────────────┼─────────────────┘\n        │            │            │            │\n        ▼            ▼            ▼            ▼\n┌────────────────────────────────────────────────────────────────┐\n│              ServerEventManager (事件管理器)                    │\n│  ┌──────────────────────────────────────────────────────────┐  │\n│  │              统一事件处理包装器                            │  │\n│  │   - 异常捕获                                             │  │\n│  │   - 性能监控                                             │  │\n│  │   - 日志记录                                             │  │\n│  └──────────────────────────────────────────────────────────┘  │\n└────────────────────────────────────────────────────────────────┘\n        │\n        ▼\n┌────────────────────────────────────────────────────────────────┐\n│                    事件处理器                                   │\n│  ┌──────────────┐ ┌──────────────┐ ┌──────────────┐            │\n│  │OnStartEvent  │ │OnRequestEvent│ │OnTaskEvent   │    ...     │\n│  └──────────────┘ └──────────────┘ └──────────────┘            │\n└────────────────────────────────────────────────────────────────┘\n```\n\n#### 支持的事件类型\n\n| 事件 | 处理器 | 说明 | 触发时机 |\n|------|--------|------|---------|\n| `start` | OnStartEvent | 主进程启动 | 服务器启动时 |\n| `workerStart` | OnWorkerStartEvent | Worker 启动 | 每个 Worker 进程启动时 |\n| `workerStop` | OnWorkerStopEvent | Worker 停止 | Worker 进程退出时 |\n| `request` | OnRequestEvent | HTTP 请求 | 收到 HTTP 请求时 |\n| `open` | OnOpenEvent | WebSocket 连接 | WebSocket 连接建立时 |\n| `message` | OnMessageEvent | WebSocket 消息 | 收到 WebSocket 消息时 |\n| `close` | OnCloseEvent | 连接关闭 | 连接断开时 |\n| `task` | OnTaskEvent | 异步任务 | 投递任务时 |\n| `finish` | OnFinishEvent | 任务完成 | 任务完成时 |\n| `pipeMessage` | OnPipeMessageEvent | 进程通信 | 进程间通信时 |\n| `receive` | OnReceiveEvent | TCP 数据 | 收到 TCP 数据时 |\n| `shutdown` | OnShutdownEvent | 服务器关闭 | 服务器关闭时 |\n\n---\n\n### 14.2 事件管理器\n\n`ServerEventManager` 是统一的事件管理器，负责绑定和管理所有服务器事件。\n\n#### 事件绑定\n\n框架在启动时自动绑定所有事件：\n\n```php\nuse Swlib\\ServerEvents\\ServerEventManager;\nuse Swoole\\Server;\n\n// 自动绑定所有事件（框架内部调用）\nServerEventManager::bindEvents($server);\n```\n\n#### 事件处理流程\n\n每个事件都经过统一的处理包装器：\n\n```\n1. 记录事件开始时间和内存\n2. 执行事件处理器\n3. 捕获异常并记录\n4. 记录性能统计\n5. 记录慢事件警告\n```\n\n---\n\n### 14.3 HTTP 请求事件 (OnRequestEvent)\n\n`OnRequestEvent` 是最核心的事件处理器，处理所有 HTTP 请求。\n\n#### 处理流程\n\n```\nHTTP 请求\n    │\n    ▼\n┌─────────────────┐\n│ 设置 CORS 头    │\n└────────┬────────┘\n         │\n         ▼\n┌─────────────────┐\n│ OPTIONS 预检?   │─── 是 ───▶ 返回空响应\n└────────┬────────┘\n         │ 否\n         ▼\n┌─────────────────┐\n│ favicon.ico?    │─── 是 ───▶ 返回空响应\n└────────┬────────┘\n         │ 否\n         ▼\n┌─────────────────┐\n│ 解析路由        │\n└────────┬────────┘\n         │\n         ▼\n┌─────────────────┐\n│ 检查访问权限    │─── 失败 ──▶ 拒绝请求\n└────────┬────────┘\n         │\n         ▼\n┌─────────────────┐\n│ 合并 PathInfo   │\n│ 和 Query 参数   │\n└────────┬────────┘\n         │\n         ▼\n┌─────────────────┐\n│ 检查请求方法    │─── 不匹配 ─▶ 405 错误\n└────────┬────────┘\n         │\n         ▼\n┌─────────────────┐\n│ 保存协程上下文  │\n└────────┬────────┘\n         │\n         ▼\n┌─────────────────┐\n│ 执行路由控制器  │\n└────────┬────────┘\n         │\n         ▼\n┌─────────────────┐\n│ 返回响应        │\n└─────────────────┘\n```\n\n#### CORS 配置\n\n框架默认支持跨域请求：\n\n```php\n// 默认 CORS 头\n'Access-Control-Allow-Origin' => '*',\n'Access-Control-Allow-Methods' => 'GET, POST, OPTIONS',\n'Access-Control-Allow-Credentials' => 'true',\n'Access-Control-Allow-Headers' => '*',\n'Access-Control-Expose-Headers' => 'random,time,token,...'\n```\n\n#### 协程上下文\n\n每个请求都会保存以下上下文信息：\n\n```php\nuse Swlib\\Enum\\CtxEnum;\n\n// 在请求处理过程中可随时获取\n$uri = CtxEnum::URI->get();           // 请求 URI\n$workerId = CtxEnum::WorkerId->get(); // Worker ID\n$request = CtxEnum::Request->get();   // Request 对象\n$response = CtxEnum::Response->get(); // Response 对象\n$server = CtxEnum::Server->get();     // Server 对象\n$requestId = CtxEnum::RequestId->get(); // 请求唯一 ID\n$lang = CtxEnum::Lang->get();         // 语言设置\n```\n\n#### 请求 ID\n\n每个请求都会生成唯一的 request-id，便于日志追踪：\n\n```php\n// 响应头中包含\nresponse-header: request-id: 5f3a8b2c1e9d4a6f7b8c9d0e\n```\n\n---\n\n### 14.4 Worker 启动事件 (OnWorkerStartEvent)\n\n每个 Worker 进程启动时触发，用于初始化进程级别的资源。\n\n#### 处理内容\n\n```php\nclass OnWorkerStartEvent\n{\n    public function handle(Server $server, int $workerId): void\n    {\n        // 1. 保存 Worker 信息到管理器\n        WorkerManager::set(\"workerId\", $workerId);\n        WorkerManager::set(\"server\", $server);\n\n        // 2. 启动数据库心跳检测\n        MysqlHeart::start();\n        RedisHeart::start();\n\n        // 3. 注册自定义事件监听\n        Event::onMaps();\n\n        // 4. 触发 Worker 启动事件\n        EventEnum::ServerWorkerStartEvent->emit([...]);\n    }\n}\n```\n\n#### 输出信息\n\n```\nWorkerStart:0 pid:12345 posix_getpid:12345\nWorkerStart:1 pid:12346 posix_getpid:12346\ntaskWorkerStart:0 pid:12347 posix_getpid:12347\n```\n\n---\n\n### 14.5 服务器启动事件 (OnStartEvent)\n\n主进程启动时触发，用于输出版本信息和初始化全局资源。\n\n#### 启动输出\n\n```\n✔ 服务器启动成功\nhttp://127.0.0.1:9501\nhttp://192.168.1.100:9501\n扩展 protobuf 字段工具: http://192.168.1.100:9501/dev-tool/protobuf-ext-editor/index\n管理后台地址: http://192.168.1.100:9501/admin/dashboard/index\n```\n\n#### 处理内容\n\n```php\nclass OnStartEvent\n{\n    public function handle(Server $server): void\n    {\n        // 1. 触发服务器启动事件\n        EventEnum::ServerStartEvent->emit(['server' => $server]);\n\n        // 2. 输出可访问地址\n        // 3. 输出开发工具地址\n        // 4. 输出管理后台地址\n        // 5. 确保超级管理员存在（开发环境）\n    }\n}\n```\n\n---\n\n### 14.6 WebSocket 事件\n\n#### 连接建立 (OnOpenEvent)\n\n```php\nclass OnOpenEvent\n{\n    public function handle(Server $server, $frame): void\n    {\n        // WebSocket 连接建立时的处理\n        // 可用于：用户认证、连接记录等\n    }\n}\n```\n\n#### 消息接收 (OnMessageEvent)\n\n```php\nclass OnMessageEvent\n{\n    public function handle(Server $server, $frame): void\n    {\n        // 处理 WebSocket 消息\n        // $frame->data 包含消息内容\n        // $frame->fd 是连接标识\n    }\n}\n```\n\n#### 连接关闭 (OnCloseEvent)\n\n```php\nclass OnCloseEvent\n{\n    public function handle(Server $server, int $fd): void\n    {\n        // 连接关闭时的清理工作\n    }\n}\n```\n\n---\n\n### 14.7 任务事件\n\n#### 任务执行 (OnTaskEvent)\n\n```php\nclass OnTaskEvent\n{\n    public function handle(Server $server, int $taskId, int $srcWorkerId, mixed $data): void\n    {\n        // 执行异步任务\n        // $taskId: 任务 ID\n        // $srcWorkerId: 投递任务的 Worker ID\n        // $data: 任务数据\n    }\n}\n```\n\n#### 任务完成 (OnFinishEvent)\n\n```php\nclass OnFinishEvent\n{\n    public function handle(Server $server, int $taskId, mixed $data): void\n    {\n        // 任务完成后的处理\n        // $data 是 OnTaskEvent 的返回值\n    }\n}\n```\n\n---\n\n### 14.8 性能监控\n\n`EventPerformanceMonitor` 提供事件执行的详细性能统计。\n\n#### 自动监控\n\n所有事件都会自动记录性能数据：\n\n```php\n// 事件执行时自动记录\n- 执行次数\n- 总耗时\n- 平均耗时\n- 最大/最小耗时\n- 错误次数\n- 错误率\n```\n\n#### 慢事件警告\n\n当事件执行超过 100ms 时，会记录慢事件警告：\n\n```\n[WARNING] Slow event detected\n{\n    \"event\": \"request\",\n    \"execution_time\": \"150.25ms\",\n    \"memory_used\": \"2.5 MB\",\n    \"memory_peak\": \"10.2 MB\",\n    \"trace_id\": \"request_65a1b2c3d4e5f6\"\n}\n```\n\n#### 获取性能报告\n\n```php\nuse Swlib\\ServerEvents\\EventPerformanceMonitor;\n\n// 获取所有事件的性能统计\n$stats = EventPerformanceMonitor::getStats();\n\n// 获取特定事件的统计\n$requestStats = EventPerformanceMonitor::getStats('request');\n\n// 获取格式化的性能报告\n$report = EventPerformanceMonitor::getReport();\n```\n\n#### 性能报告示例\n\n```\nEvent Performance Report\n========================\n\nEvent: request\n  Count: 1000\n  Avg Time: 15.25ms\n  Max Time: 150.25ms\n  Min Time: 2.10ms\n  Total Time: 15250.00ms\n  Errors: 5 (0.50%)\n\nEvent: task\n  Count: 100\n  Avg Time: 50.10ms\n  Max Time: 200.50ms\n  Min Time: 10.00ms\n  Total Time: 5010.00ms\n  Errors: 0 (0.00%)\n```\n\n---\n\n### 14.9 自定义事件监听\n\n框架通过事件系统支持自定义事件监听。\n\n#### 监听框架事件\n\n```php\nuse Swlib\\Event\\EventEnum;\n\n// 监听 HTTP 请求事件\nEventEnum::HttpRequestEvent->addListener(function ($data) {\n    $request = $data['request'];\n    $response = $data['response'];\n    // 自定义处理逻辑\n});\n\n// 监听路由进入事件\nEventEnum::HttpRouteEnterEvent->addListener(function ($data) {\n    $uri = $data['uri'];\n    $ip = $data['ip'];\n    Log::info(\"请求进入\", ['uri' => $uri, 'ip' => $ip]);\n});\n\n// 监听 Worker 启动事件\nEventEnum::ServerWorkerStartEvent->addListener(function ($data) {\n    $workerId = $data['workerId'];\n    // Worker 启动后的初始化\n});\n```\n\n#### 可用的事件类型\n\n| 事件枚举 | 说明 |\n|---------|------|\n| `HttpRequestEvent` | HTTP 请求到达 |\n| `HttpRouteEnterEvent` | 路由进入 |\n| `ServerStartEvent` | 服务器启动 |\n| `ServerWorkerStartEvent` | Worker 启动 |\n| `DatabaseTransactionEvent` | 数据库事务 |\n\n---\n\n### 14.10 最佳实践\n\n#### 避免阻塞事件处理\n\n```php\n// 不推荐：在事件处理中执行耗时操作\npublic function handle(Request $request, Response $response): void\n{\n    sleep(10);  // 阻塞整个 Worker\n}\n\n// 推荐：使用 Task 异步处理\npublic function handle(Request $request, Response $response): void\n{\n    $server->task(['action' => 'heavy_work']);\n}\n```\n\n#### 异常处理\n\n```php\n// 事件处理中的异常会被自动捕获和记录\n// 但对于关键事件，异常会被重新抛出\ntry {\n    $handler->handle(...$args);\n} catch (Throwable $e) {\n    Log::saveException($e, \"Event '$eventName' failed\");\n    // start、workerStart、shutdown 事件会重新抛出异常\n    if (in_array($eventName, ['start', 'workerStart', 'shutdown'])) {\n        throw $e;\n    }\n}\n```\n\n#### 性能优化\n\n```php\n// 1. 避免在热路径中创建对象\n// 2. 使用连接池而不是频繁创建连接\n// 3. 合理使用缓存\n// 4. 监控慢事件并优化\n```\n\n---\n\n### 14.11 API 参考\n\n#### ServerEventManager\n\n| 方法 | 参数 | 返回值 | 说明 |\n|------|------|--------|------|\n| `bindEvents(server)` | Server $server | void | 绑定所有服务器事件 |\n| `clearInstanceCache()` | - | void | 清理处理器实例缓存 |\n\n#### EventPerformanceMonitor\n\n| 方法 | 参数 | 返回值 | 说明 |\n|------|------|--------|------|\n| `startEvent(eventName)` | string $eventName | string | 记录事件开始，返回 traceId |\n| `endEvent(traceId, hasError)` | string, bool | void | 记录事件结束 |\n| `getStats(eventName)` | ?string $eventName | array | 获取性能统计 |\n| `resetStats()` | - | void | 重置统计数据 |\n| `getReport()` | - | string | 获取格式化报告 |\n\n#### 事件处理器接口\n\n所有事件处理器都实现 `handle()` 方法：\n\n```php\ninterface EventHandlerInterface\n{\n    public function handle(...$args): void;\n}\n```\n"}, {"group": "数据与事务", "file": "3-数据库操作-ORM.md", "title": "3. 数据库操作 (ORM)", "markdown": "## 3. 数据库操作 (ORM)\n\nSWLib 提供了强大的 ORM 系统，支持自动代码生成、类型安全、复杂查询等特性。\n\n### 快速入口\n\n- 查单表查询语法：看 `3.2`、`3.3`\n- 处理事务：看 `3.6`\n- 处理慢 SQL / 缓存：看 `3.7` 与 `13-连接池管理.md`\n\n### 常见误用\n\n- 在事务中跨数据库执行查询（会触发跨库异常）\n- 在列表场景无节制 `selectAll()` 大字段导致内存飙升\n\n### 关联源码\n\n- `Swlib/Table/Db.php`\n- `Swlib/Table/Trait/TransactionTrait.php`\n- `Swlib/Table/QueryBuild.php`\n\n### 排障索引\n\n- 报错 `DB_TRANSACTION_CROSS_DB`：事务内查询库名不一致\n- 参数绑定异常：检查 `where` 条件结构与占位符匹配\n\n### 3.1 核心概念\n\n#### Table 类\n自动生成的数据表映射类，提供查询构建和执行功能：\n\n```php\nuse Generate\\Tables\\Wenyuehui\\UserTable;\n\n// 所有字段都有对应的常量\nUserTable::ID          // 主键\nUserTable::USERNAME    // 用户名\nUserTable::EMAIL       // 邮箱\nUserTable::CREATED_AT  // 创建时间\n```\n\n#### TableDto 类\n数据传输对象，表示查询结果，提供类型安全的属性访问：\n\n```php\nuse Generate\\TablesDto\\Wenyuehui\\UserTableDto;\n\n$user = new UserTable()->selectOne();\necho $user->username;  // 类型安全的属性访问\necho $user->email;\n```\n\n### 3.2 基本查询\n\n#### 查询单条记录\n\n```php\n// 返回 UserTableDto 或 null\n$user = new UserTable()->where([\n    UserTable::ID => 1\n])->selectOne();\n\nif ($user) {\n    echo $user->username;\n    echo $user->email;\n}\n```\n\n#### 查询多条记录\n\n```php\n// 返回包含 __rows 数组的 UserTableDto\n$users = new UserTable()\n    ->where([UserTable::STATUS => 1])\n    ->order([UserTable::ID => 'desc'])\n    ->page(1, 10)\n    ->selectAll();\n\n// 遍历结果\nforeach ($users as $user) {\n    echo $user->username;\n}\n```\n\n#### 查询特定字段\n\n```php\n// 只查询需要的字段，提升性能\n$user = new UserTable()\n    ->field([UserTable::ID, UserTable::USERNAME, UserTable::EMAIL])\n    ->where([UserTable::ID => 1])\n    ->selectOne();\n```\n\n#### 查询单个字段值\n\n```php\n// 获取单个字段的值\n$username = new UserTable()\n    ->where([UserTable::ID => 1])\n    ->selectField(UserTable::USERNAME);\n\n// 带默认值\n$email = new UserTable()\n    ->where([UserTable::ID => 999])\n    ->selectField(UserTable::EMAIL, 'default@example.com');\n```\n\n### 3.3 WHERE 条件\n\nSWLib 的 WHERE 条件支持复杂的嵌套查询，可以构建任意复杂度的查询条件。\n\n#### 基本格式\n\nWHERE 条件支持以下几种格式：\n\n1. **关联数组格式**：`[field => value]` （默认使用 = 操作符）\n2. **标准数组格式**：`[field, operator, value]`\n3. **嵌套条件格式**：支持无限层嵌套的复杂条件组合\n\n#### 简单条件\n\n```php\n// 关联数组格式（默认使用 = 操作符）\n$users = new UserTable()->where([\n    UserTable::STATUS => 1,\n    UserTable::APP_ID => 10\n])->selectAll();\n\n// 标准数组格式\n$users = new UserTable()->where([\n    [UserTable::STATUS, '=', 1],\n    [UserTable::AGE, '>', 18],\n    [UserTable::NAME, 'like', '%张三%'],\n    [UserTable::CITY, 'in', ['北京', '上海', '深圳']],\n    [UserTable::DELETED_AT, 'is null', '']\n])->selectAll();\n```\n\n#### 支持的操作符\n\n| 操作符 | 说明 | 示例 |\n|--------|------|------|\n| `=` | 等于 | `[UserTable::ID, '=', 1]` |\n| `!=`, `<>` | 不等于 | `[UserTable::STATUS, '!=', 0]` |\n| `>`, `<`, `>=`, `<=` | 比较运算 | `[UserTable::AGE, '>', 18]` |\n| `like` | 模糊查询 | `[UserTable::NAME, 'like', '%张%']` |\n| `in` | 在范围内 | `[UserTable::ID, 'in', [1,2,3]]` |\n| `not in` | 不在范围内 | `[UserTable::STATUS, 'not in', [0,2]]` |\n| `between` | 区间查询 | `[UserTable::AGE, 'between', [18, 60]]` |\n| `is null` | 为空 | `[UserTable::DELETED_AT, 'is null', '']` |\n| `is not null` | 不为空 | `[UserTable::EMAIL, 'is not null', '']` |\n| `json_contains` | JSON包含 | `[UserTable::TAGS, 'json_contains', 'tag1']` |\n\n#### 嵌套条件（AND/OR 逻辑）\n\n```php\n// 简单 OR 条件：(name = 'John' OR name = 'Jane') AND status = 1\n$users = new UserTable()->where([\n    [UserTable::NAME, '=', 'John'],\n    'OR',\n    [UserTable::NAME, '=', 'Jane'],\n    'AND',\n    [UserTable::STATUS, '=', 1]\n])->selectAll();\n\n// 复杂嵌套：((status = 1 AND age > 18) OR (vip_level > 3)) AND deleted_at IS NULL\n$users = new UserTable()->where([\n    [\n        [UserTable::STATUS, '=', 1],\n        'AND',\n        [UserTable::AGE, '>', 18]\n    ],\n    'OR',\n    [\n        [UserTable::VIP_LEVEL, '>', 3]\n    ],\n    'AND',\n    [UserTable::DELETED_AT, 'is null', '']\n])->selectAll();\n\n// 更复杂的嵌套：(((name LIKE '%admin%' OR email LIKE '%admin%') AND status = 1) OR role = 'admin') AND deleted_at IS NULL\n$users = new UserTable()->where([\n    [\n        [\n            [UserTable::NAME, 'like', '%admin%'],\n            'OR',\n            [UserTable::EMAIL, 'like', '%admin%']\n        ],\n        'AND',\n        [UserTable::STATUS, '=', 1]\n    ],\n    'OR',\n    [UserTable::ROLE, '=', 'admin'],\n    'AND',\n    [UserTable::DELETED_AT, 'is null', '']\n])->selectAll();\n```\n\n#### 特殊操作符详解\n\n##### BETWEEN 查询\n\n```php\n// 年龄在 18-60 之间\n$users = new UserTable()->where([\n    [UserTable::AGE, 'between', [18, 60]]\n])->selectAll();\n\n// 创建时间在指定范围内\n$users = new UserTable()->where([\n    [UserTable::CREATED_AT, 'between', [strtotime('2024-01-01'), strtotime('2024-12-31')]]\n])->selectAll();\n```\n\n##### IN 和 NOT IN 查询\n\n```php\n// ID 在指定列表中\n$users = new UserTable()->where([\n    [UserTable::ID, 'in', [1, 2, 3, 4, 5]]\n])->selectAll();\n\n// 状态不在指定列表中\n$users = new UserTable()->where([\n    [UserTable::STATUS, 'not in', [0, -1, 99]]\n])->selectAll();\n\n// 城市在指定列表中\n$users = new UserTable()->where([\n    [UserTable::CITY, 'in', ['北京', '上海', '深圳', '广州']]\n])->selectAll();\n```\n\n##### JSON_CONTAINS 查询\n\nJSON_CONTAINS 是 MySQL 的强大功能，支持在 JSON 字段中搜索特定值：\n\n```php\n// 基础用法：搜索 tags 字段中包含 'important' 的记录\n$posts = new LivePostsTable()->where([\n    [LivePostsTable::TAGS, 'json_contains', 'important']\n])->selectAll();\n// 生成 SQL: JSON_CONTAINS(`tags`, '\"important\"', '$')\n\n// 指定 JSON 路径：搜索 user_info.role 为 'admin' 的记录\n$posts = new LivePostsTable()->where([\n    [LivePostsTable::USER_INFO, 'json_contains', 'admin', '$.role']\n])->selectAll();\n// 生成 SQL: JSON_CONTAINS(`user_info`, '\"admin\"', '$.role')\n\n// 多个值搜索（OR 条件）：搜索包含 'tag1' 或 'tag2' 的记录\n$posts = new LivePostsTable()->where([\n    [LivePostsTable::TAGS, 'json_contains', ['tag1', 'tag2']]\n])->selectAll();\n// 生成 SQL: (JSON_CONTAINS(`tags`, '\"tag1\"', '$') OR JSON_CONTAINS(`tags`, '\"tag2\"', '$'))\n\n// 复杂对象搜索：搜索 config.features.enabled 为 true 的记录\n$posts = new LivePostsTable()->where([\n    [LivePostsTable::CONFIG, 'json_contains', ['enabled' => true], '$.features']\n])->selectAll();\n// 生成 SQL: JSON_CONTAINS(`config`, '{\"enabled\":true}', '$.features')\n\n// 数组索引路径：搜索 items 数组第一个元素的 type 为 'product'\n$orders = new OrderTable()->where([\n    [OrderTable::ITEMS, 'json_contains', 'product', '$.items[0].type']\n])->selectAll();\n\n// 数组中所有元素：搜索 permissions 数组中任意元素包含 'read'\n$users = new UserTable()->where([\n    [UserTable::PERMISSIONS, 'json_contains', 'read', '$.permissions[*]']\n])->selectAll();\n```\n\n**JSON 路径语法说明**：\n- `$`：根路径（默认）\n- `$.key`：指定键的路径\n- `$.array[0]`：数组索引路径\n- `$.key.subkey`：嵌套对象路径\n- `$.array[*]`：数组中的所有元素\n\n#### 动态添加条件\n\n使用 `addWhere()` 方法可以动态添加单个条件：\n\n```php\n$query = new UserTable();\n\n// 根据条件动态添加 WHERE 子句\nif ($status !== null) {\n    $query->addWhere(UserTable::STATUS, $status);\n}\n\nif ($minAge > 0) {\n    $query->addWhere(UserTable::AGE, $minAge, '>=');\n}\n\nif (!empty($keyword)) {\n    $query->addWhere(UserTable::NAME, \"%{$keyword}%\", 'like');\n}\n\nif (!empty($cityList)) {\n    $query->addWhere(UserTable::CITY, $cityList, 'in');\n}\n\n$users = $query->selectAll();\n```\n\n#### 多次调用 WHERE\n\n多次调用 `where()` 方法时，条件会使用 AND 连接：\n\n```php\n$query = new UserTable();\n\n// 第一次调用\n$query->where([\n    UserTable::STATUS => 1\n]);\n\n// 第二次调用，会与第一次的条件用 AND 连接\n$query->where([\n    [UserTable::AGE, '>', 18]\n]);\n\n// 等价于：WHERE (status = 1) AND (age > 18)\n$users = $query->selectAll();\n```\n\n#### 空值和零值处理\n\n框架会智能处理空值和零值：\n\n```php\n// 空字符串和 null 会被忽略（除了 0）\n$users = new UserTable()->where([\n    [UserTable::NAME, '=', ''],      // 被忽略\n    [UserTable::AGE, '=', null],     // 被忽略\n    [UserTable::STATUS, '=', 0],     // 不会被忽略\n    [UserTable::SCORE, '>', 0]       // 不会被忽略\n])->selectAll();\n\n// 显式检查空值\n$users = new UserTable()->where([\n    [UserTable::EMAIL, 'is not null', ''],\n    [UserTable::EMAIL, '!=', '']\n])->selectAll();\n```\n\n#### 实际应用示例\n\n##### 用户搜索功能\n\n```php\nclass UserService\n{\n    public static function searchUsers(array $filters): UserTableDto\n    {\n        $query = new UserTable();\n\n        // 基础条件：只查询未删除的用户\n        $conditions = [\n            [UserTable::DELETED_AT, 'is null', '']\n        ];\n\n        // 状态筛选\n        if (isset($filters['status'])) {\n            $conditions[] = [UserTable::STATUS, '=', $filters['status']];\n        }\n\n        // 关键词搜索（用户名或邮箱）\n        if (!empty($filters['keyword'])) {\n            $keyword = $filters['keyword'];\n            $conditions[] = [\n                [UserTable::USERNAME, 'like', \"%{$keyword}%\"],\n                'OR',\n                [UserTable::EMAIL, 'like', \"%{$keyword}%\"]\n            ];\n        }\n\n        // 年龄范围\n        if (isset($filters['min_age']) || isset($filters['max_age'])) {\n            if (isset($filters['min_age']) && isset($filters['max_age'])) {\n                $conditions[] = [UserTable::AGE, 'between', [$filters['min_age'], $filters['max_age']]];\n            } elseif (isset($filters['min_age'])) {\n                $conditions[] = [UserTable::AGE, '>=', $filters['min_age']];\n            } else {\n                $conditions[] = [UserTable::AGE, '<=', $filters['max_age']];\n            }\n        }\n\n        // 城市筛选\n        if (!empty($filters['cities'])) {\n            $conditions[] = [UserTable::CITY, 'in', $filters['cities']];\n        }\n\n        // VIP 用户筛选\n        if (isset($filters['is_vip']) && $filters['is_vip']) {\n            $conditions[] = [UserTable::VIP_LEVEL, '>', 0];\n        }\n\n        // 注册时间范围\n        if (isset($filters['start_date']) || isset($filters['end_date'])) {\n            if (isset($filters['start_date']) && isset($filters['end_date'])) {\n                $conditions[] = [UserTable::CREATED_AT, 'between', [\n                    strtotime($filters['start_date']),\n                    strtotime($filters['end_date'] . ' 23:59:59')\n                ]];\n            } elseif (isset($filters['start_date'])) {\n                $conditions[] = [UserTable::CREATED_AT, '>=', strtotime($filters['start_date'])];\n            } else {\n                $conditions[] = [UserTable::CREATED_AT, '<=', strtotime($filters['end_date'] . ' 23:59:59')];\n            }\n        }\n\n        return $query->where($conditions)\n            ->order([UserTable::CREATED_AT => 'desc'])\n            ->page($filters['page'] ?? 1, $filters['size'] ?? 20)\n            ->selectAll();\n    }\n}\n```\n\n##### 商品筛选功能\n\n```php\nclass ProductService\n{\n    public static function filterProducts(array $filters): ProductTableDto\n    {\n        $conditions = [\n            [ProductTable::STATUS, '=', 1],  // 只查询上架商品\n            [ProductTable::STOCK, '>', 0]    // 只查询有库存商品\n        ];\n\n        // 分类筛选（支持多级分类）\n        if (!empty($filters['category_ids'])) {\n            $conditions[] = [ProductTable::CATEGORY_ID, 'in', $filters['category_ids']];\n        }\n\n        // 价格范围\n        if (isset($filters['min_price']) || isset($filters['max_price'])) {\n            if (isset($filters['min_price']) && isset($filters['max_price'])) {\n                $conditions[] = [ProductTable::PRICE, 'between', [$filters['min_price'], $filters['max_price']]];\n            } elseif (isset($filters['min_price'])) {\n                $conditions[] = [ProductTable::PRICE, '>=', $filters['min_price']];\n            } else {\n                $conditions[] = [ProductTable::PRICE, '<=', $filters['max_price']];\n            }\n        }\n\n        // 品牌筛选\n        if (!empty($filters['brand_ids'])) {\n            $conditions[] = [ProductTable::BRAND_ID, 'in', $filters['brand_ids']];\n        }\n\n        // 标签筛选（JSON 字段）\n        if (!empty($filters['tags'])) {\n            $tagConditions = [];\n            foreach ($filters['tags'] as $tag) {\n                $tagConditions[] = [ProductTable::TAGS, 'json_contains', $tag];\n                if (count($tagConditions) > 1) {\n                    $tagConditions[] = 'OR';\n                }\n            }\n            $conditions[] = $tagConditions;\n        }\n\n        // 属性筛选（JSON 字段）\n        if (!empty($filters['attributes'])) {\n            foreach ($filters['attributes'] as $key => $value) {\n                $conditions[] = [ProductTable::ATTRIBUTES, 'json_contains', $value, \"$.{$key}\"];\n            }\n        }\n\n        // 关键词搜索\n        if (!empty($filters['keyword'])) {\n            $keyword = $filters['keyword'];\n            $conditions[] = [\n                [ProductTable::NAME, 'like', \"%{$keyword}%\"],\n                'OR',\n                [ProductTable::DESCRIPTION, 'like', \"%{$keyword}%\"],\n                'OR',\n                [ProductTable::SKU, 'like', \"%{$keyword}%\"]\n            ];\n        }\n\n        // 排序\n        $orderBy = match($filters['sort'] ?? 'default') {\n            'price_asc' => [ProductTable::PRICE => 'asc'],\n            'price_desc' => [ProductTable::PRICE => 'desc'],\n            'sales_desc' => [ProductTable::SALES_COUNT => 'desc'],\n            'newest' => [ProductTable::CREATED_AT => 'desc'],\n            default => [ProductTable::SORT_ORDER => 'asc', ProductTable::ID => 'desc']\n        };\n\n        return new ProductTable()\n            ->where($conditions)\n            ->order($orderBy)\n            ->page($filters['page'] ?? 1, $filters['size'] ?? 20)\n            ->selectAll();\n    }\n}\n```\n\n### 3.4 聚合查询\n\n#### 统计数量\n\n```php\n// 统计总数\n$count = new UserTable()->where([\n    UserTable::STATUS => 1\n])->count();\n\n// 统计指定字段\n$count = new UserTable()->count(UserTable::ID);\n\n// 去重统计\n$count = new UserTable()->count(UserTable::CITY, true);\n```\n\n#### 求和、最值、平均值\n\n```php\n// 求和\n$totalScore = new UserScoreTable()->where([\n    UserScoreTable::USER_ID => 1\n])->sum(UserScoreTable::SCORE);\n\n// 最大值/最小值\n$maxAge = new UserTable()->max(UserTable::AGE);\n$minAge = new UserTable()->min(UserTable::AGE);\n\n// 平均值\n$avgScore = new UserScoreTable()->avg(UserScoreTable::SCORE);\n```\n\n### 3.5 数据操作\n\n#### 插入数据\n\n```php\n// 方式 1: 使用 Table 直接插入\n$id = new UserTable()->insert([\n    UserTable::USERNAME => 'test',\n    UserTable::EMAIL => 'test@example.com',\n    UserTable::STATUS => 1\n]);\n\n// 方式 2: 使用 DTO 的 __save() 方法\n$dto = new UserTableDto();\n$dto->username = 'test';\n$dto->email = 'test@example.com';\n$dto->status = 1;\n$id = $dto->__save();\n\n// 批量插入\n$data = [\n    [UserTable::USERNAME => 'user1', UserTable::EMAIL => 'user1@example.com'],\n    [UserTable::USERNAME => 'user2', UserTable::EMAIL => 'user2@example.com']\n];\n$affectedRows = new UserTable()->insertAll($data);\n```\n\n#### 更新数据\n\n```php\n// 基本更新（必须有 WHERE 条件）\n$affectedRows = new UserTable()->where([\n    UserTable::ID => 1\n])->update([\n    UserTable::STATUS => 2,\n    UserTable::UPDATED_AT => time()\n]);\n\n// 增量更新\nuse Swlib\\Table\\Db;\n\nnew UserTable()->where([\n    UserTable::ID => 1\n])->update([\n    UserTable::LOGIN_COUNT => Db::incr(1),      // +1\n    UserTable::BALANCE => Db::incr(10, '-')     // -10\n]);\n\n// 使用 DTO 更新\n$user = new UserTable()->where([UserTable::ID => 1])->selectOne();\nif ($user) {\n    $user->status = 2;\n    $user->updatedAt = time();\n    $user->__save();  // 自动判断是插入还是更新\n}\n```\n\n#### 删除数据\n\n```php\n// 必须使用 WHERE 条件\n$affectedRows = new UserTable()->where([\n    UserTable::ID => 1\n])->delete();\n\n// 批量删除\n$affectedRows = new UserTable()->where([\n    [UserTable::STATUS, '=', 0],\n    [UserTable::CREATED_AT, '<', strtotime('-1 year')]\n])->delete();\n```\n\n### 3.6 事务管理\n\n框架提供了完整的事务管理功能，支持声明式和编程式两种方式。\n\n#### 3.6.1 声明式事务\n\n使用 `#[Transaction]` 注解声明事务：\n\n```php\nuse Swlib\\Table\\Attributes\\Transaction;\nuse Swlib\\Table\\Db;\n\nclass OrderService\n{\n    #[Transaction(\n        dbName: 'default',              // 数据库名称\n        isolationLevel: Db::ISOLATION_READ_COMMITTED,  // 隔离级别\n        timeout: 30,                    // 锁等待超时（秒）\n        logTransaction: true            // 记录事务日志\n    )]\n    public function createOrder(int $userId, array $items): int\n    {\n        // 减少库存\n        foreach ($items as $item) {\n            new ProductTable()->where([\n                ProductTable::ID => $item['product_id']\n            ])->update([\n                ProductTable::STOCK => Db::incr($item['quantity'], '-')\n            ]);\n        }\n\n        // 创建订单\n        $orderId = new OrderTable()->insert([\n            OrderTable::USER_ID => $userId,\n            OrderTable::TOTAL_AMOUNT => $this->calculateTotal($items)\n        ]);\n\n        // 创建订单明细\n        foreach ($items as $item) {\n            new OrderItemTable()->insert([\n                OrderItemTable::ORDER_ID => $orderId,\n                OrderItemTable::PRODUCT_ID => $item['product_id'],\n                OrderItemTable::QUANTITY => $item['quantity']\n            ]);\n        }\n\n        return $orderId;\n    }\n}\n```\n\n#### 3.6.2 编程式事务\n\n使用 `Db::transaction()` 方法手动控制事务：\n\n```php\nuse Swlib\\Table\\Db;\n\n$result = Db::transaction(\n    call: function () use ($userId, $amount) {\n        // 检查余额（加锁）\n        $user = new UserTable()->where([\n            UserTable::ID => $userId\n        ])->lock()->selectOne();\n\n        if ($user->balance < $amount) {\n            throw new AppException(AppErr::BALANCE_NOT_ENOUGH);\n        }\n\n        // 扣减余额\n        new UserTable()->where([\n            UserTable::ID => $userId\n        ])->update([\n            UserTable::BALANCE => Db::incr($amount, '-')\n        ]);\n\n        // 创建交易记录\n        return new TransactionTable()->insert([\n            TransactionTable::USER_ID => $userId,\n            TransactionTable::AMOUNT => $amount\n        ]);\n    },\n    dbName: 'default',\n    isolationLevel: Db::ISOLATION_REPEATABLE_READ,\n    timeout: 30,\n    enableLog: true\n);\n```\n\n#### 3.6.3 事务隔离级别\n\n框架支持 MySQL 四种标准隔离级别：\n\n```php\nuse Swlib\\Table\\Db;\n\nclass Db\n{\n    const int ISOLATION_READ_UNCOMMITTED = 1;  // 读未提交\n    const int ISOLATION_READ_COMMITTED = 2;    // 读已提交\n    const int ISOLATION_REPEATABLE_READ = 3;   // 可重复读（默认）\n    const int ISOLATION_SERIALIZABLE = 4;      // 串行化\n}\n```\n\n| 隔离级别 | 脏读 | 不可重复读 | 幻读 | 说明 |\n|---------|------|-----------|------|------|\n| READ UNCOMMITTED | ✓ | ✓ | ✓ | 最低隔离，性能最好 |\n| READ COMMITTED | ✗ | ✓ | ✓ | Oracle 默认级别 |\n| REPEATABLE READ | ✗ | ✗ | ✓ | MySQL 默认级别 |\n| SERIALIZABLE | ✗ | ✗ | ✗ | 最高隔离，性能最差 |\n\n#### 3.6.4 事务嵌套和跨库限制\n\n**嵌套事务**：如果已在事务中调用 `Db::transaction()`，会复用当前事务连接：\n\n```php\n// 外层事务\nDb::transaction(function () {\n    // 内层会复用外层事务\n    Db::transaction(function () {\n        // 不会开启新事务，直接使用当前连接\n    });\n});\n```\n\n**跨库限制**：事务不支持跨数据库操作：\n\n```php\n// ❌ 错误：跨库事务会抛出异常\nDb::transaction(function () {\n    // 操作 db1 数据库\n    new UserTable()->insert([...]);  // db1\n\n    // 尝试操作 db2 数据库 - 会抛出异常！\n    new ProductTable()->insert([...]);  // db2\n});\n```\n\n错误信息：`db.transaction_cross_db: 事务数据库为 db1，本次请求的数据库为 db2`\n\n#### 3.6.5 事务锁等待超时\n\n设置 `innodb_lock_wait_timeout` 避免长时间等待锁：\n\n```php\nuse Swlib\\Table\\Db;\n\nDb::transaction(\n    call: fn() => $this->criticalOperation(),\n    timeout: 5,  // 最多等待 5 秒获取锁\n    dbName: 'default'\n);\n```\n\n#### 3.6.6 事务事件监控\n\n框架在事务生命周期的各个阶段触发事件，可用于监控和日志：\n\n```php\nuse Swlib\\Event\\EventEnum;\n\n// 监听事务事件\nEventEnum::DatabaseTransactionEvent->addListener(function ($data) {\n    $event = $data['event'];\n\n    // $event->stage: begin/commit/rollback/begin_error/rollback_error 等\n    // $event->database: 数据库名称\n    // $event->duration: 耗时（毫秒）\n    // $event->isolationLevel: 隔离级别\n    // $event->timeout: 锁等待超时设置\n    // $event->error: 错误信息（如果有）\n\n    Log::info(\"事务 {$event->stage}\", [\n        'database' => $event->database,\n        'duration' => $event->duration,\n        'error' => $event->error\n    ]);\n});\n```\n\n| 事件阶段 | 说明 |\n|---------|------|\n| `begin` | 事务开始 |\n| `commit` | 事务提交成功 |\n| `rollback` | 事务回滚成功 |\n| `begin_error` | 开启事务失败 |\n| `rollback_error` | 回滚操作失败 |\n| `restore_timeout_error` | 恢复超时设置失败 |\n\n#### 3.6.7 行锁\n\n在事务中使用悲观锁：\n\n```php\nDb::transaction(function () use ($userId) {\n    // 加行锁查询\n    $user = new UserTable()->where([\n        UserTable::ID => $userId\n    ])->lock()->selectOne();\n\n    // 其他事务会等待当前事务提交后才能获取这行数据\n    $user->balance -= 100;\n    $user->__save();\n});\n```\n\n### 3.7 高级功能\n\n#### 查询缓存\n\n```php\n// 缓存 600 秒\n$users = new UserTable()\n    ->where([UserTable::STATUS => 1])\n    ->cache(600)\n    ->selectAll();\n\n// 自定义缓存键\n$users = new UserTable()\n    ->where([UserTable::STATUS => 1])\n    ->cache(600, 'active_users_list')\n    ->selectAll();\n```\n\n#### 原生 SQL 查询\n\n```php\n// 执行原生 SQL 并转换为对象\n$sql = \"SELECT * FROM users WHERE age > ? AND city = ?\";\n$user = new UserTable()->queryToObject($sql, [18, '北京']);\n\n// 查询多条\n$users = new UserTable()->queryToObjects($sql, [18, '北京']);\n```\n"}, {"group": "数据与事务", "file": "13-连接池管理.md", "title": "13. 连接池管理", "markdown": "## 13. 连接池管理\n\nSWLib 基于 Swoole 的连接池技术，为 MySQL 和 Redis 提供高性能的连接复用机制。连接池可以显著减少连接创建开销，提高数据库访问性能。\n\n### 快速入口\n\n- 配置连接池：看 `13.2`\n- Redis 连接池用法：看 `13.3`\n- MySQL 连接池用法：看 `13.4`\n\n### 常见误用\n\n- 连接池容量与并发不匹配导致获取超时\n- 业务代码嵌套持有连接，造成池耗尽\n\n### 关联源码\n\n- `Swlib/Connect/PoolMysqli.php`\n- `Swlib/Connect/PoolRedis.php`\n- `Swlib/Connect/MysqlHeart.php`\n\n### 排障索引\n\n- 连接池耗尽：看 `13.8` 与调用链是否归还连接\n- 间歇性失效连接：检查心跳间隔与数据库超时设置\n\n### 13.1 概述\n\n#### 为什么需要连接池\n\n传统的数据库访问模式：\n- 每次请求创建新连接\n- 连接建立需要 TCP 握手、认证等开销\n- 高并发时连接数急剧增加\n\n使用连接池的优势：\n- **连接复用**：避免频繁创建/销毁连接\n- **连接限制**：控制最大连接数，保护数据库\n- **快速响应**：直接从池中获取可用连接\n- **健康检测**：自动检测并剔除无效连接\n\n#### 架构图\n\n```\n┌──────────────────────────────────────────────────────────────┐\n│                        应用请求                               │\n└──────────────────────────────────────────────────────────────┘\n                              │\n                              ▼\n┌──────────────────────────────────────────────────────────────┐\n│                     连接池管理器                              │\n│  ┌─────────────────────┐    ┌─────────────────────┐          │\n│  │   MySQL 连接池       │    │   Redis 连接池       │          │\n│  │  PoolMySQL          │    │  PoolRedis          │          │\n│  │                     │    │                     │          │\n│  │  ┌───┐ ┌───┐ ┌───┐  │    │  ┌───┐ ┌───┐ ┌───┐  │          │\n│  │  │ C │ │ C │ │ C │  │    │  │ C │ │ C │ │ C │  │          │\n│  │  └───┘ └───┘ └───┘  │    │  └───┘ └───┘ └───┘  │          │\n│  │   连接1  连接2  连接N │    │   连接1  连接2  连接N │          │\n│  └─────────────────────┘    └─────────────────────┘          │\n└──────────────────────────────────────────────────────────────┘\n                              │\n                              ▼\n        ┌─────────────────────────────────────────┐\n        │            心跳检测 (定时)               │\n        │   SELECT 1 (MySQL)  /  PING (Redis)     │\n        └─────────────────────────────────────────┘\n```\n\n---\n\n### 13.2 配置项\n\n#### MySQL 连接池配置\n\n在 `.env` 文件中配置：\n\n```env\n# 连接池大小\nDB_POOL_NUM=10        # 每个数据库的连接池大小\n\n# 心跳间隔（秒）\nDB_HEART=10           # 每 10 秒进行一次心跳检测\n\n# 数据库连接配置\nDB_HOST=127.0.0.1\nDB_PORT=3306\nDB_NAME=mydb\nDB_USER=root\nDB_PASS=password\nDB_CHARSET=utf8mb4\n```\n\n#### Redis 连接池配置\n\n```env\n# Redis 连接池大小\nREDIS_POOL_NUM=10\n\n# Redis 连接配置\nREDIS_HOST=127.0.0.1\nREDIS_PORT=6379\nREDIS_AUTH=           # Redis 密码（可选）\n\n# 是否禁用 Redis 缓存\nDISABLED_REDIS_CACHE=false\n```\n\n---\n\n### 13.3 Redis 连接池\n\n#### 基本使用\n\n使用 `PoolRedis::call()` 方法执行 Redis 操作：\n\n```php\nuse Swlib\\Connect\\PoolRedis;\n\n// 基本用法\n$result = PoolRedis::call(function (Redis $redis) {\n    return $redis->get('user:123');\n});\n\n// 设置值\nPoolRedis::call(function (Redis $redis) {\n    $redis->set('key', 'value');\n    $redis->expire('key', 3600);\n});\n\n// 复杂操作\n$result = PoolRedis::call(function (Redis $redis) {\n    $redis->multi();\n    $redis->set('key1', 'value1');\n    $redis->set('key2', 'value2');\n    $redis->exec();\n    return true;\n});\n```\n\n#### 缓存辅助方法\n\n使用 `getSet()` 方法实现缓存穿透保护：\n\n```php\nuse Swlib\\Connect\\PoolRedis;\nuse Generate\\Tables\\UserTable;\n\n// 缓存数据（自动处理缓存穿透）\n$user = PoolRedis::getSet(\n    key: \"user:profile:{$userId}\",\n    call: fn() => new UserTable()\n        ->where([UserTable::ID => $userId])\n        ->selectOne(),\n    expire: 3600,           // 缓存 1 小时\n    forceRefresh: false     // 是否强制刷新\n);\n```\n\n**参数说明**：\n\n| 参数 | 类型 | 说明 |\n|------|------|------|\n| `key` | string | 缓存键名 |\n| `call` | callable | 获取数据的回调函数 |\n| `expire` | int | 过期时间（秒），-1 表示随机 1-4 小时 |\n| `forceRefresh` | bool | 是否强制刷新，跳过缓存直接执行回调 |\n\n#### 缓存穿透保护\n\n`getSet()` 方法内置了缓存穿透保护：\n\n```php\n// 如果回调返回 null 或空值，不会写入缓存\n$result = PoolRedis::getSet(\n    key: \"search:{$keyword}\",\n    call: fn() => $this->searchDatabase($keyword),\n    expire: 300\n);\n\n// 如果 $result 为空，下次请求会重新查询数据库\n// 可以通过缓存空值来防止缓存穿透\n```\n\n#### 手动获取/归还连接\n\n```php\nuse Swlib\\Connect\\PoolRedis;\n\n// 手动获取连接（不推荐，建议使用 call）\n$redis = PoolRedis::get();\ntry {\n    $redis->set('key', 'value');\n} finally {\n    PoolRedis::put($redis);  // 必须归还连接\n}\n```\n\n---\n\n### 13.4 MySQL 连接池\n\n#### 基本使用\n\n框架的 ORM（Table 类）自动使用连接池，无需手动操作：\n\n```php\nuse Generate\\Tables\\UserTable;\n\n// 自动使用连接池\n$user = new UserTable()\n    ->where([UserTable::ID => 1])\n    ->selectOne();\n```\n\n#### 手动使用连接池\n\n对于需要执行原生 SQL 的场景：\n\n```php\nuse Swlib\\Connect\\PoolMysqli;\n// 使用 call 方法执行原生 SQL\n$result = PoolMysqli::call(function ($mysqli) {\n    $result = $mysqli->query(\"SELECT * FROM users WHERE status = 1\");\n    return $result->fetch_all(MYSQLI_ASSOC);\n});\n\n// 指定数据库\n$result = PoolMysqli::call(function ($mysqli) {\n    return $mysqli->query(\"SELECT COUNT(*) FROM orders\");\n}, 'order_db');  // 使用 order_db 数据库\n```\n\n#### 执行原生查询\n\n```php\nuse Swlib\\Connect\\PoolMysqli;\n\n// 简单查询\n$result = PoolMysqli::query(\"SELECT NOW() as current_time\");\n\n// 指定数据库\n$result = PoolMysqli::query(\"SELECT * FROM products\", 'product_db');\n```\n\n#### 多数据库支持\n\n```php\nuse Swlib\\Connect\\PoolMysqli;\n\n// 获取指定数据库的配置\n$config = PoolMysqli::getConfig('slave_db');\n\n// 获取数据库名称\n$dbName = PoolMysqli::getDbName();  // 默认返回第一个数据库\n\n// 遍历所有数据库\nPoolMysqli::eachDbName(function ($dbName) {\n    echo \"Database: $dbName\\n\";\n});\n\n// 获取命名空间（用于代码生成）\n$namespace = PoolMysqli::getNamespace('default');\n```\n\n---\n\n### 13.5 心跳检测\n\n心跳检测确保连接池中的连接保持活跃，自动剔除无效连接。\n\n#### MySQL 心跳\n\n```php\nuse Swlib\\Connect\\MysqlHeart;\n\n// 启动心跳（框架自动调用）\nMysqlHeart::start();\n\n// 停止心跳\nMysqlHeart::stop();\n```\n\n心跳检测逻辑：\n1. 定时执行 `SELECT 1` 查询\n2. 如果查询成功，归还连接\n3. 如果查询失败，关闭连接并归还 null\n\n#### Redis 心跳\n\n```php\nuse Swlib\\Connect\\RedisHeart;\n\n// 启动心跳（框架自动调用）\nRedisHeart::start();\n\n// 停止心跳\nRedisHeart::stop();\n```\n\n心跳检测逻辑：\n1. 定时执行 `PING` 命令\n2. 如果 PONG 响应正常，归还连接\n3. 如果 PONG 响应异常，关闭连接并归还 null\n\n---\n\n### 13.6 连接池安全机制\n\n#### 嵌套调用检测\n\n框架会自动检测连接池的嵌套调用深度，防止死锁：\n\n```php\n// 危险：嵌套调用可能导致连接池耗尽\nPoolRedis::call(function (Redis $redis) {\n    // 外层已占用 1 个连接\n    PoolRedis::call(function (Redis $redis2) {\n        // 内层再占用 1 个连接\n        // 如果连接池大小为 2，继续嵌套会死锁\n    });\n});\n```\n\n#### 嵌套深度警告\n\n当嵌套深度超过 3 层时，框架会记录警告：\n\n```\n检测到深度嵌套的 PoolRedis 调用 (深度: 4)\n这可能导致连接池耗尽，建议重构代码避免嵌套\n调用栈:\n  → PoolRedis::call() (file.php:10)\n  → UserService::getData() (file.php:20)\n  ...\n```\n\n#### 死锁保护\n\n当嵌套深度达到或超过连接池大小时，框架会抛出异常：\n\n```php\n// 如果连接池大小为 5，嵌套 5 层会抛出异常\nRuntimeException: 严重错误：检测到必然死锁！\n连接池类型: PoolRedis\n连接池大小: 5\n当前嵌套深度: 5\n原因：嵌套深度已达到或超过连接池大小，无法获取更多连接\n解决方案：\n  1. 增加连接池大小（建议至少 10）\n  2. 重构代码，避免深度嵌套调用\n  3. 检查是否有递归调用\n```\n\n#### 获取连接超时\n\n如果获取连接超过 5 秒，框架会抛出超时异常：\n\n```\n获取 Redis 连接超时 (5.02秒)\n当前连接池大小: 10\n当前嵌套深度: 3\n可能原因:\n  1. 存在嵌套的 PoolRedis 调用（检查调用栈）\n  2. 连接池配置过小（建议 >= 10）\n  3. 某个操作占用连接时间过长\n```\n\n---\n\n### 13.7 最佳实践\n\n#### 推荐的连接池大小\n\n```env\n# 根据并发量调整\n# 低并发：5-10\n# 中并发：10-20\n# 高并发：20-50\nDB_POOL_NUM=20\nREDIS_POOL_NUM=20\n```\n\n#### 避免嵌套调用\n\n```php\n// 不推荐：嵌套调用\nPoolRedis::call(function (Redis $redis) {\n    $userId = $redis->get('session:' . $sessionId);\n    PoolRedis::call(function (Redis $redis) use ($userId) {\n        return $redis->get('user:' . $userId);\n    });\n});\n\n// 推荐：合并操作\nPoolRedis::call(function (Redis $redis) use ($sessionId) {\n    $userId = $redis->get('session:' . $sessionId);\n    return $redis->get('user:' . $userId);\n});\n```\n\n#### 使用缓存辅助方法\n\n```php\n// 推荐：使用 getSet\n$data = PoolRedis::getSet(\n    key: \"cache:key\",\n    call: fn() => $this->fetchFromDatabase(),\n    expire: 3600\n);\n\n// 不推荐：手动管理缓存\n$data = PoolRedis::call(function (Redis $redis) {\n    $cached = $redis->get('cache:key');\n    if ($cached) {\n        return unserialize($cached);\n    }\n    $data = $this->fetchFromDatabase();\n    $redis->set('cache:key', serialize($data));\n    $redis->expire('cache:key', 3600);\n    return $data;\n});\n```\n\n#### 强制刷新缓存\n\n```php\n// 更新数据后强制刷新缓存\npublic function updateUser(int $userId, array $data): void\n{\n    new UserTable()->where([UserTable::ID => $userId])->update($data);\n\n    // 强制刷新缓存\n    PoolRedis::getSet(\n        key: \"user:{$userId}\",\n        call: fn() => new UserTable()\n            ->where([UserTable::ID => $userId])\n            ->selectOne(),\n        expire: 3600,\n        forceRefresh: true\n    );\n}\n```\n\n#### 心跳间隔配置\n\n```env\n# 推荐配置\nDB_HEART=10          # 每 10 秒心跳一次\n\n# 如果数据库有连接超时限制，确保心跳间隔小于超时时间\n# MySQL 默认 wait_timeout = 28800 秒（8小时）\n# Redis 默认 timeout = 0（永不超时）\n```\n\n---\n\n### 13.8 故障排查\n\n#### 连接池耗尽\n\n**症状**：\n- 请求超时\n- 出现 \"获取连接超时\" 异常\n\n**排查步骤**：\n1. 检查连接池大小配置\n2. 检查是否有嵌套调用\n3. 检查是否有长时间占用连接的操作\n\n```php\n// 排查：查看调用栈\nPoolRedis::call(function (Redis $redis) {\n    // 添加日志查看嵌套情况\n    Log::save('Redis调用: ' . debug_backtrace()[0]['function']);\n});\n```\n\n#### 连接失效\n\n**症状**：\n- 出现 \"MySQL server has gone away\" 错误\n- Redis 操作返回 false\n\n**解决方案**：\n1. 确保心跳检测已启动\n2. 检查数据库/Redis 服务状态\n3. 适当增加心跳频率\n\n#### 性能问题\n\n**症状**：\n- 响应时间变长\n- 数据库连接数过高\n\n**排查步骤**：\n1. 监控连接池使用率\n2. 检查慢查询\n3. 优化 SQL 语句\n\n```php\n// 监控：记录连接池状态\n$poolSize = ConfigEnum::REDIS_POOL_NUM;\n$currentUsed = PoolRedis::$num;  // 当前使用的连接数\nLog::info(\"Redis 连接池状态\", [\n    'pool_size' => $poolSize,\n    'used' => $currentUsed,\n    'available' => $poolSize - $currentUsed\n], 'pool_monitor');\n```\n\n---\n\n### 13.9 API 参考\n\n#### PoolRedis\n\n| 方法 | 参数 | 返回值 | 说明 |\n|------|------|--------|------|\n| `call(callable)` | $call: 回调函数 | mixed | 执行 Redis 操作 |\n| `getSet(key, call, expire, forceRefresh)` | 缓存参数 | mixed | 缓存穿透保护 |\n| `get()` | - | Redis | 获取连接（手动） |\n| `put(redis)` | $redis: 连接 | void | 归还连接（手动） |\n| `close()` | - | void | 关闭连接池 |\n\n#### PoolMysqli\n\n| 方法 | 参数 | 返回值 | 说明 |\n|------|------|--------|------|\n| `call(callable, dbName)` | $call: 回调, $dbName: 数据库名 | mixed | 执行数据库操作 |\n| `query(sql, dbName)` | $sql: SQL语句, $dbName: 数据库名 | mixed | 执行原生查询 |\n| `get(dbName)` | $dbName: 数据库名 | mysqli | 获取连接（手动） |\n| `put(mysqli, dbName)` | $mysqli: 连接, $dbName: 数据库名 | void | 归还连接（手动） |\n| `getConfig(dbName)` | $dbName: 数据库名 | array | 获取数据库配置 |\n| `getDbName(dbName)` | $dbName: 数据库名 | string | 获取数据库名称 |\n| `getNamespace(dbName)` | $dbName: 数据库名 | string | 获取命名空间 |\n| `eachDbName(callable)` | $call: 回调 | void | 遍历所有数据库 |\n| `close()` | - | void | 关闭所有连接池 |\n"}, {"group": "数据与事务", "file": "12-锁机制.md", "title": "12. 锁机制", "markdown": "## 12. 锁机制\n\n框架提供了两种锁机制：**Worker 进程锁**（单进程内有效）和 **Redis 分布式锁**（跨进程/跨服务器有效）。\n\n### 快速入口\n\n- 跨服务并发控制：优先看 `12.1 Redis 分布式锁`\n- 单机/单进程串行化：看 `12.2 Worker 进程锁`\n- 锁选型对比：看 `12.4`\n\n### 常见误用\n\n- 锁粒度过大导致吞吐下降\n- 锁超时过短，任务还未完成就释放\n\n### 关联源码\n\n- `Swlib/Lock/RedisLock.php`\n- `Swlib/Lock/WorkerLock.php`\n- `Swlib/Lock/Attribute/*`\n\n### 排障索引\n\n- 锁“看起来失效”：先确认 key 维度是否带上业务主键\n- 死锁风险：检查自动续期与异常路径释放\n\n### 12.1 Redis 分布式锁\n\nRedis 锁使用 Redis SET 命令的 NX 和 PX 选项实现，支持跨进程/跨服务器的分布式锁。\n\n#### 方式一：使用注解（推荐）\n\n```php\nuse Swlib\\Lock\\Attribute\\RedisLockAttribute;\n\nclass UserService\n{\n    #[RedisLockAttribute(\n        keyTemplate: 'userId',     // 使用 $userId 参数作为锁标识\n        ttl: 5000,                  // 锁超时时间（毫秒），默认10000ms\n        retryCount: 3,              // 获取锁失败重试次数，默认3次\n        retryDelay: 200             // 重试间隔（毫秒），默认200ms\n    )]\n    public static function updateUser(int $userId, string $data): void\n    {\n        // 方法执行期间持有锁\n        $user = new UserTable()->where([UserTable::ID => $userId])->selectOne();\n        $user->data = $data;\n        $user->__save();\n    }\n}\n\n// 调用：正常调用即可，代理会自动加锁和解锁\nUserService::updateUser($userId, $data);\n```\n\n**锁 Key 生成规则：**\n\n| keyTemplate | 生成的 Key |\n|-------------|-----------|\n| `'userId'` | `UserService::updateUser:123` |\n| `null` 或不设置 | `UserService::updateUser:[md5参数]` |\n\n#### 方式二：手动调用\n\n```php\nuse Swlib\\Lock\\RedisLock;\n\n// 基本用法\n$lockValue = RedisLock::lock('user_lock_key', 10000);  // 10秒超时\nif ($lockValue) {\n    try {\n        // 执行业务逻辑\n        $this->criticalOperation();\n    } finally {\n        RedisLock::unlock('user_lock_key', $lockValue);\n    }\n}\n\n// 使用 withLock 自动管理\nRedisLock::withLock(\n    lockKey: 'user_lock_key',\n    callback: function ($lockValue) {\n        // 业务逻辑\n        $this->criticalOperation();\n    },\n    ttl: 10000,              // 锁超时时间（毫秒）\n    retryCount: 3,           // 获取锁失败重试次数\n    retryDelay: 200,         // 重试间隔（毫秒）\n    autoRenew: true          // 自动续期\n);\n```\n\n#### 续期锁\n\n```php\n// 手动续期\nRedisLock::renew('user_lock_key', $lockValue, 10000);\n```\n\n### 12.2 Worker 进程锁\n\nWorker 锁只在单个进程内有效，适合进程内协程间的同步。\n\n#### 方式一：使用注解（推荐）\n\n```php\nuse Swlib\\Lock\\Attribute\\WorkerLockAttribute;\n\nclass DataProcessService\n{\n    #[WorkerLockAttribute(\n        keyTemplate: 'batchId',    // 使用 $batchId 参数作为锁标识\n        timeout: 3000,               // 获取锁超时时间（毫秒），默认3000ms\n        ttl: 60000,                  // 锁的有效期（毫秒），默认60000ms\n        retryCount: 3,               // 获取锁失败重试次数，默认3次\n        retryDelay: 200              // 重试间隔（毫秒），默认200ms\n    )]\n    public static function processBatch(int $batchId): void\n    {\n        // 同一 Worker 内同一时间只有一个协程能执行此方法\n        // 处理批次数据\n        self::doProcess($batchId);\n    }\n}\n\n// 调用：正常调用即可\nDataProcessService::processBatch($batchId);\n```\n\n#### 方式二：手动调用\n\n```php\nuse Swlib\\Lock\\WorkerLock;\n\n// 基本用法\n$lockValue = WorkerLock::lock('data_process', 3000, 60000);\nif ($lockValue) {\n    try {\n        // 执行业务逻辑\n        $this->criticalOperation();\n    } finally {\n        WorkerLock::unlock('data_process', $lockValue);\n    }\n}\n\n// 使用 withLock 自动管理\nWorkerLock::withLock(\n    lockKey: 'data_process',\n    callback: function ($lockValue) {\n        // 业务逻辑\n        $this->criticalOperation();\n    },\n    timeout: 3000,            // 获取锁超时时间（毫秒）\n    ttl: 60000,              // 锁的有效期（毫秒）\n    retryCount: 3,           // 获取锁失败重试次数\n    retryDelay: 200,         // 重试间隔（毫秒）\n    autoRenew: false         // 自动续期\n);\n```\n\n### 12.3 注解参数对比\n\n| 参数 | RedisLockAttribute | WorkerLockAttribute | 说明 |\n|------|-------------------|---------------------|------|\n| `keyTemplate` | string\\|null | string\\|null | 使用方法参数名作为锁标识 |\n| `ttl/timeout` | int (毫秒) | int (毫秒) | 锁超时时间，**统一使用毫秒** |\n| `retryCount` | int | int | 获取锁失败重试次数 |\n| `retryDelay` | int (毫秒) | int (毫秒) | 重试间隔，**统一使用毫秒** |\n| `priority` | int | int | 代理优先级 |\n| `async` | bool | bool | 是否异步执行 |\n\n### 12.4 锁的对比\n\n| 特性 | Redis 分布式锁 | Worker 进程锁 |\n|------|----------------|---------------|\n| 作用范围 | 跨进程、跨服务器 | 单个 Worker 进程内 |\n| 存储 | Redis | Worker 内存 |\n| 性能 | 较低（网络IO） | 较高（内存操作） |\n| 适用场景 | 多进程/多服务器共享资源 | 进程内协程同步 |\n| 时间单位 | **毫秒** | **毫秒** |\n\n### 12.5 使用建议\n\n1. **需要跨进程加锁** → 使用 `RedisLock`\n   ```php\n   #[RedisLockAttribute(keyTemplate: 'orderId')]\n   public static function processOrder(int $orderId): void\n   ```\n\n2. **进程内防重复执行** → 使用 `WorkerLock`\n   ```php\n   #[WorkerLockAttribute(keyTemplate: 'batchId')]\n   public static function processBatch(int $batchId): void\n   ```\n\n3. **keyTemplate 为 null** → 使用所有参数的 MD5 值作为锁标识\n   ```php\n   #[RedisLockAttribute]  // keyTemplate 默认为 null\n   public static function complexOperation(int $a, string $b, array $c): void\n   // 锁 Key: ClassName::complexOperation:[md5(参数)]\n   ```\n\n4. **长时间任务** → 启用 `autoRenew` 自动续期\n   ```php\n   RedisLock::withLock(\n       lockKey: 'long_task',\n       callback: fn() => $this->longRunningTask(),\n       autoRenew: true  // 自动续期，防止任务执行期间锁过期\n   );\n   ```\n\n### 12.6 完整示例\n\n```php\nuse Swlib\\Lock\\Attribute\\RedisLockAttribute;\nuse Swlib\\Lock\\Attribute\\WorkerLockAttribute;\n\nclass OrderService\n{\n    // Redis 分布式锁：防止多进程同时处理同一订单\n    #[RedisLockAttribute(\n        keyTemplate: 'orderId',\n        ttl: 30000,      // 30秒超时（30000毫秒）\n        retryCount: 5,    // 重试5次\n        retryDelay: 500   // 重试间隔500毫秒\n    )]\n    public static function processOrder(int $orderId): void\n    {\n        $order = new OrderTable()->where([OrderTable::ID => $orderId])->selectOne();\n\n        // 更新订单状态\n        new OrderTable()->where([OrderTable::ID => $orderId])->update([\n            OrderTable::STATUS => 'processing'\n        ]);\n\n        // 处理订单逻辑...\n    }\n\n    // Worker 进程锁：防止同一进程内重复处理批次\n    #[WorkerLockAttribute(\n        keyTemplate: 'batchId',\n        timeout: 5000,    // 等待锁5秒（5000毫秒）\n        ttl: 120000        // 锁定120秒（120000毫秒）\n    )]\n    public static function processBatchData(int $batchId): void\n    {\n        // 处理批次数据，同一 Worker 内不会重复执行\n        $items = new BatchItemTable()\n            ->where([BatchItemTable::BATCH_ID => $batchId])\n            ->selectAll();\n\n        foreach ($items as $item) {\n            self::processItem($item);\n        }\n    }\n}\n```\n"}, {"group": "数据与事务", "file": "19-异常处理.md", "title": "19. 异常处理", "markdown": "## 19. 异常处理\n\n框架提供了一套完整的异常处理机制，支持自动翻译和多语言。\n\n### 快速入口\n\n- 先看异常类型：看 `19.1`\n- 错误码与翻译机制：看 `19.2` 与 `19.3`\n- 业务中如何抛出：看 `19.4`\n\n### 常见误用\n\n- 直接抛裸 `Exception` 丢失业务语义\n- 错误提示硬编码而不走翻译常量\n\n### 关联源码\n\n- `Swlib/Exception/*`\n- `Swlib/Response/JsonResponse.php`\n- `Swlib/Attribute/I18nAttribute.php`\n\n### 排障索引\n\n- 错误文案未翻译：检查 I18n 注解与语言上下文\n- 状态码不符合预期：检查异常类型映射关系\n\n### 19.1 异常类\n\n| 异常类 | 说明 | 状态码 |\n|--------|------|--------|\n| `AppException` | 应用异常（支持翻译） | 500 |\n| `UnauthorizedException` | 未授权异常（用户未登录） | 401 |\n| `TokenExpiredException` | Token 过期异常（自动刷新） | 419 |\n| `RedirectException` | 重定向异常 | 302 |\n| `LangException` | 语言异常（内部使用） | - |\n\n### 19.2 AppErr 错误码常量\n\n`AppErr` 类定义了框架所有错误码常量，使用 PHP 8.4+ `I18nAttribute` 注解支持自动翻译。\n\n```php\nuse Swlib\\Controller\\Language\\Enum\\LanguageEnum;use Swlib\\Exception\\AppException;\n\n// 抛出异常（自动翻译）\nthrow new AppException(LanguageEnum::PARAM_ERROR);\n\n// 抛出异常（带参数替换）\nthrow new AppException(LanguageEnum::DB_EXECUTE_FAILED_WITH_MSG, $sql);\n```\n\n#### 错误码分类\n\n| 分类 | 前缀 | 说明 |\n|------|------|------|\n| 参数错误 | `param.*` | 参数验证相关 |\n| 数据库错误 | `db.*` | 数据库操作相关 |\n| 文件错误 | `file.*` | 文件上传操作相关 |\n| 路由错误 | `router.*` | 路由解析相关 |\n| 后台管理 | `admin.*` | 后台管理相关 |\n| 事件错误 | `event.*` | 事件系统相关 |\n| 开发工具 | `dev.*` | 开发工具相关 |\n| HTTP 错误 | `http.*` | HTTP 请求相关 |\n| SSL 证书 | `ssl.*` | SSL 生成相关 |\n| WebSocket | `ws.*` | WebSocket 相关 |\n| 配置错误 | `config.*` | 配置相关 |\n| 解析错误 | `parse.*` | 代码解析相关 |\n| DTO 错误 | `dto.*` | DTO 操作相关 |\n| 日志错误 | `log.*` | 日志相关 |\n| 缓存错误 | `cache.*` | 缓存相关 |\n| 表单错误 | `form.*` | 表单字段相关 |\n| 功能支持 | `feature.*` | 功能不支持相关 |\n\n#### 常用错误码\n\n```php\n// 参数验证\nAppErr::PARAM_ERROR              // 参数错误\nAppErr::PARAM_EMPTY              // 参数为空\nAppErr::PARAM_REQUIRED           // 参数必填\nAppErr::PARAM_INVALID            // 参数无效\nAppErr::PARAM_MUST_STRING        // 参数必须是字符串\nAppErr::PARAM_MUST_INT           // 参数必须是整数\nAppErr::PARAM_MIN_LENGTH         // 参数最小长度错误\nAppErr::PARAM_MAX_LENGTH         // 参数最大长度错误\n\n// 数据库操作\nAppErr::DB_EXECUTE_FAILED        // 数据库执行失败\nAppErr::DB_WHERE_REQUIRED        // 数据库需要WHERE条件\nAppErr::DB_CONNECT_ERROR         // 数据库连接错误\n\n// 文件操作\nAppErr::FILE_NOT_FOUND           // 文件不存在\nAppErr::FILE_SAVE_FAILED         // 文件保存失败\nAppErr::FILE_MIME_TYPE_REQUIRED  // MIME类型不能为空\n\n// 后台管理\nAppErr::ADMIN_PLEASE_LOGIN       // 请登录\nAppErr::ADMIN_USERNAME_PASSWORD_ERROR  // 用户名或密码错误\nAppErr::ADMIN_PERMISSION_DENIED   // 无权限\n\n// HTTP\nAppErr::HTTP_REQUEST_FAILED_WITH_MSG  // HTTP请求失败\n```\n\n### 19.3 翻译机制\n\n异常消息通过 `Language::get()` 方法自动翻译：\n\n```php\n// 1. 错误码定义（带 I18nAttribute 注解）\n#[I18nAttribute(zh: '参数错误', en: 'Parameter error')]\npublic const string PARAM_ERROR = 'param.error';\n\n// 2. 抛出异常时自动翻译\nthrow new AppException(AppErr::PARAM_ERROR);\n// 中文环境: \"参数错误\"\n// 英文环境: \"Parameter error\"\n\n// 3. 带参数的错误码\n#[I18nAttribute(zh: 'SQL执行失败: %s', en: 'SQL execution failed: %s')]\npublic const string DB_EXECUTE_FAILED_WITH_MSG = 'db.execute_failed_with_msg';\n\nthrow new AppException(AppErr::DB_EXECUTE_FAILED_WITH_MSG, $sql);\n// 输出: \"SQL执行失败: SELECT * FROM users\"\n```\n\n### 19.4 异常使用示例\n\n```php\nuse Swlib\\Controller\\Language\\Enum\\LanguageEnum;use Swlib\\Exception\\AppException;use Swlib\\Exception\\TokenExpiredException;use Swlib\\Exception\\UnauthorizedException;\n\n// 参数验证\nif (empty($input)) {\n    throw new AppException(LanguageEnum::PARAM_EMPTY);\n}\n\n// 数据库错误\nif (!$result) {\n    throw new AppException(LanguageEnum::DB_EXECUTE_FAILED_WITH_MSG, $sql);\n}\n\n// 用户未登录\nif (!$user) {\n    throw new UnauthorizedException(LanguageEnum::ADMIN_PLEASE_LOGIN);\n}\n\n// Token 过期（前端会自动刷新）\nif ($tokenExpired) {\n    throw new TokenExpiredException('token.expired');\n}\n```\n\n### 19.5 最佳实践\n\n1. **始终使用 AppErr 常量**：不要硬编码错误消息\n   ```php\n   // ✅ 正确\n   throw new AppException(AppErr::PARAM_ERROR);\n\n   // ❌ 错误\n   throw new AppException('参数错误');\n   ```\n\n2. **选择合适的异常类型**：\n   - 一般错误使用 `AppException`\n   - 用户未登录使用 `UnauthorizedException`\n   - Token 过期使用 `TokenExpiredException`\n   - 需要重定向使用 `RedirectException`\n\n3. **添加新的错误码**：在 `AppErr` 类中添加常量并配置翻译\n   ```php\n   #[I18nAttribute(zh: '订单不存在', en: 'Order not found')]\n   public const string ORDER_NOT_FOUND = 'order.not_found';\n   ```\n"}, {"group": "后台系统", "file": "5-后台管理系统.md", "title": "5. 后台管理系统", "markdown": "## 5. 后台管理系统\n\nSWLib 的后台系统用于快速构建 CRUD 页面、运营后台和管理工具。它的重点不只是“把表生成出来”，而是让页面配置、字段展示、列表生命周期、动作按钮与模板扩展都具备明确边界。\n\n### 快速入口\n\n- 新建后台页面：看 `5.2` 与 `5.3`\n- 字段选型与 VirtualField：看 `5.5` 到 `5.8`\n- 动作按钮与保存钩子：看 `5.9` 与 `5.11`\n\n### 常见误用\n\n- 在列表格式化阶段逐行查库（N+1）\n- 把虚拟值塞到真实字段，导致语义混乱\n\n### 关联源码\n\n- `Swlib/Admin/Controller/Abstract/AbstractAdmin.php`\n- `Swlib/Admin/Config/PageConfig.php`\n- `Swlib/Admin/Fields/*`\n\n### 排障索引\n\n- 列表性能差：优先检查 `VirtualField` 是否批量回填\n- 字段不显示：检查字段显示控制与模板渲染条件\n\n本文档覆盖：\n\n- 后台页面生命周期\n- 字段系统与选型\n- `VirtualField` 的批量派生能力\n- 模板、筛选、动作按钮与保存钩子\n- 性能边界与完整案例\n\n### 5.1 后台系统概述\n\n#### 5.1.1 核心组件\n\n| 组件                 | 作用        | 典型职责            |\n|--------------------|-----------|-----------------|\n| `AdminConfig`      | 后台站点级配置   | 标题、菜单、登录/退出路由   |\n| `Dashboard`        | 后台首页控制器   | 首页与无权限页         |\n| `Login`            | 后台登录控制器   | 登录、退出、修改密码      |\n| `AbstractAdmin`    | 后台页面控制器基类 | 列表、表单、详情、生命周期组织 |\n| `PageConfig`       | 页面配置对象    | 页面名称、表名、排序、分页   |\n| `PageFieldsConfig
