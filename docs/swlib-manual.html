` | 字段集合配置    | 管理字段列表与筛选集合     |\n| `AbstractField`    | 字段基类      | 列表、表单、筛选、详情统一行为 |\n| `ListRowManager`   | 列表行构建器    | 将 DTO 转换为可渲染字段行 |\n\n#### 5.1.2 一个后台页面的组成\n\n| 配置点                                       | 作用        | 何时使用       |\n|-------------------------------------------|-----------|------------|\n| `configPage()`                            | 页面基本信息    | 每个后台页都需要   |\n| `configField()`                           | 字段配置      | 每个后台页都需要   |\n| `join()`                                  | 列表页补充关联查询 | 需要关联表时     |\n| `listsQuery()`                            | 列表查询附加条件  | 数据权限、默认筛选  |\n| `detailQuery()`                           | 详情查询扩展    | 详情页需要额外数据时 |\n| `insertBefore()` / `insertUpdateBefore()` | 保存前处理     | 校验、转换、补默认值 |\n| `insertAfter()` / `insertUpdateAfter()`   | 保存后处理     | 缓存清理、联动任务  |\n\n### 5.2 创建后台配置\n\n后台站点必须有一个 `AdminConfig` 用于声明路由、菜单和站点级设置。\n\n```php\n<?php\n\nnamespace App\\AdminDemo;\n\nuse Generate\\RouterPath;\nuse Swlib\\Admin\\Config\\AdminConfigAbstract;\nuse Swlib\\Admin\\Manager\\AdminManager;\nuse Swlib\\Admin\\Menu\\Menu;\nuse Swlib\\Admin\\Menu\\MenuGroup;\n\nclass AdminConfig extends AdminConfigAbstract\n{\n    public function Init(AdminManager $layout): void\n    {\n        $layout->adminIndexUrl = RouterPath::AdminDemoDashboardIndex;\n        $layout->logoutUrl = RouterPath::AdminDemoLoginLogout;\n        $layout->loginUrl = RouterPath::AdminDemoLoginLogin;\n        $layout->changePasswordUrl = RouterPath::AdminDemoLoginChangePassword;\n        $layout->noAccessUrl = RouterPath::AdminDemoDashboardNoAccess;\n    }\n\n    public function configAdminTitle(): string\n    {\n        return '管理后台';\n    }\n\n    public function configMenus(): array\n    {\n        return [\n            new MenuGroup(label: '用户管理', icon: 'bi bi-people')->setMenus(\n                new Menu(label: '用户列表', url: RouterPath::AdminDemoUserUserAdminLists),\n            ),\n        ];\n    }\n}\n```\n\n#### 5.2.1 `AdminConfig` 配置项说明\n\n| 方法 / 属性              | 作用                | 备注      |\n|----------------------|-------------------|---------|\n| `Init()`             | 配置后台入口、登录、退出等基础路由 | 必填      |\n| `configAdminTitle()` | 后台标题              | 显示在页面顶部 |\n| `configMenus()`      | 左侧菜单树             | 支持菜单分组  |\n\n### 5.3 后台页面最小示例\n\n```php\n<?php\n\nnamespace App\\AdminDemo\\User;\n\nuse Generate\\Tables\\Main\\UserTable;\nuse Swlib\\Admin\\Config\\PageConfig;\nuse Swlib\\Admin\\Config\\PageFieldsConfig;\nuse Swlib\\Admin\\Controller\\Abstract\\AbstractAdmin;\nuse Swlib\\Admin\\Fields\\NumberField;\nuse Swlib\\Admin\\Fields\\SelectField;\nuse Swlib\\Admin\\Fields\\TextField;\nuse Swlib\\Admin\\Manager\\OptionManager;\nuse Swlib\\Table\\Interface\\TableInterface;\n\nclass UserAdmin extends AbstractAdmin\n{\n    protected function configPage(PageConfig $config): void\n    {\n        $config->pageName = '用户管理';\n        $config->tableName = UserTable::class;\n        $config->order = [UserTable::ID => 'desc'];\n    }\n\n    public function listsQuery(TableInterface $query): void\n    {\n        $query->addWhere(UserTable::STATUS, 1);\n    }\n\n    protected function configField(PageFieldsConfig $fields): void\n    {\n        $fields->setFields(\n            new NumberField(UserTable::ID, 'ID')->hideOnForm(),\n            new TextField(UserTable::USERNAME, '用户名'),\n            new SelectField(UserTable::STATUS, '状态')->setOptions(\n                new OptionManager(1, '启用'),\n                new OptionManager(0, '禁用'),\n            ),\n        );\n    }\n}\n```\n\n### 5.4 列表页生命周期\n\n后台列表页最容易被误用的地方是：开发者不知道“某段逻辑应该写在哪一步”。下面是推荐理解方式。\n\n#### 5.4.1 生命周期步骤表\n\n| 步骤 | 执行内容              | 可扩展点                                         | 注意事项                    |\n|----|-------------------|----------------------------------------------|-------------------------|\n| 1  | 初始化控制器            | `initController()`                           | 加载页面配置、字段配置、权限          |\n| 2  | 收集列表字段            | `frameworkGetListsFields()`                  | 展示字段与基础查询字段分离           |\n| 3  | 构建基础 query        | `field()`、`order()`                          | 查询字段来自字段配置              |\n| 4  | 补充查询条件            | `join()`、`listsQuery()`                      | 只做基础 SQL 条件             |\n| 5  | 接收筛选器             | `frameworkFilterRequest()`                   | 筛选属于 query 阶段           |\n| 6  | 执行列表查询            | `selectAll()`                                | 得到当前页 DTO 列表            |\n| 7  | 预处理关联字段           | `ControllerHelper::selectFieldBeforeQuery()` | 避免每行 `selectField()` 查询 |\n| 8  | 处理 `VirtualField` | 内部虚拟字段解析流程                                   | 批量补齐派生列                 |\n| 9  | 构建列表行             | `ListRowManager`                             | 此时字段值必须齐全               |\n| 10 | 渲染 Twig           | 页面模板                                         | 模板只负责展示                 |\n\n#### 5.4.2 常见需求写在哪\n\n| 需求                    | 推荐写法                |\n|-----------------------|---------------------|\n| 列表默认 where 条件         | `listsQuery()`      |\n| 关联表 join              | `join()`            |\n| 单字段轻量格式化              | `setListFormat()`   |\n| 跨表状态、聚合列              | `VirtualField`      |\n| badge / 图片 / 自定义 HTML | `setTemplateList()` |\n\n### 5.5 字段系统总览\n\n#### 5.5.1 字段类型总表\n\n| 字段类            | 列表 | 表单 | 筛选 | 详情 | 典型用途            |\n|----------------|---:|---:|---:|---:|-----------------|\n| `TextField`    |  是 |  是 |  是 |  是 | 普通文本            |\n| `NumberField`  |  是 |  是 |  是 |  是 | 数字展示 / 输入       |\n| `SelectField`  |  是 |  是 |  是 |  是 | 枚举、状态、关联文本      |\n| `SwitchField`  |  是 |  是 |  是 |  是 | 开关状态            |\n| `ImageField`   |  是 |  是 |  否 |  是 | 图片展示与上传         |\n| `EditorField`  |  是 |  是 |  否 |  是 | 富文本内容           |\n| `VirtualField` |  是 |  否 |  否 |  否 | 跨表状态、聚合列、批量派生字段 |\n\n#### 5.5.2 字段选型表\n\n| 需求       | 推荐方案                         | 备注                           |\n|----------|------------------------------|------------------------------|\n| 原表字段直接展示 | 普通字段类                        | 例如 `TextField`、`NumberField` |\n| 状态枚举     | `SelectField`                | 静态枚举优先                       |\n| 轻量格式化    | 普通字段 + `setListFormat()`     | 禁止查数据库                       |\n| 关联表显示名称  | `SelectField::setRelation()` | 适合 ID -> 文本                  |\n| 跨表状态、聚合列 | `VirtualField`               | 必须批量处理                       |\n\n### 5.6 基础字段详解\n\n#### 5.6.1 `TextField`\n\n| 方法                  | 作用       | 默认值     | 备注                  |\n|---------------------|----------|---------|---------------------|\n| `setRequired()`     | 设置表单必填   | `false` | 作用于表单提交             |\n| `setTemplateList()` | 自定义列表模板  | 文本模板    | 适合 badge、图片、复杂 HTML |\n| `setListFormat()`   | 列表值轻量格式化 | `null`  | 不要在这里查数据库           |\n| `hideOnForm()`      | 表单不显示    | `false` | 常见于 ID、系统字段         |\n| `hideOnFilter()`    | 筛选不显示    | `false` | 减少无意义筛选项            |\n\n#### 5.6.2 `NumberField`\n\n| 方法                    | 作用     | 备注          |\n|-----------------------|--------|-------------|\n| `setMin()`            | 最小值    | 表单校验 + 前端属性 |\n| `setMax()`            | 最大值    | 表单校验 + 前端属性 |\n| `setDefault()`        | 默认值    | 创建表单默认填充    |\n| `setListInlineEdit()` | 列表行内编辑 | 仅适合简单数字修改   |\n\n#### 5.6.3 `SwitchField`\n\n| 适合场景              | 不适合场景   |\n|-------------------|---------|\n| 布尔型启用/禁用、推荐/热门等状态 | 多个复杂状态值 |\n\n#### 5.6.4 `EditorField`\n\n| 适合场景            | 注意事项           |\n|-----------------|----------------|\n| 商品详情、文章正文、富文本说明 | 列表页通常隐藏，避免内容过长 |\n\n### 5.7 `SelectField` 与关联字段\n\n#### 5.7.1 选型对比\n\n| 场景       | 推荐方式            | 说明                   |\n|----------|-----------------|----------------------|\n| 固定枚举     | `setOptions()`  | 最简单、性能稳定             |\n| 关联表文本    | `setRelation()` | 适合分类、用户、商品等 ID -> 文本 |\n| 复杂跨表派生状态 | `VirtualField`  | 不要滥用 `SelectField`   |\n\n#### 5.7.2 常用方法\n\n| 方法              | 作用      | 适用场景      |\n|-----------------|---------|-----------|\n| `setOptions()`  | 静态选项    | 状态、类型     |\n| `setRelation()` | 关联表显示文本 | 分类、用户、商品名 |\n| `setAddQuery()` | 限制可选项   | 复杂后台表单    |\n\n### 5.8 `VirtualField` 虚拟字段\n\n`VirtualField` 用于“列表中要展示，但值不来自基础 SQL 查询”的列。典型场景包括：\n\n- 当前期开期状态\n- 聚合统计列\n- 当前页批量派生摘要\n- 依赖多表计算的 badge 文案\n\n#### 5.8.1 普通字段与 `VirtualField` 对比\n\n| 维度                  | 普通字段      | `VirtualField` |\n|---------------------|-----------|----------------|\n| 数据来源                | 基础 SQL 查询 | 查询后批量回填        |\n| 是否参与基础 `field()` 收集 | 是         | 否              |\n| 适合原表字段              | 是         | 否              |\n| 适合跨表聚合展示            | 否         | 是              |\n| 是否必须批量处理            | 否         | 是              |\n| 是否推荐单行查库            | 否         | 明确不推荐          |\n\n#### 5.8.2 默认配置\n\n| 配置项        | 默认值                      | 说明              |\n|------------|--------------------------|-----------------|\n| 列表显示       | `true`                   | 默认用于列表          |\n| 表单显示       | `false`                  | 第一阶段不参与表单       |\n| 筛选显示       | `false`                  | 第一阶段不参与筛选       |\n| 详情显示       | `false`                  | 第一阶段不参与详情       |\n| 模板         | `fields/lists/text.twig` | 默认文本展示          |\n| 默认值        | `''`                     | resolver 未命中时回退 |\n| `batchKey` | 字段名本身                    | 高级模式可覆盖         |\n\n#### 5.8.3 常用方法\n\n| 方法                           |   是否必填 | 作用                |\n|------------------------------|-------:|-------------------|\n| `setBatchValueResolver()`    | 简单模式必填 | 直接返回 `[主键 => 值]`  |\n| `setBatchKey()`              |      否 | 多个虚拟字段共享一批数据时用于分组 |\n| `setBatchLoader()`           | 高级模式必填 | 一次性加载共享数据         |\n| `setBatchRowValueResolver()` | 高级模式必填 | 从共享数据中提取当前字段值     |\n| `setTemplateList()`          |      否 | 使用自定义列表模板         |\n| `setDefault()`               |      否 | 设置未命中时默认值         |\n\n#### 5.8.4 使用模式\n\n##### 简单模式\n\n```php\n(new VirtualField('current_period_status', '当前开期状态'))\n    ->setDefault('未开')\n    ->setBatchValueResolver(function (array $rows): array {\n        return [\n            1001 => '待开奖',\n            1002 => '到时间开奖【2026-03-11 12:30】',\n        ];\n    });\n```\n\n##### 分组模式\n\n```php\n$statusField = (new VirtualField('current_period_status', '当前开期状态'))\n    ->setBatchKey('goods_period')\n    ->setBatchLoader(function (array $rows): array {\n        return $batchData;\n    })\n    ->setBatchRowValueResolver(function (array $row, array $batchData): string {\n        return $batchData[$row['id']]['status'] ?? '';\n    });\n```\n\n#### 5.8.5 适用场景选择\n\n| 需求            | 推荐方式                                             |\n|---------------|--------------------------------------------------|\n| 单个虚拟列         | `setBatchValueResolver()`                        |\n| 多个虚拟列共享一批查询结果 | `batchKey + batchLoader + batchRowValueResolver` |\n| 原表字段轻量格式化     | 普通字段 + `setListFormat()`                         |\n\n### 5.9 ActionButton 与后台动作\n\n#### 5.9.1 常用参数\n\n| 参数         | 作用   | 说明                |\n|------------|------|-------------------|\n| `label`    | 按钮文案 | 用户看到的名称           |\n| `url`      | 目标方法 | 对应控制器方法           |\n| `showOn`   | 显示位置 | 页面顶部、列表行、详情页等     |\n| `template` | 按钮模板 | 普通链接、AJAX 按钮、提交按钮 |\n| `jsFiles`  | 附加脚本 | 弹窗、确认框、异步处理       |\n\n#### 5.9.2 常见显示位置\n\n| 位置枚举             | 说明     |\n|------------------|--------|\n| `LISTS_PAGE`     | 列表顶部按钮 |\n| `LISTS_PAGE_ROW` | 列表行按钮  |\n| `NEW_PAGE`       | 新增页按钮  |\n| `EDIT_PAGE`      | 编辑页按钮  |\n| `DETAIL_PAGE`    | 详情页按钮  |\n\n### 5.10 筛选系统\n\n| 能力      | 入口                   | 说明               |\n|---------|----------------------|------------------|\n| 默认筛选    | 字段本身                 | 根据字段值直接拼 where   |\n| 自定义筛选逻辑 | `setFilterQuery()`   | 复杂查询条件           |\n| 隐藏筛选器   | `hideOnFilter()`     | 减少不必要的筛选项        |\n| 默认筛选值   | `setFilterDefault()` | 常见于按 app_id 固定过滤 |\n\n### 5.11 表单与保存钩子\n\n| 阶段    | 方法                                        | 说明           |\n|-------|-------------------------------------------|--------------|\n| 表单展示前 | `frameworkEditFill()`                     | 编辑页回填已有值     |\n| 表单接收  | `frameworkFormRequest()`                  | 字段读取请求数据     |\n| 保存前   | `insertBefore()` / `insertUpdateBefore()` | 校验、加密、转换     |\n| 保存后   | `insertAfter()` / `insertUpdateAfter()`   | 清缓存、写日志、触发联动 |\n\n### 5.12 自定义模板\n\n#### 5.12.1 模板类型\n\n| 方法                    | 作用       | 适用页面     |\n|-----------------------|----------|----------|\n| `setTemplateList()`   | 自定义列表渲染  | 列表页      |\n| `setTemplateForm()`   | 自定义表单渲染  | 新增 / 编辑页 |\n| `setTemplateFilter()` | 自定义筛选器渲染 | 列表筛选区    |\n\n#### 5.12.2 模板边界\n\n| 模板里应该做             | 模板里不应该做  |\n|--------------------|----------|\n| 文案展示、badge、图标、图片布局 | 查数据库     |\n| 轻量样式判断             | 复杂聚合计算   |\n| 输出已经准备好的值          | 拼装业务状态映射 |\n\n### 5.13 性能与最佳实践\n\n#### 5.13.1 推荐做法\n\n| 场景        | 推荐方式                        |\n|-----------|-----------------------------|\n| 列表跨表状态展示  | `VirtualField` 批量处理         |\n| 多列依赖同一批数据 | 共享 `batchKey + batchLoader` |\n| 展示复杂状态    | 在 resolver 中先映射，再交给模板展示     |\n| 普通字段展示    | 使用现有字段类直接渲染                 |\n\n#### 5.13.2 明确禁止\n\n| 反模式                       | 原因        |\n|---------------------------|-----------|\n| 在 `setListFormat()` 中逐行查库 | 容易产生 N+1  |\n| 在模板中计算聚合结果                | 展示层职责失衡   |\n| 借用真实字段承载虚拟值               | 污染语义，难以维护 |\n| 多个虚拟字段重复查询同一批数据           | 性能浪费      |\n\n### 5.14 完整案例：商品当前开期状态\n\n商品后台列表需要保留原有“状态 = 上架 / 下架”，同时新增“当前开期状态”列。该列数据来自 `goods_period`，属于典型的 `VirtualField` 场景。\n\n#### 5.14.1 需求拆解\n\n| 项目   | 内容                                       |\n|------|------------------------------------------|\n| 页面   | 商品管理列表                                   |\n| 原字段  | 商品上下架状态                                  |\n| 新字段  | 当前开期状态                                   |\n| 数据来源 | `goods_period`                           |\n| 实现方式 | `VirtualField` + 批量 resolver             |\n| 模板   | `goods/goods_current_period_status.twig` |\n\n#### 5.14.2 状态映射规则\n\n| 条件                             | 展示文案                      |\n|--------------------------------|---------------------------|\n| 没有当前期                          | `未开`                      |\n| `status = 1` 且 `open_mode = 2` | `到时间开奖【YYYY-MM-DD HH:mm】` |\n| `status = 1` 且 `open_mode = 1` | `满额开奖【xx%】`               |\n| `status = 2`                   | `待开奖`                     |\n\n#### 5.14.3 示例代码\n\n```php\n(new VirtualField('current_period_status', '当前开期状态'))\n    ->setDefault('未开')\n    ->setTemplateList('goods/goods_current_period_status.twig')\n    ->setBatchValueResolver(function (array $rows): array {\n        $goodsIds = array_map(static fn(array $row): int => (int)($row['id'] ?? 0), $rows);\n        $periodRows = $this->queryCurrentPeriodRows($goodsIds);\n\n        $result = [];\n        foreach ($goodsIds as $goodsId) {\n            $result[$goodsId] = self::formatCurrentPeriodStatus($periodRows[$goodsId] ?? null);\n        }\n\n        return $result;\n    });\n```\n\n### 5.15 FAQ\n\n| 问题                               | 回答                                                  |\n|----------------------------------|-----------------------------------------------------|\n| 为什么不能在 `setListFormat()` 里查数据库？  | 因为它会对列表每行执行，容易形成 N+1                                |\n| 为什么 `VirtualField` 不参与基础 SQL 查询？ | 因为它不是原表字段，而是查询后统一回填的展示列                             |\n| 多个虚拟列如何共享一批查询？                   | 使用 `batchKey + batchLoader + batchRowValueResolver` |\n| 模板能不能做状态计算？                      | 只允许轻量展示判断，复杂映射应在 resolver 中完成                       |\n| 什么时候该重写 `lists()`？               | 绝大多数场景不需要。优先使用框架已有生命周期与 `VirtualField`              |\n"}, {"group": "异步与调度", "file": "7-事件系统.md", "title": "7. 事件系统", "markdown": "## 7. 事件系统\n\nSWLib 提供了强大的事件系统，支持同步/异步事件处理、优先级、延迟执行、队列等特性。\n\n### 快速入口\n\n- 查看框架内置事件：看 `7.1`\n- 注册监听器：看 `7.2`\n- 业务代码触发事件：看 `7.3`\n\n### 常见误用\n\n- 监听器做阻塞 IO 但没有异步化\n- 监听器优先级设置混乱导致行为不确定\n\n### 关联源码\n\n- `Swlib/Event/*`\n- `Swlib/Event/Helper/EventExecutor.php`\n- `Swlib/Parse/ParseEvent.php`\n\n### 排障索引\n\n- 监听器未触发：检查 `#[Event]` 注解名与触发事件名是否一致\n- 触发顺序异常：检查 `priority` 值\n\n### 7.1 内置事件\n\n框架通过 `EventEnum` 定义了以下内置事件：\n\n| 事件枚举 | 说明 | 触发时机 |\n|---------|------|----------|\n| `OnParseRouterEvent` | 路由解析完成 | 路由解析后 |\n| `ServerStartEvent` | 服务器启动 | Swoole 服务器启动时 |\n| `ServerWorkerStartEvent` | Worker 启动 | Worker 进程启动时 |\n| `ServerWorkerStopEvent` | Worker 停止 | Worker 进程停止时 |\n| `ServerShutdownEvent` | 服务器关闭 | 服务器关闭时 |\n| `ServerTaskEvent` | Task 任务 | Task 进程收到任务时 |\n| `WebSocketOnOpenEvent` | WebSocket 连接 | WebSocket 连接建立 |\n| `WebSocketOnMessageEvent` | WebSocket 消息 | 收到 WebSocket 消息 |\n| `HttpRouteEnterEvent` | HTTP 路由进入 | HTTP 路由开始处理 |\n| `DatabaseBeforeExecuteEvent` | 数据库操作前 | 数据库操作执行前 |\n| `DatabaseAfterExecuteEvent` | 数据库操作后 | 数据库操作执行后 |\n| `DatabaseTransactionEvent` | 数据库事务 | 事务开始/提交/回滚 |\n\n### 7.2 定义事件监听器\n\n使用 `#[Event]` 注解定义事件监听器：\n\n```php\nuse Swlib\\Event\\Attribute\\Event;\n\n#[Event(\n    name: 'user.registered',     // 事件名称\n    priority: 10                  // 优先级（数字越小优先级越高，默认10）\n)]\nclass SendWelcomeEmailListener\n{\n    public function run(array $data): void\n    {\n        $userId = $data['userId'];\n        $username = $data['username'];\n        $email = $data['email'];\n\n        // 发送欢迎邮件\n        EmailService::send($email, '欢迎注册', \"欢迎 {$username} 注册！\");\n    }\n}\n```\n\n**`#[Event]` 注解参数：**\n\n| 参数 | 类型 | 说明 |\n|------|------|------|\n| `name` | string | 事件名称 |\n| `priority` | int | 优先级，数字越小越先执行（默认10） |\n\n### 7.3 触发事件\n\n#### 基本用法\n\n```php\nuse Swlib\\Event\\EventEnum;\n\n// 使用内置事件枚举\nEventEnum::ServerStartEvent->emit([\n    'server' => $server,\n    'timestamp' => time()\n]);\n\n// 触发自定义事件\nEvent::emit('user.registered', [\n    'userId' => $userId,\n    'username' => $username,\n    'email' => $email\n]);\n```\n\n#### 事件执行模式\n\n`Event::emit()` 方法支持多种执行模式，通过参数组合实现：\n\n```php\nEvent::emit(\n    event: 'user.login',      // 事件名称\n    args: $data,              // 参数（数组或对象）\n    async: true,              // 是否异步（默认true）\n    delay: 0,                 // 延迟时间（毫秒）\n    queue: false              // 是否使用队列（默认false）\n);\n```\n\n| 模式 | async | delay | queue | 说明 |\n|------|-------|-------|-------|------|\n| 同步执行 | false | 0 | false | 阻塞执行，返回 EventResponse |\n| 异步执行 | true | 0 | false | 不阻塞，监听器并行执行 |\n| 队列执行 | - | 0 | true | 不阻塞，监听器串行执行 |\n| 延迟执行 | false | >0 | false | 延迟后同步执行 |\n| 延迟异步 | true | >0 | false | 延迟后并行执行 |\n| 延迟队列 | - | >0 | true | 延迟后队列执行 |\n\n#### 执行模式示例\n\n```php\n// 1. 同步执行（阻塞，返回结果）\n$response = Event::emit('user.login', $data, async: false);\nforeach ($response->results as $result) {\n    // 处理每个监听器的结果\n}\n\n// 2. 异步执行（不阻塞，监听器并行执行）\nEvent::emit('user.login', $data, async: true);\n// 立即返回，不等待监听器执行完成\n\n// 3. 队列执行（不阻塞，监听器按顺序串行执行）\nEvent::emit('user.login', $data, queue: true);\n// 立即返回，事件进入队列\n\n// 4. 延迟执行（延迟1秒后执行）\n$timerId = Event::emit('user.login', $data, delay: 1000, async: false);\n\n// 5. 延迟 + 异步（延迟1秒后并行执行）\nEvent::emit('user.login', $data, delay: 1000, async: true);\n\n// 6. 延迟 + 队列（延迟1秒后进入队列）\nEvent::emit('user.login', $data, delay: 1000, queue: true);\n```\n\n### 7.4 监听器优先级\n\n监听器按优先级从小到大顺序执行：\n\n```php\n#[Event(name: 'user.login', priority: 1)]  // 最先执行\nclass LogLoginListener\n{\n    public function run(array $data): void\n    {\n        Log::info('User login', $data);\n    }\n}\n\n#[Event(name: 'user.login', priority: 10)]  // 默认优先级\nclass SendNotificationListener\n{\n    public function run(array $data): void\n    {\n        // 发送通知\n    }\n}\n\n#[Event(name: 'user.login', priority: 100)]  // 最后执行\nclass UpdateLastLoginTimeListener\n{\n    public function run(array $data): void\n    {\n        // 更新最后登录时间\n    }\n}\n```\n\n### 7.5 手动注册监听器\n\n除了使用注解，也可以手动注册监听器：\n\n```php\nuse Swlib\\Event\\EventEnum;\n\n// 注册监听器\nEventEnum::OnWorkerStartEvent->on(\n    listener: [InitializeService::class, 'init'],\n    priority: 10\n);\n\n// 移除监听器\nEventEnum::OnWorkerStartEvent->off(\n    [InitializeService::class, 'init']\n);\n```\n\n### 7.6 事件响应\n\n同步模式下，`emit()` 返回 `EventResponse` 对象：\n\n```php\n$response = Event::emit('order.created', $orderData, async: false);\n\n// 获取执行结果\necho \"总监听器数: {$response->totalListeners}\";\necho \"已执行数: {$response->executedListeners}\";\necho \"是否提前终止: {$response->stoppedEarly}\";\necho \"总耗时: {$response->executionDuration} 秒\";\n\n// 遍历每个监听器的执行结果\nforeach ($response->results as $result) {\n    echo \"监听器: {$result->listenerInfo}\";\n    echo \"优先级: {$result->priority}\";\n    echo \"执行时间: {$result->executionTime}\";\n    echo \"返回值: {$result->result}\";\n}\n```\n\n### 7.7 队列模式\n\n队列模式使用 Swoole Channel 实现事件队列化处理：\n\n```php\n// 队列模式执行\nEvent::emit('heavy.task', $data, queue: true);\n\n// 查看队列长度\nuse Swlib\\Event\\Helper\\EventQueue;\necho \"当前队列长度: \" . EventQueue::length();\n\n// 手动关闭队列\nEventQueue::close();\n```\n\n**队列特性：**\n- 空闲 5 秒后自动关闭，无需手动管理\n- 保证事件按顺序串行执行\n- 不阻塞当前流程\n"}, {"group": "异步与调度", "file": "8-进程管理.md", "title": "8. 进程管理", "markdown": "## 8. 进程管理\n\nSWLib 支持自定义用户进程，适合后台数据处理、定时同步、消息推送等场景。自定义进程独立于 Worker 进程运行，不会阻塞请求处理。\n\n### 快速入口\n\n- 新建一个自定义进程：看 `8.2`\n- 设置进程参数：看 `8.3`\n- 进程通信与共享数据：看 `8.4`\n\n### 常见误用\n\n- `interval` 配置过小导致 CPU 空转\n- 进程内执行阻塞逻辑却未开启/利用协程\n\n### 关联源码\n\n- `Swlib/Process/Attribute/ProcessAttribute.php`\n- `Swlib/Process/Process.php`\n- `Swlib/Process/Abstract/AbstractProcess.php`\n\n### 排障索引\n\n- 自定义进程未启动：检查 `ParseProcess` 输出与注解扫描范围\n- 进程异常退出：查看 `runtime/log` 与 worker 终端日志\n\n### 8.1 概述\n\n#### 进程架构\n\n```\n┌─────────────────────────────────────────────────────────────────┐\n│                      Swoole Server                              │\n├─────────────────────────────────────────────────────────────────┤\n│                                                                 │\n│  ┌──────────────────────────────────────────────────────────┐   │\n│  │                    Master Process                         │   │\n│  └──────────────────────────────────────────────────────────┘   │\n│                           │                                     │\n│         ┌─────────────────┼─────────────────┐                  │\n│         ▼                 ▼                 ▼                  │\n│  ┌─────────────┐   ┌─────────────┐   ┌─────────────┐          │\n│  │  Worker 0   │   │  Worker 1   │   │  Worker N   │   ...    │\n│  │  处理请求   │   │  处理请求   │   │  处理请求   │           │\n│  └─────────────┘   └─────────────┘   └─────────────┘          │\n│                                                                 │\n│  ┌──────────────────────────────────────────────────────────┐   │\n│  │                   User Processes                          │   │\n│  │  ┌───────────┐  ┌───────────┐  ┌───────────┐            │   │\n│  │  │ Process 1 │  │ Process 2 │  │ Process N │    ...      │   │\n│  │  │ 数据同步  │  │ 消息推送  │  │ 统计计算  │            │   │\n│  │  └───────────┘  └───────────┘  └───────────┘            │   │\n│  └──────────────────────────────────────────────────────────┘   │\n│                                                                 │\n│  ┌──────────────────────────────────────────────────────────┐   │\n│  │                   Task Workers                            │   │\n│  │  ┌───────────┐  ┌───────────┐                            │   │\n│  │  │ Task 0    │  │ Task 1    │    ...                     │   │\n│  │  │ 异步任务  │  │ 异步任务  │                            │   │\n│  │  └───────────┘  └───────────┘                            │   │\n│  └──────────────────────────────────────────────────────────┘   │\n│                                                                 │\n└─────────────────────────────────────────────────────────────────┘\n```\n\n#### 进程类型\n\n| 进程类型 | 说明 | 数量 |\n|---------|------|------|\n| Master Process | 主进程，管理子进程 | 1 |\n| Worker Process | 处理 HTTP 请求 | 配置决定 |\n| User Process | 自定义进程，执行后台任务 | 按需定义 |\n| Task Worker | 异步任务处理 | 配置决定 |\n\n---\n\n### 8.2 创建自定义进程\n\n#### 使用注解定义\n\n```php\nuse Swlib\\Process\\Attribute\\ProcessAttribute;\n\n#[ProcessAttribute(\n    interval: 60000,               // 执行间隔（毫秒）\n    redirect_stdin_stdout: false,  // 是否重定向标准输入输出\n    pipe_type: 0,                  // 管道类型\n    enable_coroutine: true         // 是否启用协程\n)]\nclass DataSyncProcess\n{\n    public function run($server, $process): void\n    {\n        echo \"开始数据同步...\" . PHP_EOL;\n\n        try {\n            $this->syncData();\n            echo \"数据同步完成\" . PHP_EOL;\n        } catch (Throwable $e) {\n            echo \"数据同步失败: \" . $e->getMessage() . PHP_EOL;\n        }\n    }\n\n    private function syncData(): void\n    {\n        // 数据同步逻辑\n        // ...\n    }\n}\n```\n\n#### 使用抽象基类\n\n```php\nuse Swlib\\Process\\Abstract\\AbstractProcess;\nuse Swlib\\Process\\Attribute\\ProcessAttribute;\nuse Swoole\\Http\\Server as HttpServer;\nuse Swoole\\Process;\nuse Swoole\\WebSocket\\Server as WSServer;\n\n#[ProcessAttribute(interval: 30000)]\nclass MessagePushProcess extends AbstractProcess\n{\n    public function handle(WSServer|HttpServer $server, Process $process): void\n    {\n        // 获取待推送的消息\n        $messages = $this->getPendingMessages();\n\n        foreach ($messages as $message) {\n            // 推送给在线用户\n            $this->pushToUsers($server, $message);\n        }\n    }\n\n    private function getPendingMessages(): array\n    {\n        // 获取待推送消息\n        return [];\n    }\n\n    private function pushToUsers($server, array $message): void\n    {\n        // 推送逻辑\n    }\n}\n```\n\n---\n\n### 8.3 进程配置参数\n\n#### ProcessAttribute 注解参数\n\n| 参数 | 类型 | 默认值 | 说明 |\n|------|------|--------|------|\n| `interval` | int | 200 | 执行间隔（毫秒），任务执行完成后等待多久再次执行 |\n| `redirect_stdin_stdout` | bool | false | 是否重定向标准输入输出到管道 |\n| `pipe_type` | int | 0 | 管道类型：0=无管道，1=SOCK_STREAM，2=SOCK_DGRAM |\n| `enable_coroutine` | bool | true | 是否启用协程支持 |\n\n#### interval 参数详解\n\n`interval` 不是定时执行，而是**本次执行完成后等待的时间**：\n\n```php\n// 假设 interval = 60000 (60秒)\n// 实际执行间隔 = 任务执行时间 + 60秒\n\n#[ProcessAttribute(interval: 60000)]\nclass DataSyncProcess\n{\n    public function run($server, $process): void\n    {\n        $start = time();\n\n        // 假设这个任务需要 10 秒\n        $this->syncData();  // 10秒\n\n        $end = time();\n        echo \"任务耗时: \" . ($end - $start) . \"秒\" . PHP_EOL;\n\n        // 等待 60 秒后再次执行\n        // 下次执行在 10 + 60 = 70 秒后\n    }\n}\n```\n\n#### 管道类型说明\n\n| pipe_type | 说明 | 使用场景 |\n|-----------|------|---------|\n| 0 | 无管道 | 不需要进程间通信 |\n| 1 | SOCK_STREAM | 需要流式通信（TCP 风格） |\n| 2 | SOCK_DGRAM | 需要数据报通信（UDP 风格） |\n\n---\n\n### 8.4 进程间通信\n\n#### 使用管道通信\n\n```php\nuse Swlib\\Process\\Attribute\\ProcessAttribute;\n\n#[ProcessAttribute(\n    interval: 1000,\n    pipe_type: 1,  // 启用管道\n    enable_coroutine: true\n)]\nclass WorkerProcess\n{\n    public function run($server, $process): void\n    {\n        // 向主进程发送数据\n        $process->write(json_encode([\n            'type' => 'status',\n            'message' => '处理完成',\n            'time' => time()\n        ]));\n\n        // 从管道读取数据（阻塞）\n        // $data = $process->read();\n    }\n}\n\n// 在服务器事件中接收\nclass OnPipeMessageEvent\n{\n    public function handle($server, $srcWorkerId, $data): void\n    {\n        $message = json_decode($data, true);\n        // 处理来自自定义进程的消息\n    }\n}\n```\n\n#### 使用共享内存 (Table)\n\n```php\nuse Swoole\\Table;\n\n// 创建共享内存表\n$table = new Table(1024);\n$table->column('value', Table::TYPE_STRING, 256);\n$table->create();\n\n// 在进程中读写\n#[ProcessAttribute(interval: 1000)]\nclass SharedMemoryProcess\n{\n    private Table $table;\n\n    public function __construct()\n    {\n        global $table;  // 全局共享\n        $this->table = $table;\n    }\n\n    public function run($server, $process): void\n    {\n        // 读取\n        $value = $this->table->get('key', 'value');\n\n        // 写入\n        $this->table->set('key', ['value' => 'new_value']);\n    }\n}\n```\n\n---\n\n### 8.5 实际应用示例\n\n#### 数据同步进程\n\n```php\nuse Swlib\\Process\\Attribute\\ProcessAttribute;\nuse Generate\\Tables\\UserTable;\nuse Swlib\\Connect\\PoolRedis;\nuse Swlib\\Utils\\Log;\n\n#[ProcessAttribute(interval: 60000)]  // 每分钟同步一次\nclass UserSyncProcess\n{\n    public function run($server, $process): void\n    {\n        Log::info('开始用户数据同步');\n\n        try {\n            // 1. 获取需要同步的用户\n            $users = new UserTable()\n                ->where([UserTable::SYNC_STATUS => 0])\n                ->page(1, 100)\n                ->selectAll();\n\n            foreach ($users as $user) {\n                // 2. 同步到外部系统\n                $this->syncToExternal($user);\n\n                // 3. 更新同步状态\n                new UserTable()\n                    ->where([UserTable::ID => $user->id])\n                    ->update([UserTable::SYNC_STATUS => 1]);\n            }\n\n            Log::info('用户数据同步完成', ['count' => count($users)]);\n\n        } catch (Throwable $e) {\n            Log::saveException($e, 'user_sync');\n        }\n    }\n\n    private function syncToExternal($user): void\n    {\n        // 同步逻辑\n    }\n}\n```\n\n#### 消息队列消费进程\n\n```php\nuse Swlib\\Process\\Attribute\\ProcessAttribute;\nuse Swlib\\Connect\\PoolRedis;\nuse Swlib\\Utils\\Log;\n\n#[ProcessAttribute(interval: 100)]  // 每 100ms 检查一次\nclass QueueConsumerProcess\n{\n    public function run($server, $process): void\n    {\n        PoolRedis::call(function (Redis $redis) {\n            // 阻塞获取队列消息\n            $result = $redis->brPop('message_queue', 5);\n\n            if ($result) {\n                [, $message] = $result;\n                $this->processMessage($message);\n            }\n        });\n    }\n\n    private function processMessage(string $message): void\n    {\n        $data = json_decode($message, true);\n\n        try {\n            // 处理消息\n            match ($data['type']) {\n                'email' => $this->sendEmail($data),\n                'sms' => $this->sendSms($data),\n                'push' => $this->sendPush($data),\n                default => Log::warning('未知消息类型', $data)\n            };\n        } catch (Throwable $e) {\n            Log::saveException($e, 'queue_consumer');\n        }\n    }\n\n    private function sendEmail(array $data): void { /* ... */ }\n    private function sendSms(array $data): void { /* ... */ }\n    private function sendPush(array $data): void { /* ... */ }\n}\n```\n\n#### WebSocket 推送进程\n\n```php\nuse Swlib\\Process\\Attribute\\ProcessAttribute;\nuse Swlib\\DataManager\\FdManager;\nuse Swlib\\Utils\\Log;\n\n#[ProcessAttribute(interval: 1000)]\nclass WebSocketPushProcess\n{\n    public function run($server, $process): void\n    {\n        // 获取需要推送的消息\n        $messages = $this->getPendingMessages();\n\n        foreach ($messages as $message) {\n            // 推送给指定用户\n            if ($message['user_id']) {\n                $fd = FdManager::getFdByUserId($message['user_id']);\n                if ($fd && $server->isEstablished($fd)) {\n                    $server->push($fd, json_encode($message['data']));\n                }\n            }\n\n            // 推送给所有用户\n            if ($message['broadcast']) {\n                foreach ($server->connections as $fd) {\n                    if ($server->isEstablished($fd)) {\n                        $server->push($fd, json_encode($message['data']));\n                    }\n                }\n            }\n        }\n    }\n\n    private function getPendingMessages(): array\n    {\n        // 从数据库或缓存获取待推送消息\n        return [];\n    }\n}\n```\n\n---\n\n### 8.6 进程生命周期\n\n#### 启动流程\n\n```\n1. 框架解析 ProcessAttribute 注解\n2. 生成 ProcessMap 映射文件\n3. 服务器启动时调用 Process::run()\n4. 为每个进程配置创建 Swoole\\Process\n5. 设置进程名称为 php_user_proc:ClassName\n6. 进入执行循环\n```\n\n#### 执行循环\n\n```php\n// 框架内部实现\nwhile (true) {\n    $ctrl->$methodName($server, $process);  // 执行任务\n\n    if ($interval > 0) {\n        System::sleep($interval / 1000);    // 等待间隔时间\n    }\n}\n```\n\n#### 进程退出\n\n```php\n// 优雅退出\n#[ProcessAttribute(interval: 5000)]\nclass GracefulProcess\n{\n    private bool $running = true;\n\n    public function run($server, $process): void\n    {\n        // 监听信号\n        Swoole\\Process::signal(SIGTERM, function () {\n            $this->running = false;\n        });\n\n        while ($this->running) {\n            $this->doWork();\n            System::sleep(1);\n        }\n\n        echo \"进程优雅退出\" . PHP_EOL;\n    }\n}\n```\n\n---\n\n### 8.7 最佳实践\n\n#### 避免阻塞操作\n\n```php\n// 不推荐：长时间阻塞\n#[ProcessAttribute(interval: 60000)]\nclass BadProcess\n{\n    public function run($server, $process): void\n    {\n        sleep(300);  // 阻塞 5 分钟\n    }\n}\n\n// 推荐：使用协程\n#[ProcessAttribute(interval: 60000, enable_coroutine: true)]\nclass GoodProcess\n{\n    public function run($server, $process): void\n    {\n        System::sleep(300);  // 协程 sleep，不阻塞其他协程\n    }\n}\n```\n\n#### 异常处理\n\n```php\n#[ProcessAttribute(interval: 10000)]\nclass SafeProcess\n{\n    public function run($server, $process): void\n    {\n        try {\n            $this->doWork();\n        } catch (Throwable $e) {\n            Log::saveException($e, 'process');\n            // 不抛出异常，让进程继续运行\n        }\n    }\n}\n```\n\n#### 合理设置间隔\n\n```php\n// 高频任务：100ms - 1s\n#[ProcessAttribute(interval: 100)]\nclass HighFrequencyProcess { }\n\n// 中频任务：1s - 10s\n#[ProcessAttribute(interval: 5000)]\nclass MediumFrequencyProcess { }\n\n// 低频任务：10s - 5min\n#[ProcessAttribute(interval: 60000)]\nclass LowFrequencyProcess { }\n```\n\n---\n\n### 8.8 调试与监控\n\n#### 查看进程状态\n\n```bash\n# 查看所有 PHP 进程\nps aux | grep php\n\n# 输出示例：\n# php_user_proc:DataSyncProcess\n# php_user_proc:MessagePushProcess\n# php_swoole_worker\n```\n\n#### 日志记录\n\n```php\n#[ProcessAttribute(interval: 1000)]\nclass MonitoredProcess\n{\n    public function run($server, $process): void\n    {\n        $start = microtime(true);\n\n        Log::info('进程开始执行', ['process' => __CLASS__]);\n\n        try {\n            $this->doWork();\n            $duration = round((microtime(true) - $start) * 1000, 2);\n            Log::info('进程执行完成', ['duration' => $duration . 'ms']);\n        } catch (Throwable $e) {\n            Log::error('进程执行失败', [\n                'error' => $e->getMessage(),\n                'duration' => round((microtime(true) - $start) * 1000, 2) . 'ms'\n            ]);\n        }\n    }\n}\n```\n\n---\n\n### 8.9 API 参考\n\n#### ProcessAttribute 注解\n\n```php\nnamespace Swlib\\Process\\Attribute;\n\n#[Attribute(Attribute::TARGET_CLASS | Attribute::TARGET_METHOD)]\nclass ProcessAttribute\n{\n    public function __construct(\n        public bool $redirect_stdin_stdout = false,\n        public int  $pipe_type = 0,\n        public bool $enable_coroutine = true,\n        public int  $interval = 200  // 毫秒\n    ) {}\n}\n```\n\n#### AbstractProcess 抽象类\n\n```php\nnamespace Swlib\\Process\\Abstract;\n\nabstract class AbstractProcess\n{\n    abstract public function handle(\n        Swoole\\WebSocket\\Server|Swoole\\Http\\Server $server,\n        Swoole\\Process $process\n    ): void;\n}\n```\n\n#### Process 类方法\n\n| 方法 | 说明 |\n|------|------|\n| `run($server)` | 静态方法，启动所有自定义进程 |\n"}, {"group": "异步与调度", "file": "9-定时任务.md", "title": "9. 定时任务", "markdown": "## 9. 定时任务\n\nSWLib 提供了基于 Cron 表达式的定时任务调度系统，支持精确的时间控制、协程执行、超时设置和防重复执行。\n\n### 快速入口\n\n- 定义定时任务：看 `9.2`\n- 编写 Cron 表达式：看 `9.3`\n- 防重与超时控制：看 `9.6`\n\n### 常见误用\n\n- 任务无幂等设计，重试后产生重复副作用\n- 超时配置与任务实际时长不匹配\n\n### 关联源码\n\n- `Swlib/Crontab/Attribute/CrontabAttribute.php`\n- `Swlib/Crontab/CrontabScheduler.php`\n- `Swlib/Crontab/CronExpression.php`\n\n### 排障索引\n\n- 任务不执行：先检查 cron 表达式，再看调度进程是否启动\n- 同一任务重复跑：检查任务锁与幂等保护逻辑\n\n### 9.1 概述\n\n#### 调度器架构\n\n```\n┌─────────────────────────────────────────────────────────────────┐\n│                    CrontabScheduler                             │\n│                    (独立进程运行)                                │\n├─────────────────────────────────────────────────────────────────┤\n│                                                                 │\n│  ┌─────────────────────────────────────────────────────────┐   │\n│  │                  主循环 (每秒检查)                        │   │\n│  │                                                          │   │\n│  │   foreach (CrontabMap::TASKS as $task) {                │   │\n│  │       if (任务到期?) {                                   │   │\n│  │           if (允许协程?) {                               │   │\n│  │               Coroutine::create(executeTask);           │   │\n│  │           } else {                                       │   │\n│  │               executeTask();                             │   │\n│  │           }                                              │   │\n│  │       }                                                  │   │\n│  │   }                                                      │   │\n│  │                                                          │   │\n│  │   System::sleep(1);  // 等待 1 秒                        │   │\n│  └─────────────────────────────────────────────────────────┘   │\n│                                                                 │\n└─────────────────────────────────────────────────────────────────┘\n```\n\n#### 特性\n\n- **标准 Cron 表达式** - 支持 5 字段标准格式\n- **防重复执行** - 同一分钟内同一任务只执行一次\n- **协程支持** - 任务可在独立协程中执行\n- **超时控制** - 可设置任务执行超时时间\n- **异常处理** - 自动捕获并记录异常\n- **执行日志** - 记录任务开始、完成、失败状态\n\n---\n\n### 9.2 创建定时任务\n\n#### 基本用法\n\n```php\nuse Swlib\\Crontab\\Attribute\\CrontabAttribute;\n\n#[CrontabAttribute(\n    cron: '0 * * * *',       // Cron 表达式\n    timeout: 300,            // 超时时间（秒）\n    enable_coroutine: true,  // 启用协程\n    name: 'hourly_statistics' // 任务名称（可选）\n)]\nclass HourlyStatisticsTask\n{\n    public function handle($server): void\n    {\n        // 执行统计任务\n        $this->calculateStatistics();\n    }\n\n    private function calculateStatistics(): void\n    {\n        // 统计逻辑\n    }\n}\n```\n\n#### 使用类方法\n\n```php\nuse Swlib\\Crontab\\Attribute\\CrontabAttribute;\n\nclass StatisticsTasks\n{\n    #[CrontabAttribute(cron: '0 * * * *', name: 'hourly_stats')]\n    public function hourlyStatistics($server): void\n    {\n        // 每小时统计\n    }\n\n    #[CrontabAttribute(cron: '0 0 * * *', name: 'daily_cleanup')]\n    public function dailyCleanup($server): void\n    {\n        // 每天凌晨清理\n    }\n\n    #[CrontabAttribute(cron: '0 0 * * 0', name: 'weekly_report')]\n    public function weeklyReport($server): void\n    {\n        // 每周报告\n    }\n}\n```\n\n#### 注解签名校验（启动时强校验）\n\n- 类级注解（写在类上）必须实现：`public function handle($server): void`。\n- 方法级注解（写在方法上）必须满足：`public function xxx($server): void`。\n- 参数数量必须为 `1`，返回类型必须显式声明为 `void`。\n- 任一任务签名不符合规范时，解析阶段会输出严重错误并中止启动（fail-fast）。\n\n---\n\n### 9.3 Cron 表达式\n\n#### 格式说明\n\n```\n┌───────────── 分钟 (0-59)\n│ ┌───────────── 小时 (0-23)\n│ │ ┌───────────── 日期 (1-31)\n│ │ │ ┌───────────── 月份 (1-12)\n│ │ │ │ ┌───────────── 星期 (0-6, 0=周日)\n│ │ │ │ │\n* * * * *\n```\n\n#### 支持的特殊字符\n\n| 字符 | 说明 | 示例 |\n|------|------|------|\n| `*` | 任意值 | `* * * * *` = 每分钟 |\n| `,` | 列表 | `0,30 * * * *` = 每小时的 0分和30分 |\n| `-` | 范围 | `0 9-17 * * *` = 9点到17点每小时 |\n| `/` | 步长 | `*/5 * * * *` = 每5分钟 |\n\n#### 常用表达式\n\n| 表达式 | 说明 |\n|--------|------|\n| `* * * * *` | 每分钟执行 |\n| `*/5 * * * *` | 每5分钟执行 |\n| `0 * * * *` | 每小时整点执行 |\n| `0 */2 * * *` | 每2小时执行 |\n| `0 0 * * *` | 每天午夜 00:00 执行 |\n| `0 9 * * *` | 每天早上 9:00 执行 |\n| `0 9,18 * * *` | 每天 9:00 和 18:00 执行 |\n| `0 9-17 * * *` | 每天 9:00 到 17:00 每小时执行 |\n| `0 0 * * 0` | 每周日午夜执行 |\n| `0 0 * * 1` | 每周一午夜执行 |\n| `0 0 * * 1-5` | 每个工作日午夜执行 |\n| `0 0 1 * *` | 每月1号午夜执行 |\n| `0 0 1 1 *` | 每年1月1号午夜执行 |\n\n#### 业务场景示例\n\n```php\n// 1. 每小时数据统计\n#[CrontabAttribute(cron: '0 * * * *')]\nclass HourlyStatistics { }\n\n// 2. 每天 9 点发送早报\n#[CrontabAttribute(cron: '0 9 * * *')]\nclass MorningReport { }\n\n// 3. 每天午夜清理过期数据\n#[CrontabAttribute(cron: '0 0 * * *')]\nclass DailyCleanup { }\n\n// 4. 每周一 10 点生成周报\n#[CrontabAttribute(cron: '0 10 * * 1')]\nclass WeeklyReport { }\n\n// 5. 每月 1 号统计月度数据\n#[CrontabAttribute(cron: '0 0 1 * *')]\nclass MonthlyStatistics { }\n\n// 6. 工作日 9-18 点每小时检查\n#[CrontabAttribute(cron: '0 9-18 * * 1-5')]\nclass WorkingHoursCheck { }\n\n// 7. 每 5 分钟心跳检测\n#[CrontabAttribute(cron: '*/5 * * * *')]\nclass Heartbeat { }\n\n// 8. 每天 12 点和 18 点推送\n#[CrontabAttribute(cron: '0 12,18 * * *')]\nclass ScheduledPush { }\n```\n\n---\n\n### 9.4 任务配置参数\n\n#### CrontabAttribute 参数\n\n| 参数 | 类型 | 默认值 | 说明 |\n|------|------|--------|------|\n| `cron` | string | 必填 | Cron 表达式 |\n| `timeout` | int | 300 | 超时时间（秒），0 表示无限制 |\n| `enable_coroutine` | bool | true | 是否在协程中执行 |\n| `name` | string | '' | 任务名称，默认使用 `类名::方法名` |\n\n#### 超时设置\n\n```php\n// 短任务：30秒超时\n#[CrontabAttribute(cron: '*/5 * * * *', timeout: 30)]\nclass QuickCheck { }\n\n// 中等任务：5分钟超时\n#[CrontabAttribute(cron: '0 * * * *', timeout: 300)]\nclass NormalTask { }\n\n// 长任务：30分钟超时\n#[CrontabAttribute(cron: '0 0 * * *', timeout: 1800)]\nclass LongRunningTask { }\n\n// 无超时限制\n#[CrontabAttribute(cron: '0 0 1 * *', timeout: 0)]\nclass NoTimeoutTask { }\n```\n\n---\n\n### 9.5 实际应用示例\n\n#### 数据清理任务\n\n```php\nuse Swlib\\Crontab\\Attribute\\CrontabAttribute;\nuse Generate\\Tables\\UserLoginHisTable;\nuse Swlib\\Utils\\Log;\n\n#[CrontabAttribute(\n    cron: '0 0 * * *',        // 每天午夜执行\n    timeout: 600,             // 10分钟超时\n    name: 'cleanup_expired_data'\n)]\nclass DataCleanupTask\n{\n    public function handle($server): void\n    {\n        Log::info('开始清理过期数据');\n\n        // 1. 清理 90 天前的登录日志\n        $deleted = new UserLoginHisTable()\n            ->where([\n                [UserLoginHisTable::CREATED_AT, '<', strtotime('-90 days')]\n            ])\n            ->delete();\n\n        Log::info('登录日志清理完成', ['deleted' => $deleted]);\n\n        // 2. 清理过期缓存\n        $this->clearExpiredCache();\n\n        // 3. 清理临时文件\n        $this->clearTempFiles();\n\n        Log::info('过期数据清理完成');\n    }\n\n    private function clearExpiredCache(): void\n    {\n        // 清理逻辑\n    }\n\n    private function clearTempFiles(): void\n    {\n        // 清理逻辑\n    }\n}\n```\n\n#### 统计任务\n\n```php\nuse Swlib\\Crontab\\Attribute\\CrontabAttribute;\nuse Generate\\Tables\\OrderTable;\nuse Generate\\Tables\\StatisticsTable;\nuse Swlib\\Utils\\Log;\n\n#[CrontabAttribute(\n    cron: '0 * * * *',        // 每小时执行\n    timeout: 300\n)]\nclass HourlyStatisticsTask\n{\n    public function handle($server): void\n    {\n        $hour = date('Y-m-d H:00:00', strtotime('-1 hour'));\n\n        // 统计上一小时的订单数据\n        $stats = new OrderTable()\n            ->field([\n                'COUNT(*) as total_orders',\n                'SUM(total_amount) as total_amount',\n                'AVG(total_amount) as avg_amount'\n            ])\n            ->where([\n                [OrderTable::CREATED_AT, '>=', strtotime($hour)],\n                [OrderTable::CREATED_AT, '<', strtotime('+1 hour', strtotime($hour))]\n            ])\n            ->selectOne();\n\n        // 保存统计结果\n        new StatisticsTable()->insert([\n            StatisticsTable::PERIOD => $hour,\n            StatisticsTable::TOTAL_ORDERS => $stats->totalOrders,\n            StatisticsTable::TOTAL_AMOUNT => $stats->totalAmount,\n            StatisticsTable::AVG_AMOUNT => $stats->avgAmount,\n            StatisticsTable::CREATED_AT => time()\n        ]);\n\n        Log::info('小时统计完成', [\n            'period' => $hour,\n            'orders' => $stats->totalOrders\n        ]);\n    }\n}\n```\n\n#### 消息推送任务\n\n```php\nuse Swlib\\Crontab\\Attribute\\CrontabAttribute;\nuse Generate\\Tables\\UserTable;\nuse Generate\\Tables\\PushNotificationTable;\nuse Swlib\\Connect\\PoolRedis;\nuse Swlib\\Utils\\Log;\n\n#[CrontabAttribute(\n    cron: '*/5 * * * *',      // 每5分钟检查\n    timeout: 60,\n    enable_coroutine: true\n)]\nclass PushNotificationTask\n{\n    public function handle($server): void\n    {\n        // 获取待推送的消息\n        $notifications = new PushNotificationTable()\n            ->where([\n                PushNotificationTable::STATUS => 0,\n                [PushNotificationTable::SCHEDULED_AT, '<=', time()]\n            ])\n            ->page(1, 100)\n            ->selectAll();\n\n        foreach ($notifications as $notification) {\n            try {\n                $this->sendPush($notification);\n\n                // 更新状态为已发送\n                new PushNotificationTable()\n                    ->where([PushNotificationTable::ID => $notification->id])\n                    ->update([\n                        PushNotificationTable::STATUS => 1,\n                        PushNotificationTable::SENT_AT => time()\n                    ]);\n\n            } catch (Throwable $e) {\n                Log::error('推送失败', [\n                    'notification_id' => $notification->id,\n                    'error' => $e->getMessage()\n                ]);\n            }\n        }\n    }\n\n    private function sendPush($notification): void\n    {\n        // 推送逻辑\n    }\n}\n```\n\n---\n\n### 9.6 任务执行机制\n\n#### 防重复执行\n\n框架确保同一分钟内同一任务只执行一次：\n\n```php\n// 框架内部实现\nprivate array $lastExecuted = [];\n\nprivate function checkAndExecuteTasks($server, DateTime $now): void\n{\n    foreach (CrontabMap::TASKS as $task) {\n        $taskId = $task['run'][0] . '::' . $task['run'][1];\n\n        // 检查是否已执行\n        $currentMinute = $now->format('Y-m-d H:i');\n        if (isset($this->lastExecuted[$taskId]) &&\n            $this->lastExecuted[$taskId] === $currentMinute) {\n            continue;  // 跳过已执行的任务\n        }\n\n        // 记录执行时间\n        $this->lastExecuted[$taskId] = $currentMinute;\n\n        // 执行任务\n        // ...\n    }\n}\n```\n\n#### 协程执行\n\n当 `enable_coroutine: true` 时，任务在独立协程中执行：\n\n```php\n// 创建协程执行任务\nif ($task['enable_coroutine']) {\n    Coroutine::create(function () use ($task, $server, $taskId) {\n        $this->executeTask($task, $server, $taskId);\n    });\n} else {\n    $this->executeTask($task, $server, $taskId);\n}\n```\n\n#### 超时控制\n\n使用 Swoole Timer 实现超时控制：\n\n```php\nprivate function executeTask(array $task, $server, string $taskId): void\n{\n    $timeout = $task['timeout'] ?? 300;\n\n    if ($timeout > 0 && Coroutine::getCid() > 0) {\n        $timerId = Timer::after($timeout * 1000, function () use ($taskId, $timeout) {\n            Log::error(\"Task timeout: $taskId (timeout: {$timeout}s)\");\n        });\n\n        try {\n            $instance->$methodName($server);\n        } finally {\n            Timer::clear($timerId);\n        }\n    }\n}\n```\n\n---\n\n### 9.7 任务日志\n\n#### 自动日志\n\n框架自动记录任务的开始、完成和失败：\n\n```\n[INFO] Task started: DataCleanupTask::handle\n[INFO] Task completed: DataCleanupTask::handle (1234.56ms)\n[ERROR] Task failed: DataCleanupTask::handle (500.12ms) - 数据库连接超时\n[ERROR] Task timeout: LongRunningTask::handle (timeout: 300s)\n```\n\n#### 自定义日志\n\n```php\n#[CrontabAttribute(cron: '0 * * * *')]\nclass MonitoredTask\n{\n    public function handle($server): void\n    {\n        $startTime = microtime(true);\n\n        Log::info('任务开始', ['task' => __CLASS__]);\n\n        try {\n            $result = $this->doWork();\n\n            $duration = round((microtime(true) - $startTime) * 1000, 2);\n            Log::info('任务完成', [\n                'duration' => $duration . 'ms',\n                'result' => $result\n            ]);\n\n        } catch (Throwable $e) {\n            Log::error('任务失败', [\n                'error' => $e->getMessage(),\n                'trace' => $e->getTraceAsString()\n            ]);\n        }\n    }\n}\n```\n\n---\n\n### 9.8 最佳实践\n\n#### 任务幂等性\n\n```php\n// 推荐：任务可以安全地重复执行\n#[CrontabAttribute(cron: '*/5 * * * *')]\nclass IdempotentTask\n{\n    public function handle($server): void\n    {\n        // 使用状态标记避免重复处理\n        $items = new OrderTable()\n            ->where([\n                OrderTable::STATUS => OrderTable::STATUS_PENDING,\n                OrderTable::PROCESS_LOCK => 0\n            ])\n            ->lock()\n            ->selectOne();\n\n        if ($items) {\n            // 处理并更新状态\n        }\n    }\n}\n```\n\n#### 任务拆分\n\n```php\n// 不推荐：一个大任务处理所有数据\n#[CrontabAttribute(cron: '0 0 * * *')]\nclass BadDailyTask\n{\n    public function handle($server): void\n    {\n        $users = new UserTable()->selectAll();  // 可能很多\n        foreach ($users as $user) {\n            $this->processUser($user);  // 逐个处理\n        }\n    }\n}\n\n// 推荐：分批处理\n#[CrontabAttribute(cron: '0 0 * * *')]\nclass GoodDailyTask\n{\n    public function handle($server): void\n    {\n        $page = 1;\n        $pageSize = 100;\n\n        while (true) {\n            $users = new UserTable()\n                ->where([UserTable::NEED_PROCESS => 1])\n                ->page($page, $pageSize)\n                ->selectAll();\n\n            if (empty($users->__rows)) {\n                break;\n            }\n\n            foreach ($users as $user) {\n                $this->processUser($user);\n            }\n\n            $page++;\n        }\n    }\n}\n```\n\n#### 异常处理\n\n```php\n#[CrontabAttribute(cron: '0 * * * *')]\nclass SafeTask\n{\n    public function handle($server): void\n    {\n        // 整体异常捕获\n        try {\n            $this->doWork();\n        } catch (Throwable $e) {\n            Log::saveException($e, 'crontab');\n            // 不要抛出异常，让调度器继续运行\n        }\n    }\n\n    private function doWork(): void\n    {\n        $items = $this->getItems();\n\n        foreach ($items as $item) {\n            try {\n                $this->processItem($item);\n            } catch (Throwable $e) {\n                // 单个项目失败不影响其他项目\n                Log::error('处理失败', [\n                    'item_id' => $item->id,\n                    'error' => $e->getMessage()\n                ]);\n            }\n        }\n    }\n}\n```\n\n#### 合理设置超时\n\n```php\n// 根据任务预期执行时间设置超时\n#[CrontabAttribute(cron: '*/5 * * * *', timeout: 60)]   // 快速检查：1分钟\nclass QuickCheck { }\n\n#[CrontabAttribute(cron: '0 * * * *', timeout: 300)]    // 常规任务：5分钟\nclass RegularTask { }\n\n#[CrontabAttribute(cron: '0 0 * * *', timeout: 1800)]  // 日常任务：30分钟\nclass DailyTask { }\n```\n\n---\n\n### 9.9 调试与监控\n\n#### 查看定时任务列表\n\n```php\n// 定时任务配置在运行时生成\n// 位置：runtime/Generate/CrontabMap.php\n\n// 查看已注册的任务\n$tasks = CrontabMap::TASKS;\n```\n\n#### 手动触发测试\n\n```php\n// 创建测试路由\n#[Router(method: 'POST')]\npublic function testCron(): JsonResponse\n{\n    $task = new DataCleanupTask();\n    $task->handle($this->server);\n\n    return JsonResponse::success('任务执行完成');\n}\n```\n\n#### 监控任务执行\n\n```bash\n# 查看定时任务日志\ntail -f runtime/log/*/crontab.log\n```\n\n---\n\n### 9.10 API 参考\n\n#### CrontabAttribute 注解\n\n```php\nnamespace Swlib\\Crontab\\Attribute;\n\n#[Attribute(Attribute::TARGET_CLASS | Attribute::TARGET_METHOD)]\nclass CrontabAttribute\n{\n    public function __construct(\n        public string $cron,            // Cron 表达式（必需）\n        public int    $timeout = 300,   // 超时时间（秒）\n        public bool   $enable_coroutine = true,\n        public string $name = ''\n    ) {}\n}\n```\n\n#### CronExpression 类\n\n```php\nnamespace Swlib\\Crontab;\n\nclass CronExpression\n{\n    public function __construct(string $expression) {}\n\n    // 判断给定时间是否应该执行\n    public function isDue(DateTime $now): bool {}\n}\n```\n\n#### CrontabScheduler 类\n\n| 方法 | 说明 |\n|------|------|\n| `run($server)` | 静态方法，启动调度器进程 |\n\n---\n\n### 9.11 定时任务 vs 自定义进程\n\n| 特性 | 定时任务 (Crontab) | 自定义进程 (Process) |\n|------|-------------------|---------------------|\n| 执行方式 | 按时间点执行 | 循环执行 |\n| 时间精度 | 分钟级 | 毫秒级 |\n| 适用场景 | 定时报表、清理、统计 | 消费队列、监控、推送 |\n| 防重复 | 自动防止 | 需手动实现 |\n| 调度 | 单进程多协程 | 独立进程 |\n\n```php\n// 定时任务：适合固定时间点的任务\n#[CrontabAttribute(cron: '0 9 * * *')]  // 每天 9 点\nclass DailyReport { }\n\n// 自定义进程：适合持续运行的任务\n#[ProcessAttribute(interval: 100)]  // 每 100ms 检查\nclass QueueConsumer { }\n```\n"}, {"group": "异步与调度", "file": "10-队列系统.md", "title": "10. 队列系统", "markdown": "## 10. 队列系统\n\nSWLib 提供了基于注解的延迟消息队列系统，用于处理需要延迟执行或异步执行的任务。\n\n### 快速入口\n\n- 声明队列任务：看 `10.1` 与 `10.2`\n- 重试/清理策略：看 `10.4` 与 `10.5`\n- 事务型队列执行：看 `10.6`\n\n### 常见误用\n\n- 未设置合理重试间隔，失败任务挤压\n- 业务方法不幂等，重试导致重复效果\n\n### 关联源码\n\n- `Swlib/Queue/Attribute/QueueAttribute.php`\n- `Swlib/Queue/MessageQueue.php`\n- `Swlib/Queue/Process/MessageQueueProcess.php`\n\n### 排障索引\n\n- 队列长期不消费：检查 `message_queue_lock` 与消费进程状态\n- 重复执行：检查 `clear` 策略与 `msg_key` 去重逻辑\n\n### 10.1 队列注解\n\n使用 `#[QueueAttribute]` 注解将方法标记为队列任务：\n\n```php\nuse Swlib\\Queue\\Attribute\\QueueAttribute;\n\nclass UserOnlineService\n{\n    // 推荐写法：返回类型为 int，添加占位返回值\n    #[QueueAttribute(\n        delay: 120,           // 延迟 120 秒执行\n        maxRetry: 1,          // 最大重试次数\n        clear: true           // 入队时清理之前的同类消息\n    )]\n    public static function delayedOffline(int $userId, int $appId): int\n    {\n        // 业务逻辑（消费时执行）\n        self::doOffline($userId, $appId);\n\n        return 0; // 占位符，代理调用时返回实际队列ID\n    }\n}\n\n// 调用示例\n$queueId = UserOnlineService::delayedOffline($userId, $appId);\n// $queueId 是队列ID，可用于 MessageQueue::cancel($queueId) 取消任务\n```\n\n**执行流程：**\n1. 调用方法 → 代理拦截 → 投递到队列 → **返回队列ID (int)**\n2. 队列消费 → 执行原方法逻辑\n\n### 10.2 注解参数\n\n| 参数 | 类型 | 默认值 | 说明 |\n|------|------|--------|------|\n| `delay` | int | 0 | 延迟执行时间（秒），0 表示立即执行 |\n| `maxRetry` | int | 30 | 最大重试次数 |\n| `retryIntervals` | array | `[5, 10, 20, 30, ...]` | 重试时间间隔数组（秒） |\n| `clear` | bool | false | 入队时是否清理之前的同类消息 |\n| `priority` | int | 0 | 执行优先级（多个注解时需显式指定） |\n| `async` | bool | false | 是否异步执行 |\n\n### 10.3 返回值说明\n\n**重要：** 使用 `#[QueueAttribute]` 注解的方法，调用时不会立即执行方法体，而是返回**队列ID**：\n\n```php\n// 调用方\n$queueId = UserService::sendEmail($userId);  // 返回 int (队列ID)\n\n// 可以用队列ID取消任务\nMessageQueue::cancel($queueId);\n\n// 查询任务状态\n$status = MessageQueue::getStatus($queueId);\n```\n\n**建议：** 将方法返回类型声明为 `int`，并添加 `return 0;` 占位符，以便 IDE 正确推断返回类型。\n\n### 10.4 使用示例\n\n#### 基本队列任务\n\n```php\nuse Swlib\\Queue\\Attribute\\QueueAttribute;\n\nclass EmailService\n{\n    #[QueueAttribute(delay: 0)]\n    public static function sendWelcome(int $userId): int\n    {\n        $user = new UserTable()->where([UserTable::ID => $userId])->selectOne();\n\n        // 发送欢迎邮件\n        Mail::to($user->email)->send('欢迎注册！');\n\n        return 0;\n    }\n}\n\n// 调用\nEmailService::sendWelcome($userId);\n```\n\n#### 延迟执行任务\n\n```php\n#[QueueAttribute(delay: 600)]  // 10分钟后执行\npublic static function expireOrder(int $orderId): int\n{\n    new OrderTable()->where([OrderTable::ID => $orderId])->update([\n        OrderTable::STATUS => 'expired'\n    ]);\n\n    return 0;\n}\n```\n\n#### 任务清理和重试\n\n```php\n#[QueueAttribute(\n    delay: 60,               // 60秒后执行\n    maxRetry: 3,             // 最多重试3次\n    retryIntervals: [60, 300, 900],  // 重试间隔：1分钟、5分钟、15分钟\n    clear: true              // 清理之前的同类任务\n)]\npublic static function syncUserData(int $userId): int\n{\n    // 同步用户数据到第三方系统\n    // 如果失败，会按 retryIntervals 的时间间隔重试\n\n    return 0;\n}\n```\n\n#### 进度更新\n\n在队列任务中更新执行进度：\n\n```php\nuse Swlib\\Queue\\MessageQueue;\n\n#[QueueAttribute(delay: 0)]\npublic static function processBatch(int $batchId): int\n{\n    $items = new BatchItemTable()\n        ->where([BatchItemTable::BATCH_ID => $batchId])\n        ->selectAll();\n\n    $total = $items->count();\n\n    foreach ($items as $index => $item) {\n        // 处理单个项目\n        $this->processItem($item);\n\n        // 更新进度 (0.0 - 1.0)\n        $progress = ($index + 1) / $total;\n        MessageQueue::updateProgress($msgId, $progress);\n    }\n\n    return 0;\n}\n```\n\n**注意：** 要在任务中使用 `updateProgress`，需要在方法签名中接收 `$msgId` 参数（执行时自动传入）：\n\n```php\nuse Generate\\TablesDto\\Main\\MessageQueueTableDto;\n\n#[QueueAttribute(delay: 0)]\npublic static function processBatch(int $batchId, MessageQueueTableDto $dto): int\n{\n    $msgId = $dto->id;  // 获取队列消息ID\n    // ...\n    MessageQueue::updateProgress($msgId, $progress);\n    return 0;\n}\n```\n\n### 10.5 查询和取消\n\n#### 查询任务状态\n\n```php\nuse Swlib\\Queue\\MessageQueue;\n\n$status = MessageQueue::getStatus($msgId);\n\n// 返回：\n// [\n//     'progress' => 0.5,      // 进度 0-1\n//     'error' => null,       // 错误信息\n//     'isSuccess' => false,  // 是否成功\n//     'isDiscard' => false    // 是否已丢弃\n// ]\n```\n\n#### 取消任务\n\n```php\nuse Swlib\\Queue\\MessageQueue;\n\n// 只能取消未执行且未成功的任务\n$cancelled = MessageQueue::cancel($msgId);\n```\n\n### 10.6 事务支持\n\n队列任务支持在事务中执行。如果方法上有 `#[Transaction]` 注解，任务会自动在事务中执行：\n\n```php\nuse Swlib\\Queue\\Attribute\\QueueAttribute;\nuse Swlib\\Table\\Attributes\\Transaction;\n\nclass OrderService\n{\n    #[QueueAttribute(delay: 0)]\n    #[Transaction]\n    public static function processOrder(int $orderId): int\n    {\n        // 这些操作会在事务中执行\n        new OrderTable()->where([OrderTable::ID => $orderId])->update([...]);\n        new OrderLogTable()->insert([...]);\n\n        return 0;\n    }\n}\n```\n\n### 10.7 队列消费\n\n队列由 `MessageQueueProcess` 进程自动消费，每 10 秒执行一次：\n\n```php\nuse Swlib\\Process\\Attribute\\ProcessAttribute;\n\n#[ProcessAttribute(interval: 10 * 1000)]  // 每10秒执行一次\nclass MessageQueueProcess extends AbstractProcess\n{\n    public function handle(Server $server, Process $process): void\n    {\n        MessageQueue::run();  // 执行队列任务\n    }\n}\n```\n\n**消费逻辑：**\n1. 查询到期的待执行消息（最多96条）\n2. 使用 Redis 分布式锁确保每个消息同时只被一个消费者执行\n3. 执行成功后标记为完成\n4. 执行失败后根据重试策略安排下次执行时间\n5. 清理7天前的已完成消息\n\n### 10.8 最佳实践\n\n1. **返回类型声明**：始终声明返回类型为 `int` 并添加 `return 0;`\n2. **静态方法**：队列任务推荐使用静态方法\n3. **幂等性**：确保任务可以安全地重复执行\n4. **错误处理**：捕获并处理可能出现的异常\n5. **进度更新**：对于长时间任务，使用 `updateProgress` 更新进度\n\n```php\nuse Swlib\\Queue\\Attribute\\QueueAttribute;\nuse Swlib\\Exception\\AppException;\n\n#[QueueAttribute(\n    delay: 300,\n    maxRetry: 3,\n    clear: true\n)]\npublic static function syncUserData(int $userId): int\n{\n    try {\n        // 1. 检查用户是否存在\n        $user = new UserTable()->where([UserTable::ID => $userId])->selectOne();\n        if (!$user) {\n            return 0;  // 用户不存在，直接返回\n        }\n\n        // 2. 执行同步逻辑\n        $this->doSync($user);\n\n        return 0;\n    } catch (AppException $e) {\n        // 业务异常，不重试\n        Log::error(\"同步用户数据失败: {$e->getMessage()}\");\n        throw $e;\n    }\n}\n```\n"}, {"group": "异步与调度", "file": "11-任务处理.md", "title": "11. 任务处理", "markdown": "## 11. 任务处理\n\nTask 进程用于立即执行的后台异步任务，与队列系统不同，Task 不需要等待，投递后立即执行。\n\n### 快速入口\n\n- 声明 Task 方法：看 `11.1`\n- 参数与返回值约束：看 `11.4` 与 `11.5`\n- Task 与队列怎么选：看 `11.7`\n\n### 常见误用\n\n- 传入不可序列化参数（资源、闭包等）\n- 在 Task 内再投递阻塞任务导致链路拥塞\n\n### 关联源码\n\n- `Swlib/TaskProcess/Attribute/TaskAttribute.php`\n- `Swlib/TaskProcess/TaskDispatcher.php`\n- `Swlib/ServerEvents/OnTaskEvent.php`\n\n### 排障索引\n\n- Task 不执行：检查 server task worker 配置与事件绑定\n- 参数错误：按 `serialize` 可序列化原则排查\n\n### 11.1 Task 注解\n\n使用 `#[TaskAttribute]` 注解将方法标记为 Task 任务：\n\n```php\nuse Swlib\\TaskProcess\\Attribute\\TaskAttribute;\n\nclass ReportService\n{\n    #[TaskAttribute(\n        name: '生成日报',      // 可选的任务名称\n        timeout: 600          // 超时时间（秒），默认300秒\n    )]\n    public static function generateDailyReport(int $userId): void\n    {\n        // 业务逻辑在 Task 进程中执行\n        $report = self::buildReport($userId);\n\n        // 发送邮件\n        Mail::to($user->email)->send($report);\n    }\n}\n\n// 调用方式：正常调用方法即可，代理会自动投递到 Task 进程\nReportService::generateDailyReport($userId);\n```\n\n**关键特点：**\n- 用户只需声明注解，**正常调用方法**即可完成投递\n- 不需要主动调用 `TaskDispatcher::dispatch()`\n- 方法在 Task 进程中**立即执行**（不是延迟）\n- 方法返回值必须是 `void`（异步执行无返回值）\n\n### 11.2 注解参数\n\n| 参数 | 类型 | 默认值 | 说明 |\n|------|------|--------|------|\n| `name` | string | '' | 任务名称，默认使用 `类名_方法名` |\n| `timeout` | int | 300 | 任务执行超时时间（秒） |\n| `priority` | int | 0 | 执行优先级（多个注解时需显式指定） |\n| `async` | bool | true | 是否异步执行 |\n\n### 11.3 使用示例\n\n#### 基本 Task 任务\n\n```php\nuse Swlib\\TaskProcess\\Attribute\\TaskAttribute;\n\nclass ImageService\n{\n    #[TaskAttribute]\n    public static function processImage(int $imageId): void\n    {\n        $image = new ImageTable()->where([ImageTable::ID => $imageId])->selectOne();\n\n        // 处理图片（压缩、裁剪等）\n        self::compress($image);\n        self::generateThumbnail($image);\n\n        // 更新状态\n        new ImageTable()->where([ImageTable::ID => $imageId])->update([\n            ImageTable::STATUS => 'processed'\n        ]);\n    }\n}\n\n// 调用：正常调用即可\nImageService::processImage($imageId);\n```\n\n#### 带超时设置\n\n```php\n#[TaskAttribute(\n    name: '导出大量数据',\n    timeout: 1800  // 30分钟超时\n)]\npublic static function exportLargeData(int $batchId): void\n{\n    // 导出逻辑可能需要较长时间\n    // ...\n}\n```\n\n### 11.4 参数限制\n\nTask 使用 PHP 序列化传递数据，**不支持以下类型**：\n\n| 不支持类型 | 说明 |\n|-----------|------|\n| 资源类型 | MySQL/Redis 连接、文件句柄 |\n| 闭包 | 匿名函数 |\n| 包含上述类型的对象 | 任何包含资源的对象 |\n\n```php\n// ❌ 错误：传递数据库连接\n#[TaskAttribute]\npublic static function badExample(mysqli $conn): void\n{\n    // 错误！连接不能序列化\n}\n\n// ✅ 正确：传递ID\n#[TaskAttribute]\npublic static function goodExample(int $userId): void\n{\n    // 在 Task 进程中重新获取连接\n    $user = new UserTable()->where([UserTable::ID => $userId])->selectOne();\n}\n```\n\n### 11.5 返回值\n\nTask 方法**必须声明返回类型为 void**：\n\n```php\n// ✅ 正确\n#[TaskAttribute]\npublic static function process(int $id): void\n{\n    // 处理逻辑\n}\n\n// ❌ 错误：Task 方法不能有返回值\n#[TaskAttribute]\npublic static function process(int $id): int  // 错误！\n{\n    return 1;\n}\n```\n\n### 11.6 事务支持\n\nTask 任务支持与 `#[Transaction]` 注解配合使用：\n\n```php\nuse Swlib\\TaskProcess\\Attribute\\TaskAttribute;\nuse Swlib\\Table\\Attributes\\Transaction;\n\nclass OrderService\n{\n    #[TaskAttribute]\n    #[Transaction]\n    public static function processOrder(int $orderId): void\n    {\n        // 这些操作会在事务中执行\n        new OrderTable()->where([OrderTable::ID => $orderId])->update([\n            OrderTable::STATUS => 'processing'\n        ]);\n\n        new OrderLogTable()->insert([\n            OrderLogTable::ORDER_ID => $orderId,\n            OrderLogTable::ACTION => 'process'\n        ]);\n    }\n}\n```\n\n### 11.7 Task 与队列的对比\n\n| 特性 | Task (`#[TaskAttribute]`) | 队列 (`#[QueueAttribute]`) |\n|------|---------------------------|----------------------------|\n| 执行时机 | **立即执行** | 可设置延迟执行 |\n| 返回值 | 无 (void) | 返回队列ID |\n| 重试机制 | 无 | 支持重试和重试间隔 |\n| 进度跟踪 | 不支持 | 支持 `updateProgress` |\n| 适用场景 | 简单异步任务 | 延迟任务、长时间任务 |\n\n### 11.8 执行原理\n\n```\n┌─────────────────────────────────────────────────────────────┐\n│ 调用方                                                         │\n│ ReportService::generateDailyReport($userId);                │\n└────────────────────────┬────────────────────────────────────┘\n                         ↓\n┌─────────────────────────────────────────────────────────────┐\n│ 代理拦截 (TaskAttribute)                                      │\n│ 1. 验证参数可序列化                                           │\n│ 2. 投递到 Swoole Task 进程                                    │\n│ 3. 立即返回 null                                              │\n└────────────────────────┬────────────────────────────────────┘\n                         ↓\n┌─────────────────────────────────────────────────────────────┐\n│ Task 进程 (OnTaskEvent)                                       │\n│ 1. 接收任务数据                                              │\n│ 2. 调用原方法执行                                            │\n│ 3. 处理异常                                                  │\n└─────────────────────────────────────────────────────────────┘\n```\n\n**特殊处理：** 如果已经在 Task 进程中调用 Task 方法，会**直接执行**，避免死锁。\n\n### 11.9 最佳实践\n\n1. **参数简单**：只传递 ID 等简单类型，避免传递复杂对象\n2. **返回 void**：始终声明返回类型为 void\n3. **独立事务**：需要在事务中执行时，添加 `#[Transaction]` 注解\n4. **超时设置**：长时间运行的任务务必设置合理的 timeout\n5. **异常处理**：方法内部自行处理异常，避免影响 Task 进程\n\n```php\nuse Swlib\\Exception\\AppException;use Swlib\\Table\\Attributes\\Transaction;use Swlib\\TaskProcess\\Attribute\\TaskAttribute;\n\nclass DataSyncService\n{\n    #[TaskAttribute(\n        name: '同步用户数据',\n        timeout: 600\n    )]\n    #[Transaction]\n    public static function syncUser(int $userId): void\n    {\n        try {\n            $user = new UserTable()->where([UserTable::ID => $userId])->selectOne();\n            if (!$user) {\n                return;  // 用户不存在，直接返回\n            }\n\n            // 同步逻辑\n            $this->doSync($user);\n\n        } catch (AppException $e) {\n            // 业务异常，记录日志后不再抛出\n            Log::error(\"同步用户数据失败: {$e->getMessage()}\");\n        }\n    }\n}\n```\n"}, {"group": "协议与工程化", "file": "17-Protobuf集成.md", "title": "17. Protobuf 集成", "markdown": "## 17. Protobuf 集成\n\nSWLib 框架深度集成了 Google Protocol Buffers (Protobuf)，用于高效的 API 数据序列化。框架会根据数据库表结构自动生成 Protobuf 定义文件（.proto）并编译为 PHP 类。\n\n### 快速入口\n\n- 理解生成机制：看 `17.2`\n- 字段映射与扩展：看 `17.3` 到 `17.5`\n- 控制器里返回 protobuf：看 `17.6`\n\n### 常见误用\n\n- 频繁变更字段编号造成兼容问题\n- 直接改编译产物而非源 proto\n\n### 关联源码\n\n- `Swlib/Response/ProtobufResponse.php`\n- `Swlib/Router/Router.php`\n- `Swlib/Parse/Table/ParseTableProtoc.php`\n\n### 排障索引\n\n- 请求解析失败：检查 content-type 与消息定义匹配\n- 前端解码异常：检查 proto 版本与字段类型一致性\n\n### 17.1 概述\n\n#### 什么是 Protobuf\n\nProtocol Buffers 是 Google 开发的一种轻量级、高效的结构化数据序列化格式，相比 JSON/XML 具有以下优势：\n- **更小的体积**：二进制格式，数据量减少 50%-80%\n- **更快的序列化/反序列化**：性能提升 3-10 倍\n- **类型安全**：编译时类型检查，减少运行时错误\n- **跨语言支持**：支持 PHP、Go、Java、Python 等多种语言\n\n#### 框架中的 Protobuf 架构\n\n```\n┌─────────────────┐     自动生成      ┌─────────────────┐     编译      ┌─────────────────┐\n│   MySQL 数据表   │ ───────────────> │   .proto 文件    │ ───────────> │   PHP 类文件     │\n└─────────────────┘                   └─────────────────┘               └─────────────────┘\n        │                                     │                                 │\n        │                                     │                                 │\n        v                                     v                                 v\n   protos/DatabaseName/              runtime/Protobuf/DatabaseName/    控制器返回类型\n      TableName.proto                   TableName/TableNameProto.php\n```\n\n#### 目录结构\n\n```\nproject/\n├── protos/                        # Protobuf 定义文件（框架自动生成）\n│   ├── Wenyuehui/                 # 按数据库名称分组\n│   │   ├── User.proto             # 用户表对应的 proto 文件\n│   │   ├── Order.proto            # 订单表对应的 proto 文件\n│   │   └── ...\n│   └── field_maps/                # 字段映射缓存（保持字段编号稳定）\n│       └── Wenyuehui/\n│           ├── User.json\n│           └── ...\n└── runtime/\n    ├── Protobuf/                  # 编译后的 PHP 类\n    │   ├── Wenyuehui/\n    │   │   ├── User/\n    │   │   │   ├── UserProto.php           # 单条记录消息类\n    │   │   │   └── UserListsProto.php      # 列表消息类\n    │   │   └── ...\n    │   └── GPBMetadata/           # Protobuf 元数据\n    └── codes/proto/               # 部署用的 proto 文件副本\n```\n\n---\n\n### 17.2 自动生成机制\n\n框架在启动时会自动扫描数据库表结构，生成对应的 Protobuf 文件。\n\n#### 生成时机\n\n1. 应用首次启动时\n2. 数据库表结构变更后重启服务时\n\n#### 生成的消息类型\n\n每个数据表会生成两个 Protobuf 消息类型：\n\n```protobuf\n// 单条记录消息\nmessage UserProto {\n    int32 id = 1;\n    string username = 2;\n    string email = 3;\n    int32 status = 4;\n    int32 created_at = 5;\n    string created_atStr = 6;  // 自动生成的字符串格式时间\n    int32 page_number = 7;     // 分页参数\n    int32 page_size = 8;       // 分页参数\n}\n\n// 列表消息\nmessage UserListsProto {\n    repeated UserProto lists = 1;  // 列表数据\n    int32 total = 2;               // 总数\n    int32 curr_page = 3;           // 当前页码\n    int32 total_page = 4;          // 总页数\n}\n```\n\n---\n\n### 17.3 字段类型映射\n\n框架会自动将 MySQL 字段类型映射到 Protobuf 类型：\n\n| MySQL 类型 | Protobuf 类型 | 说明 |\n|-----------|--------------|------|\n| TINYINT, SMALLINT, MEDIUMINT | int32 | 整数 |\n| INT | int32 | 整数 |\n| BIGINT | int64 | 大整数 |\n| FLOAT | float | 单精度浮点 |\n| DOUBLE, DECIMAL | double | 双精度浮点 |\n| BOOL | bool | 布尔值 |\n| VARCHAR, CHAR, TEXT, LONGTEXT | string | 字符串 |\n| DATETIME, TIMESTAMP, DATE, TIME | string | 时间（自动生成 Str 后缀字段） |\n| ENUM | Enum | 生成枚举类型 |\n| SET | repeated string | 字符串数组 |\n| JSON | string | JSON 字符串 |\n| BLOB, LONGBLOB, BINARY | string | 二进制数据 |\n\n#### 自动生成的辅助字段\n\n对于时间类型字段，框架会自动生成一个带 `Str` 后缀的字符串字段：\n\n```protobuf\nint32 created_at = 5;\nstring created_atStr = 6;  // 格式化后的时间字符串\n```\n\n---\n\n### 17.4 字段注释配置\n\n通过在数据库字段注释中添加特殊标记，可以自定义 Protobuf 字段的生成。\n\n#### 自定义字段类型\n\n使用 `protobuf:item:type` 格式指定字段类型：\n\n```sql\nCREATE TABLE users (\n    id INT PRIMARY KEY AUTO_INCREMENT,\n    status TINYINT COMMENT '状态 protobuf:item:int64',  -- 强制使用 int64\n    balance DECIMAL(10,2) COMMENT '余额 protobuf:item:string'  -- 使用字符串存储精度\n);\n```\n\n生成的 proto：\n```protobuf\nint64 status = 2;\nstring balance = 3;\n```\n\n#### 生成字符串辅助字段\n\n使用 `g-str-field` 标记为数值字段生成字符串格式：\n\n```sql\nCREATE TABLE products (\n    id INT PRIMARY KEY AUTO_INCREMENT,\n    price DECIMAL(10,2) COMMENT '价格 g-str-field'  -- 同时生成数值和字符串格式\n);\n```\n\n生成的 proto：\n```protobuf\ndouble price = 2;\nstring priceStr = 3;  // 用于前端精确显示\n```\n\n#### 列表消息中的额外字段\n\n使用 `protobuf:lists:type` 在列表消息中添加额外字段：\n\n```sql\nCREATE TABLE orders (\n    id INT PRIMARY KEY AUTO_INCREMENT,\n    user_id INT COMMENT '用户ID protobuf:lists:int32'  -- 在 ListsProto 中也包含此字段\n);\n```\n\n生成的 ListsProto：\n```protobuf\nmessage OrderListsProto {\n    repeated OrderProto lists = 1;\n    int32 total = 2;\n    int32 curr_page = 3;\n    int32 total_page = 4;\n    int32 user_id = 5;  // 额外添加的字段\n}\n```\n\n---\n\n### 17.5 扩展字段定义\n\n在 ID 字段注释中可以定义扩展字段，用于在消息中添加数据库表中不存在的字段。\n\n#### 基本语法\n\n```sql\nCREATE TABLE posts (\n    id INT PRIMARY KEY AUTO_INCREMENT\n        COMMENT 'protobuf:ext:json:[\n            \"item:isFocus:bool\",\n            \"item:focusCount:int32\",\n            \"lists:counts:repeated string\"\n        ]',\n    title VARCHAR(255),\n    content TEXT\n);\n```\n\n#### 扩展字段格式\n\n```\n\"位置:字段名:类型\"\n```\n\n- **位置**：`item` 表示单条记录，`lists` 表示列表消息\n- **字段名**：生成的 Protobuf 字段名称\n- **类型**：Protobuf 数据类型\n\n#### 支持的类型\n\n| 类型 | 说明 | 示例 |\n|------|------|------|\n| bool | 布尔值 | `item:isActive:bool` |\n| int32 | 32位整数 | `item:count:int32` |\n| int64 | 64位整数 | `item:timestamp:int64` |\n| string | 字符串 | `item:name:string` |\n| float | 浮点数 | `item:score:float` |\n| double | 双精度浮点 | `item:amount:double` |\n| repeated string | 字符串数组 | `lists:tags:repeated string` |\n| repeated int32 | 整数数组 | `lists:ids:repeated int32` |\n\n#### 引用其他消息类型\n\n可以在扩展字段中引用其他表生成的消息类型：\n\n```sql\nCREATE TABLE orders (\n    id INT PRIMARY KEY AUTO_INCREMENT\n        COMMENT 'protobuf:ext:json:[\n            \"item:user:Protobuf.Wenyuehui.User.UserProto\",\n            \"lists:products:repeated Protobuf.Wenyuehui.Product.ProductProto\"\n        ]',\n    -- ...\n);\n```\n\n这会自动在 proto 文件中添加 import 语句：\n\n```protobuf\nimport \"User.proto\";\nimport \"Product.proto\";\n\nmessage OrderProto {\n    // ... 原有字段\n    UserProto user = 10;\n}\n\nmessage OrderListsProto {\n    // ... 原有字段\n    repeated ProductProto products = 10;\n}\n```\n\n#### 使用 $self 引用自身\n\n```sql\nCREATE TABLE categories (\n    id INT PRIMARY KEY AUTO_INCREMENT\n        COMMENT 'protobuf:ext:json:[\n            \"item:children:repeated $self\"  -- 引用自身的列表类型\n        ]',\n    name VARCHAR(100),\n    parent_id INT\n);\n```\n\n生成：\n```protobuf\nmessage CategoryProto {\n    int32 id = 1;\n    string name = 2;\n    int32 parent_id = 3;\n    repeated CategoryProto children = 4;  // 自引用\n}\n```\n\n---\n\n### 17.6 在控制器中使用\n\n#### 返回 Protobuf 响应\n\n控制器方法返回 Protobuf 消息对象，框架会自动序列化响应：\n\n```php\nuse Protobuf\\Wenyuehui\\User\\UserProto;\nuse Protobuf\\Wenyuehui\\User\\UserListsProto;\nuse Generate\\Tables\\UserTable;\n\nclass UserController extends AbstractController\n{\n    #[Router(method: 'POST')]\n    public function info(): UserProto\n    {\n        $id = $this->get('id', 'ID不能为空');\n\n        $user = new UserTable()\n            ->where([UserTable::ID => $id])\n            ->selectOne();\n\n        $proto = new UserProto();\n        $proto->setId($user->id);\n        $proto->setUsername($user->username);\n        $proto->setEmail($user->email);\n        $proto->setStatus($user->status);\n\n        return $proto;\n    }\n\n    #[Router(method: 'POST')]\n    public function list(): UserListsProto\n    {\n        $page = $this->get('page', 1);\n        $size = $this->get('size', 10);\n\n        $users = new UserTable()\n            ->where([UserTable::STATUS => 1])\n            ->order([UserTable::ID => 'desc'])\n            ->page($page, $size)\n            ->selectAll();\n\n        $proto = new UserListsProto();\n        $proto->setTotal($users->__total);\n        $proto->setCurrPage($page);\n        $proto->setTotalPage(ceil($users->__total / $size));\n\n        $list = [];\n        foreach ($users as $user) {\n            $item = new UserProto();\n            $item->setId($user->id);\n            $item->setUsername($user->username);\n            $list[] = $item;\n        }\n        $proto->setLists($list);\n\n        return $proto;\n    }\n}\n```\n\n#### 使用 DTO 快速填充\n\n框架提供了便捷方法将 DTO 数据填充到 Protobuf 对象：\n\n```php\nuse Protobuf\\Wenyuehui\\User\\UserProto;\n\npublic function info(): UserProto\n{\n    $user = new UserTable()\n        ->where([UserTable::ID => $this->get('id')])\n        ->selectOne();\n\n    $proto = new UserProto();\n\n    // 自动映射同名属性\n    $proto->setId($user->id);\n    $proto->setUsername($user->username);\n    $proto->setEmail($user->email);\n    $proto->setStatus($user->status);\n    $proto->setCreatedAt($user->createdAt);\n    $proto->setCreatedAtStr(date('Y-m-d H:i:s', $user->createdAt));\n\n    return $proto;\n}\n```\n\n---\n\n### 17.7 Proto 文件编译\n\n#### 自动编译\n\n框架在生成 proto 文件后会自动调用 protoc 编译器：\n\n```php\n// 框架内部调用\nParseTableProtoc::compileProto();\n```\n\n执行的命令：\n```bash\nprotoc -I protos/Wenyuehui protos/Wenyuehui/*.proto --php_out=runtime/Protobuf/\n```\n\n#### 手动编译\n\n如果需要手动重新编译 proto 文件：\n\n```bash\n# 编译单个文件\nprotoc -I protos protos/Wenyuehui/User.proto --php_out=runtime/Protobuf/\n\n# 编译整个目录\nprotoc -I protos/Wenyuehui protos/Wenyuehui/*.proto --php_out=runtime/Protobuf/\n```\n\n#### 编译要求\n\n确保系统已安装 protoc 编译器：\n\n```bash\n# macOS\nbrew install protobuf\n\n# Ubuntu/Debian\napt-get install protobuf-compiler\n\n# 验证安装\nprotoc --version\n```\n\n---\n\n### 17.8 Proto 文件示例\n\n#### 基本表示例\n\nSQL：\n```sql\nCREATE TABLE users (\n    id INT PRIMARY KEY AUTO_INCREMENT,\n    username VARCHAR(50) COMMENT '用户名',\n    email VARCHAR(100) COMMENT '邮箱',\n    status TINYINT DEFAULT 1 COMMENT '状态：1正常 0禁用',\n    created_at INT COMMENT '创建时间',\n    updated_at INT COMMENT '更新时间'\n) COMMENT='用户表';\n```\n\n生成的 `protos/Wenyuehui/User.proto`：\n```protobuf\n// 数据库: Wenyuehui, 表: User\nsyntax = \"proto3\";\n\n// protoc  --php_out=../../   *.proto\n\npackage Protobuf.Wenyuehui.User;\noption php_metadata_namespace = \"GPBMetadata\\\\Wenyuehui\";\n\nmessage UserProto {\n    int32 id = 1;\n    string username = 2;\n    string email = 3;\n    int32 status = 4;\n    int32 created_at = 5;\n    string created_atStr = 6;\n    int32 updated_at = 7;\n    string updated_atStr = 8;\n    int32 page_number = 9;\n    int32 page_size = 10;\n}\n\nmessage UserListsProto {\n    repeated UserProto lists = 1;\n    int32 total = 2;\n    int32 curr_page = 3;\n    int32 total_page = 4;\n}\n```\n\n#### 带扩展字段的示例\n\nSQL：\n```sql\nCREATE TABLE posts (\n    id INT PRIMARY KEY AUTO_INCREMENT\n        COMMENT 'protobuf:ext:json:[\n            \"item:isLiked:bool\",\n            \"item:likeCount:int32\",\n            \"item:author:Protobuf.Wenyuehui.User.UserProto\"\n        ]',\n    title VARCHAR(255) COMMENT '标题',\n    content TEXT COMMENT '内容',\n    user_id INT COMMENT '作者ID',\n    status TINYINT COMMENT '状态'\n);\n```\n\n生成的 proto：\n```protobuf\nsyntax = \"proto3\";\n\nimport \"User.proto\";\n\npackage Protobuf.Wenyuehui.Posts;\noption php_metadata_namespace = \"GPBMetadata\\\\Wenyuehui\";\n\nmessage PostsProto {\n    int32 id = 1;\n    string title = 2;\n    string content = 3;\n    int32 user_id = 4;\n    int32 status = 5;\n    int32 page_number = 6;\n    int32 page_size = 7;\n    bool isLiked = 8;\n    int32 likeCount = 9;\n    UserProto author = 10;\n}\n\nmessage PostsListsProto {\n    repeated PostsProto lists = 1;\n    int32 total = 2;\n    int32 curr_page = 3;\n    int32 total_page = 4;\n}\n```\n\n---\n\n### 17.9 前端对接\n\n#### 响应格式\n\n客户端可以请求 JSON 或二进制格式：\n\n```http\nPOST /api/user/info\nAccept: application/x-protobuf  # 二进制格式\nAccept: application/json         # JSON 格式（默认）\n```\n\nJSON 响应示例：\n```json\n{\n    \"id\": 123,\n    \"username\": \"john_doe\",\n    \"email\": \"john@example.com\",\n    \"status\": 1,\n    \"createdAt\": 1705324800,\n    \"createdAtStr\": \"2024-01-15 10:00:00\"\n}\n```\n\n#### 移动端推荐使用二进制\n\n移动端（iOS/Android）推荐使用二进制格式以获得最佳性能：\n\n```swift\n// iOS 示例\nlet url = URL(string: \"https://api.example.com/user/info\")!\nvar request = URLRequest(url: url)\nrequest.setValue(\"application/x-protobuf\", forHTTPHeaderField: \"Accept\")\n\nlet (data, _) = try await URLSession.shared.data(for: request)\nlet user = try UserProto(serializedData: data)\n```\n\n```kotlin\n// Android 示例\nval request = Request.Builder()\n    .url(\"https://api.example.com/user/info\")\n    .header(\"Accept\", \"application/x-protobuf\")\n    .build()\n\nval response = okHttpClient.newCall(request).execute()\nval user = UserProto.parseFrom(response.body?.byteStream())\n```\n\n---\n\n### 17.10 最佳实践\n\n#### 命名规范\n\n```sql\n-- 推荐：清晰的字段名和注释\nCREATE TABLE orders (\n    id INT PRIMARY KEY AUTO_INCREMENT COMMENT '订单ID',\n    order_no VARCHAR(32) COMMENT '订单编号',\n    user_id INT COMMENT '用户ID protobuf:item:int64',  -- 关联ID用int64\n    total_amount DECIMAL(10,2) COMMENT '订单金额 g-str-field',  -- 金额保留精度\n    status TINYINT COMMENT '订单状态'\n);\n```\n\n#### 避免频繁修改字段\n\nProtobuf 字段编号一旦分配就不应更改，框架使用 `field_maps` 缓存来保持编号稳定：\n\n```json\n// protos/field_maps/Wenyuehui/User.json\n{\n    \"int32 id\": 1,\n    \"string username\": 2,\n    \"string email\": 3\n}\n```\n\n#### 合理使用扩展字段\n\n```sql\n-- 推荐：只在需要时添加扩展字段\nCOMMENT 'protobuf:ext:json:[\n    \"item:isFocus:bool\",        -- 用户是否关注\n    \"item:focusCount:int32\"     -- 关注数量\n]'\n\n-- 不推荐：过度使用扩展字段\nCOMMENT 'protobuf:ext:json:[\n    \"item:field1:string\",\n    \"item:field2:string\",\n    \"item:field3:string\",\n    ...大量扩展字段\n]'\n```\n\n#### 性能优化\n\n```php\n// 推荐：批量设置列表数据\n$proto = new UserListsProto();\n$proto->setLists($userList);  // 一次性设置\n$proto->setTotal($total);\n\n// 不推荐：循环中频繁操作\nforeach ($users as $user) {\n    $proto->getLists()[] = $user;  // 每次都调用 getter\n}\n```\n"}, {"group": "协议与工程化", "file": "15-代码生成系统.md", "title": "15. 代码生成系统", "markdown": "## 15. 代码生成系统\n\nSWLib 框架的核心特性之一是自动代码生成系统。框架在启动时会扫描数据库表结构，自动生成 Table 映射类、DTO 对象、Model 模型、CRUD 控制器、后台管理界面和 Protobuf 协议文件。\n\n### 快速入口\n\n- 先理解生成链路：看 `15.1` 与 `15.2`\n- 解决字段冲突：看 `15.3`\n- 重新生成策略：看 `15.9`\n\n### 常见误用\n\n- 直接修改生成产物，导致下次生成被覆盖\n- 未处理字段命名冲突就直接上线\n\n### 关联源码\n\n- `Swlib/Parse/Table/ParseTable.php`\n- `Swlib/Parse/Router/ParseRouter.php`\n- `Swlib/Parse/Router/GenApi/*`\n\n### 排障索引\n\n- 代码未生成：先检查数据库连接与目录写权限\n- Proto 编译失败：检查 protoc 可用性与 proto 语法\n\n### 15.1 概述\n\n#### 代码生成流程\n\n```\n┌─────────────────┐\n│   数据库表结构   │\n│  (MySQL/MariaDB)│\n└────────┬────────┘\n         │\n         ▼\n┌─────────────────┐\n│   ParseTable    │  ◀── 解析器入口\n│   解析器        │\n└────────┬────────┘\n         │\n    ┌────┴────┬─────────┬─────────┬─────────┬─────────┐\n    ▼         ▼         ▼         ▼         ▼         ▼\n┌───────┐ ┌───────┐ ┌───────┐ ┌───────┐ ┌───────┐ ┌───────┐\n│ Table │ │TableDto│ │ Model │ │ CRUD  │ │ Admin │ │ Proto │\n└───────┘ └───────┘ └───────┘ └───────┘ └───────┘ └───────┘\n    │         │         │         │         │         │\n    ▼         ▼         ▼         ▼         ▼         ▼\nruntime/  runtime/  runtime/  runtime/  runtime/  protos/\nGenerate/ Generate/ Generate/ codes/    codes/    Database/\nTables/   TablesDto/ Models/   crud/     admin/\n```\n\n#### 生成时机\n\n代码生成在以下情况下自动触发：\n\n1. **首次启动** - 应用首次运行时\n2. **表结构变更** - 数据库表结构修改后重启服务\n3. **手动触发** - 删除 `runtime/` 目录后重启\n\n#### 生成器目录结构\n\n```\nSwlib/Parse/\n├── Table/                      # 表相关代码生成\n│   ├── ParseTable.php          # 解析器入口\n│   ├── ParseTableTable.php     # Table 类生成器\n│   ├── ParseTableTableDto.php  # DTO 类生成器\n│   ├── ParseTableModel.php     # Model 类生成器\n│   ├── ParseTableCRUD.php      # CRUD 控制器生成器\n│   ├── ParseTableAdmin.php     # 后台管理生成器\n│   ├── ParseTableProtoc.php    # Protobuf 生成器\n│   └── ParseTableMap.php       # 表映射生成器\n├── Router/                     # 路由相关生成\n│   └── GenApi/                 # 前端 API 代码生成\n├── Helper/                     # 辅助工具\n│   ├── FieldConflictDetector.php    # 字段冲突检测\n│   └── FieldDefaultValueHelper.php  # 默认值处理\n└── Config/                     # 配置验证\n```\n\n---\n\n### 15.2 生成内容详解\n\n#### Table 类 (runtime/Generate/Tables/)\n\nTable 类是数据表的映射类，提供字段常量和查询构建能力。\n\n```php\n// 自动生成的 Table 类示例\nnamespace Generate\\Tables\\Wenyuehui;\n\nuse Generate\\TablesDto\\Wenyuehui\\UserTableDto;\n\nclass UserTable implements TableInterface\n{\n    use FuncTrait;\n    use RawQueryTrait;\n    use SqlTrait;\n    use T
